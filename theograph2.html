<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
<title>An Old Gospel, Mapped — Antioch Theology Curriculum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241d16; --ink-soft:#5c5348; --parchment:#F6F1E7; --panel:#FCF9F2;
    --line:#d8cfbf; --oxblood:#6B121E; --gold:#B08A2E; --ghost:.14;
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%; margin:0}
  body{
    background:var(--parchment); color:var(--ink);
    font:14px/1.5 "EB Garamond", Georgia, serif;
    display:flex; flex-direction:column;
  }
  header{
    padding:18px 20px 12px; border-bottom:2px solid var(--oxblood);
    display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;
  }
  .eyebrow{
    font-family:system-ui,-apple-system,sans-serif; font-size:10px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--ink-soft);
  }
  h1{font-size:26px; font-weight:500; letter-spacing:.01em}
  h1 em{color:var(--oxblood); font-style:italic}
  .stats{font-size:13px; color:var(--ink-soft); font-style:italic}
  .controls{margin-left:auto; display:flex; gap:12px; align-items:center; flex-wrap:wrap;
    font-family:system-ui,sans-serif; font-size:11px; color:var(--ink-soft)}
  .controls label{display:flex; gap:6px; align-items:center; cursor:pointer; user-select:none}
  .controls button{
    font:inherit; background:none; border:1px solid var(--line); border-radius:3px;
    padding:4px 10px; cursor:pointer; color:var(--ink-soft);
  }
  .controls button:hover{border-color:var(--oxblood); color:var(--oxblood)}
  main{flex:1; display:flex; min-height:0; flex-direction:column}
  #graphwrap{flex:1; overflow:auto; position:relative; padding:8px; background:var(--parchment)}
  svg{display:block; width:100%; height:auto; max-width:100%}
  .unitlabel{font-family:"EB Garamond",serif; font-size:13px; fill:#a89a83; font-style:italic}
  .unitline{stroke:#e7dfd0; stroke-width:1}
  .edge{fill:none; stroke:#c9bcA6; stroke-width:1.1; opacity:.55}
  .edge.soft{stroke-dasharray:4 4; opacity:.4}
  .edge.lit{stroke:var(--gold); stroke-width:2; opacity:.95}
  .edge.lit.soft{stroke-dasharray:4 4; stroke-width:1.6}
  .dim{opacity:var(--ghost)}
  .node{cursor:pointer}
  .node rect{rx:4; stroke:rgba(0,0,0,.18); stroke-width:.75; filter:drop-shadow(0 1px 1px rgba(60,40,20,.18))}
  .node text{
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif; font-size:10px; font-weight:600;
    fill:#fff; pointer-events:none;
  }
  .node.selected rect{stroke:var(--gold); stroke-width:2.5}
  .node .flag{fill:#fff; opacity:.9; font-size:9px}
  /* detail panel */
  #panel{
    width:100%; border-top:1px solid var(--line); background:var(--panel);
    overflow-y:auto; padding:20px 18px 40px; display:none; flex-shrink:0;
  }
  #panel.open{display:block}
  #panel .pdomain{font-family:system-ui,sans-serif; font-size:10px; letter-spacing:.2em;
    text-transform:uppercase; margin-bottom:6px}
  #panel h2{font-size:21px; font-weight:500; line-height:1.15; margin-bottom:2px}
  #panel .pid{font-family:ui-monospace,monospace; font-size:10.5px; color:#a2947d; margin-bottom:14px}
  #panel .summary{font-size:15px; line-height:1.55; margin-bottom:16px}
  #panel h3{font-family:system-ui,sans-serif; font-size:10px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--ink-soft); margin:18px 0 7px;
    border-bottom:1px solid var(--line); padding-bottom:4px}
  .chips{display:flex; flex-wrap:wrap; gap:5px}
  .chip{font-family:system-ui,sans-serif; font-size:11px; background:#efe7d6;
    border:1px solid var(--line); border-radius:10px; padding:2px 9px}
  ul.mastery{padding-left:18px}
  ul.mastery li{margin-bottom:5px; font-size:13.5px}
  .prereq{margin-bottom:10px; padding-left:10px; border-left:3px solid var(--line)}
  .prereq.hard{border-left-color:var(--oxblood)}
  .prereq a{color:var(--oxblood); text-decoration:none; font-weight:600; cursor:pointer}
  .badge{font-family:system-ui,sans-serif; font-size:9px; letter-spacing:.1em; text-transform:uppercase;
    padding:1px 6px; border-radius:8px; margin-left:6px; vertical-align:1px}
  .badge.hard{background:var(--oxblood); color:#fff}
  .badge.soft{background:#d9cfba; color:var(--ink-soft)}
  .rationale{font-size:12.5px; color:var(--ink-soft); font-style:italic; margin-top:2px}
  .contested{background:#f4ead8; border:1px solid #dcc98f; border-radius:5px; padding:12px 14px; margin-top:8px}
  .contested .house{margin-top:8px; font-weight:600}
  .errors li{font-size:13px; color:#7a2c33}
  #legend{
    position:sticky; bottom:0; left:0; background:linear-gradient(transparent, var(--parchment) 30%);
    padding:12px 16px; display:flex; flex-wrap:wrap; gap:8px 12px;
    font-family:system-ui,sans-serif; font-size:11px; color:var(--ink-soft);
  }
  .lg{display:flex; align-items:center; gap:5px}
  .sw{width:11px; height:11px; border-radius:2px}
  #hint{position:absolute; top:12px; left:16px; font-style:italic; color:#a89a83; font-size:13px; pointer-events:none; z-index:10}

  @media (min-width: 761px) {
    main { flex-direction: row; }
    #panel { 
      width:360px; max-width:44vw; border-left:1px solid var(--line); border-top:none; 
    }
    header { padding:22px 28px 16px; }
    h1 { font-size:30px; }
    #graphwrap { padding:0; }
    svg { width:100%; height:100%; }
    .node text { font-size:10.5px; }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="eyebrow">Antioch Southern Baptist Church · Est. 1979</div>
    <h1>An Old Gospel, <em>Mapped</em></h1>
  </div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <label><input type="checkbox" id="softToggle" checked> soft prerequisites</label>
    <button id="clearBtn">Clear selection</button>
  </div>
</header>
<main>
  <div id="graphwrap">
    <div id="hint">Tap any doctrine to trace its lineage — everything it stands on lights in gold.</div>
    <svg id="svg"></svg>
    <div id="legend"></div>
  </div>
  <aside id="panel"></aside>
</main>

<script>
const DATA = {"concepts": [{"id": "anth.image-of-god", "name": "Made in God's Image", "band": 1, "summary": "God created mankind in his own image: the crowning work of creation, made to know God, represent his rule, and reflect his character. Every human being possesses full dignity and worth from conception to death.", "scripture": ["Genesis 1:26-28", "Psalm 8:3-8", "Genesis 9:6", "James 3:9"], "anchors": [{"source": "BFM2000", "ref": "Article III (Man)"}], "mastery": ["Can state what the image grounds: universal human dignity and the sanctity of life", "Can connect Genesis 9:6 and James 3:9 to how we treat other people"], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Image-bearing is a created status; it presupposes the Creator whose image is borne."}], "errors": ["Human worth grounded in ability or usefulness"]}, {"id": "anth.male-female", "name": "Male and Female He Created Them", "band": 1, "summary": "God created humanity male and female, both fully in his image, distinct and complementary. The gift of gender is part of the goodness of creation, and marriage between one man and one woman is God's design from the beginning.", "scripture": ["Genesis 1:27", "Genesis 2:18-24", "Matthew 19:4-6"], "anchors": [{"source": "BFM2000", "ref": "Article III; Article XVIII (The Family)"}], "mastery": ["Can state the equal dignity and designed distinction of male and female", "Can cite Jesus' appeal to Genesis in Matthew 19 as the pattern for marriage"], "prerequisites": [{"id": "anth.image-of-god", "strength": "hard", "rationale": "The male-female design is the concrete form image-bearing takes; equality of image grounds equality of worth across the distinction."}]}, {"id": "anth.the-fall", "name": "The Fall", "band": 1, "summary": "Adam and Eve, created good and free, disobeyed God at the serpent's temptation. Through this historical act sin entered the world, fellowship with God was broken, and creation itself fell under the curse.", "scripture": ["Genesis 3:1-19", "Romans 5:12", "Romans 8:20-22"], "anchors": [{"source": "BFM2000", "ref": "Article III"}], "mastery": ["Can narrate Genesis 3 accurately: the temptation, the act, the consequences", "Can state that the fall was a real event with universal consequences, not a myth about everyone's private failings"], "prerequisites": [{"id": "anth.image-of-god", "strength": "hard", "rationale": "The fall's tragedy is measured by the height of what fell; ruined image-bearers, not evolved animals behaving naturally."}, {"id": "theo.god-is-holy", "strength": "soft", "rationale": "Sin as offense against holiness, not mere rule-breaking, gives the fall its true weight."}]}, {"id": "anth.sin-universal", "name": "All Have Sinned", "band": 1, "summary": "Since the fall, all people inherit a nature and environment inclined toward sin, and as soon as they are capable of moral action they become transgressors in their own right. There is no one righteous; sin is universal in scope and personal in guilt.", "scripture": ["Romans 3:10-12", "Romans 3:23", "Psalm 51:5", "Ephesians 2:1-3"], "anchors": [{"source": "BFM2000", "ref": "Article III"}], "mastery": ["Can state both truths: an inherited sinful nature and personal responsible transgression", "Can answer 'aren't people basically good?' from Romans 3"], "prerequisites": [{"id": "anth.the-fall", "strength": "hard", "rationale": "Universal sinfulness is the downstream effect of the fall; without Genesis 3, Romans 3 has no origin story."}], "errors": ["Pelagianism (sin as mere bad example; humans born neutral)"]}, {"id": "anth.wages-of-sin", "name": "The Wages of Sin", "band": 1, "summary": "Sin earns death: spiritual separation from God now, physical death, and, apart from Christ, condemnation under God's righteous judgment. Sin is not a weakness God grades on a curve but a debt his justice must answer.", "scripture": ["Romans 6:23", "Isaiah 59:2", "Ephesians 2:1-3", "Hebrews 9:27"], "anchors": [{"source": "BFM2000", "ref": "Article III ('under condemnation')"}], "mastery": ["Can state the three dimensions of death sin brings: spiritual, physical, eternal", "Can explain why judgment is just rather than harsh, given who God is"], "prerequisites": [{"id": "anth.sin-universal", "strength": "hard", "rationale": "The penalty presupposes the crime and its universal reach; wages are owed because all have earned them."}, {"id": "theo.god-is-love-and-just", "strength": "hard", "rationale": "Judgment is God's justice in act; without his justice the wages of sin looks arbitrary."}]}, {"id": "apo.ready-with-gentleness", "name": "Ready to Give an Answer", "band": 1, "summary": "Every believer is called to be prepared to give a reason for the hope within them, with gentleness and respect. Apologetics is not winning arguments but honoring Christ as Lord while answering honest questions honestly.", "scripture": ["1 Peter 3:15-16", "Colossians 4:5-6", "2 Timothy 2:24-25"], "anchors": [{"source": "BFM2000", "ref": "Article XI (Evangelism and Missions)"}], "mastery": ["Can quote 1 Peter 3:15 including its posture clauses (in your hearts honor Christ; gentleness and respect)", "Can state their own reason for hope in two or three sentences"], "prerequisites": [{"id": "sot.gospel", "strength": "hard", "rationale": "The hope being defended is the gospel; apologetics is the gospel's escort, not its substitute."}, {"id": "ecc.great-commission", "strength": "soft", "rationale": "Answer-giving serves disciple-making; the commission gives apologetics its purpose."}]}, {"id": "apo.why-trust-bible", "name": "Why the Bible Can Be Trusted", "band": 1, "summary": "The Bible's trustworthiness is supported by publicly checkable evidence: an unmatched manuscript tradition, historical and archaeological corroboration, internal coherence across centuries of authors, and fulfilled prophecy, with Jesus' own view of Scripture as the believer's decisive warrant.", "scripture": ["Matthew 5:17-18", "John 10:35", "Luke 1:1-4", "2 Peter 1:16"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can give a two-minute answer to 'hasn't the Bible been changed over time?' (manuscript abundance, early copies)", "Can state that Jesus' own confidence in Scripture is the Christian's deepest reason to share it"], "prerequisites": [{"id": "bib.inerrancy", "strength": "hard", "rationale": "This concept defends a claim already defined; the doctrine of Scripture's truthfulness must be in hand before its defense is mounted."}, {"id": "bib.canon", "strength": "soft", "rationale": "Questions about 'lost gospels' and which books belong require the canon concept to answer."}]}, {"id": "apo.resurrection-case", "name": "The Case for the Resurrection", "band": 1, "summary": "The resurrection is a historical claim with historical evidence: Jesus' death by crucifixion, the empty tomb, the appearances to individuals and groups including skeptics, and the sudden transformation of the disciples into witnesses willing to die. The alternatives fail to explain all the facts.", "scripture": ["1 Corinthians 15:3-8", "1 Corinthians 15:14-19", "Acts 26:26"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}], "mastery": ["Can present the basic facts case (death, burial, empty tomb, appearances, transformed witnesses)", "Can respond to the two most common alternatives (theft, hallucination) in a sentence each", "Can state from 1 Corinthians 15:14 why everything hangs on this"], "prerequisites": [{"id": "chr.resurrection", "strength": "hard", "rationale": "The case defends the doctrine; the claim's content precedes its evidence."}, {"id": "apo.ready-with-gentleness", "strength": "soft", "rationale": "The manner of 1 Peter 3:15 should govern the material; posture before polemics."}]}, {"id": "bt.one-story", "name": "The Bible Tells One Story", "band": 1, "summary": "The sixty-six books form a single unfolding drama: creation, fall, redemption, and restoration, with Jesus Christ at its center. Every part is read as an episode in this one story, and all Scripture is a testimony to Christ.", "scripture": ["Luke 24:25-27", "Luke 24:44-47", "John 5:39", "Genesis 3:15"], "anchors": [{"source": "BFM2000", "ref": "Article I ('All Scripture is a testimony to Christ, who is Himself the focus of divine revelation')"}], "mastery": ["Can name the four movements (creation, fall, redemption, restoration) and place a given book roughly within them", "Can state from Luke 24 that Jesus read the whole Old Testament as about himself"], "prerequisites": [{"id": "bib.canon", "strength": "hard", "rationale": "One story presupposes one book; the unity of the canon is the premise of the unified plot."}, {"id": "bib.reading-in-context", "strength": "soft", "rationale": "The whole-Bible context is the widest circle of contextual reading; the skill and the storyline reinforce each other."}]}, {"id": "bt.covenants", "name": "God Works Through Covenants", "band": 1, "summary": "God advances his one plan through covenants: solemn, binding commitments with Noah, Abraham, Israel at Sinai, and David, all reaching their fulfillment in the new covenant sealed by Christ's blood. The covenants are the backbone of the story.", "scripture": ["Genesis 12:1-3", "Exodus 19:4-6", "2 Samuel 7:12-16", "Jeremiah 31:31-34", "Luke 22:20"], "anchors": [{"source": "BFM2000", "ref": "Article I (implicit in the testimony-to-Christ hermeneutic)"}], "mastery": ["Can name the major covenants in order and one sentence of content for each", "Can state that the Lord's Supper cup is 'the new covenant in my blood,' linking the table to Jeremiah 31"], "prerequisites": [{"id": "bt.one-story", "strength": "hard", "rationale": "Covenants are the structure of the story; without the single plot they read as disconnected contracts."}, {"id": "theo.god-is-sovereign", "strength": "soft", "rationale": "Covenant promises are only as good as the God who keeps them; sovereignty underwrites the backbone."}]}, {"id": "bt.promise-fulfillment", "name": "Promise and Fulfillment in Christ", "band": 1, "summary": "All the promises of God find their Yes in Christ. Old Testament promises, patterns, offices, and institutions (prophet, priest, king, temple, sacrifice, exodus) anticipate and arrive at Jesus, so that the New Testament reads as fulfillment, not replacement of the story.", "scripture": ["2 Corinthians 1:20", "Matthew 5:17", "Hebrews 1:1-2", "1 Corinthians 10:1-4"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can give two examples of an OT pattern arriving at Christ (e.g., Passover lamb, temple, Davidic king)", "Can state 2 Corinthians 1:20 as the summary rule of fulfillment"], "prerequisites": [{"id": "bt.covenants", "strength": "hard", "rationale": "The promises being fulfilled are covenant promises; fulfillment presupposes the covenant structure it completes."}, {"id": "chr.one-person", "strength": "soft", "rationale": "The fulfiller must be who the promises require: the divine-human Son who can be prophet, priest, and king at once."}]}, {"id": "bib.god-has-spoken", "name": "God Has Spoken", "band": 1, "summary": "God is not silent. He has freely made himself known to his creatures, supremely in his Son and in the Scriptures, so that knowing God truly is possible because God has revealed himself.", "scripture": ["Hebrews 1:1-2", "Psalm 19:1-4", "Deuteronomy 29:29"], "anchors": [{"source": "BFM2000", "ref": "Article I (The Scriptures)"}], "mastery": ["Can state that our knowledge of God rests on God's own self-revelation, not human discovery", "Can cite Hebrews 1:1-2 as the summary of how God has spoken"], "prerequisites": [], "errors": ["Deism (a silent, uninvolved creator)", "Agnosticism (God, if real, is unknowable)"]}, {"id": "bib.general-special-revelation", "name": "General and Special Revelation", "band": 1, "summary": "God reveals himself in two ways: generally to all people through creation and conscience, and specially through his saving words and acts recorded in Scripture. General revelation leaves everyone without excuse; special revelation is necessary to know the gospel.", "scripture": ["Psalm 19:1-11", "Romans 1:18-20", "Romans 10:14-17"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can distinguish what creation reveals (God's power and nature) from what only Scripture reveals (the gospel)", "Can explain from Romans 1 why no one is excused by ignorance"], "prerequisites": [{"id": "bib.god-has-spoken", "strength": "hard", "rationale": "The two modes of revelation are subdivisions of the prior claim that God reveals himself at all."}]}, {"id": "bib.inspiration", "name": "Inspiration of Scripture", "band": 1, "summary": "All Scripture is breathed out by God. Human authors wrote with their own styles and circumstances, yet what they wrote is God's own word, carried along by the Holy Spirit.", "scripture": ["2 Timothy 3:16-17", "2 Peter 1:20-21"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can state that Scripture has dual authorship: fully human writing, fully God's word", "Can quote or closely paraphrase 2 Timothy 3:16"], "prerequisites": [{"id": "bib.general-special-revelation", "strength": "hard", "rationale": "Inspiration is the mechanism of special revelation in written form; without the category of special revelation, inspiration has no place to live."}], "errors": ["Dictation theory (authors as passive stenographers)", "Merely human religious genius"]}, {"id": "bib.inerrancy", "name": "Truthfulness of Scripture", "band": 1, "summary": "Because Scripture is God's word and God cannot lie, the Bible is totally true and trustworthy in all it affirms. It has truth, without any mixture of error, for its matter.", "scripture": ["Psalm 119:160", "John 17:17", "Titus 1:2", "Numbers 23:19"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can trace the logic: God cannot lie, Scripture is God's word, therefore Scripture is true", "Can state the BFM phrase that Scripture has 'truth, without any mixture of error, for its matter'"], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "Inerrancy is an entailment of inspiration by a truthful God; asserted without inspiration it is groundless."}, {"id": "theo.god-is-holy", "strength": "soft", "rationale": "The character of God (who cannot lie) is the premise that makes the entailment work; a basic grasp of God's perfection strengthens the argument."}]}, {"id": "bib.authority", "name": "Authority of Scripture", "band": 1, "summary": "Scripture is the supreme standard by which all human conduct, creeds, and religious opinions are tried. To disbelieve or disobey Scripture is to disbelieve or disobey God.", "scripture": ["Isaiah 66:2", "Matthew 4:4", "John 10:35", "2 Timothy 3:16-17"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can state that Scripture, not experience, tradition, or preference, is the final authority for faith and practice", "Can give one concrete example of submitting a personal opinion to the text"], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "Scripture's authority is God's authority; it binds the conscience only because it is God's word."}, {"id": "bib.inerrancy", "strength": "soft", "rationale": "A word that could err in what it affirms would be a diminished standard; trustworthiness undergirds functional authority."}]}, {"id": "bib.canon", "name": "The Canon: Sixty-Six Books", "band": 1, "summary": "The Bible consists of thirty-nine Old Testament and twenty-seven New Testament books. The church did not create the canon but recognized the books God had inspired.", "scripture": ["Luke 24:44", "2 Peter 3:15-16", "John 10:27"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can state the structure of the Bible (39 OT, 27 NT) and name the major divisions", "Can articulate that the church recognized, rather than conferred, canonicity"], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "Canon is the boundary question of inspiration: which books are God-breathed. Without inspiration there is nothing to bound."}], "errors": ["Canon as a fourth-century political invention"]}, {"id": "bib.clarity-sufficiency", "name": "Clarity and Sufficiency of Scripture", "band": 1, "summary": "Scripture is clear enough that ordinary believers, reading it faithfully with the Spirit's help, can understand what is necessary for salvation and godliness; and it is sufficient, needing no supplement of new revelation for faith and life.", "scripture": ["Psalm 119:105", "Psalm 119:130", "Deuteronomy 6:6-7", "2 Timothy 3:15-17"], "anchors": [{"source": "BFM2000", "ref": "Article I"}, {"source": "2LBC1689", "ref": "1.6-1.7"}], "mastery": ["Can state that an ordinary Christian can understand the Bible's central message without an expert intermediary", "Can explain why the church does not need, and should not expect, new revelation added to Scripture"], "prerequisites": [{"id": "bib.authority", "strength": "hard", "rationale": "Sufficiency is authority applied to scope: Scripture is the final standard because nothing else is needed alongside it."}, {"id": "bib.canon", "strength": "soft", "rationale": "Sufficiency presupposes a closed, identifiable canon to be sufficient."}]}, {"id": "bib.reading-in-context", "name": "Reading Scripture in Context", "band": 1, "summary": "Scripture is read according to its plain sense in context: each passage means what its author, carried by the Spirit, meant, understood in its literary and historical setting and in light of the whole Bible, which centers on Christ.", "scripture": ["Nehemiah 8:8", "Luke 24:27", "2 Timothy 2:15", "Acts 17:11"], "anchors": [{"source": "BFM2000", "ref": "Article I ('All Scripture is a testimony to Christ')"}], "mastery": ["Can state the basic questions of context: who wrote it, to whom, why, and what surrounds the verse", "Can identify one example of a verse commonly misused out of context and give its contextual sense"], "prerequisites": [{"id": "bib.clarity-sufficiency", "strength": "soft", "rationale": "Clarity motivates the ordinary reader to read for themselves; contextual reading is the discipline that honors it."}, {"id": "bib.authority", "strength": "hard", "rationale": "Submitting to Scripture's authority requires seeking the text's actual meaning rather than imposing one."}]}, {"id": "chr.deity", "name": "Jesus Is Fully God", "band": 1, "summary": "Jesus Christ is the eternal Son of God: fully divine, worshiped, sovereign over creation, forgiving sins, and identified with the God of Israel. He did not become God; he is God from all eternity.", "scripture": ["John 1:1-3", "John 8:58", "John 20:28", "Colossians 1:15-17", "Hebrews 1:3"], "anchors": [{"source": "BFM2000", "ref": "Article II.B (God the Son)"}, {"source": "NiceneCreed", "ref": "'Very God of very God... of one substance with the Father'"}], "mastery": ["Can cite at least two texts where Jesus receives worship or divine titles", "Can state that the Son is eternal, not created or promoted"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "The claim 'Jesus is God' has its true weight only within monotheism; otherwise it is merely adding a god."}], "errors": ["Arianism", "Jesus as merely a great teacher or prophet"]}, {"id": "chr.humanity", "name": "Jesus Is Fully Man", "band": 1, "summary": "The eternal Son took on true and complete human nature: body, mind, and soul. He was born, grew, hungered, wept, suffered, and died. His humanity is not a costume but the condition of his saving work.", "scripture": ["John 1:14", "Luke 2:52", "Hebrews 2:14-17", "Hebrews 4:15"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}, {"source": "ChalcedonianDefinition", "ref": "'truly man... consubstantial with us according to the manhood'"}], "mastery": ["Can name concrete gospel evidence of Jesus' real humanity (hunger, sleep, grief, death)", "Can state from Hebrews 2 why the Savior had to share our nature"], "prerequisites": [{"id": "anth.image-of-god", "strength": "soft", "rationale": "Grasping what human nature is clarifies what the Son assumed; the true man is also the true image."}], "errors": ["Docetism (Jesus only seemed human)"]}, {"id": "chr.one-person", "name": "One Person, Truly God and Truly Man", "band": 1, "summary": "Jesus Christ is one person with two natures: fully God and fully man, without confusion, change, division, or separation. He is not half of each, nor two persons sharing a body, but one Lord who is both.", "scripture": ["John 1:14", "Philippians 2:5-11", "Colossians 2:9", "1 Timothy 2:5"], "anchors": [{"source": "ChalcedonianDefinition", "ref": "Full definition"}, {"source": "BFM2000", "ref": "Article II.B"}], "mastery": ["Can state the formula: one person, two natures, fully God and fully man", "Can recognize the two basic mistakes: dividing him into two persons, or blending the natures into a hybrid"], "prerequisites": [{"id": "chr.deity", "strength": "hard", "rationale": "The union presupposes the full deity being united."}, {"id": "chr.humanity", "strength": "hard", "rationale": "The union presupposes the full humanity being united."}], "errors": ["Nestorianism (two persons)", "Eutychianism (natures blended)", "Apollinarianism (divine mind in a human body)"]}, {"id": "chr.virgin-birth", "name": "The Virgin Birth", "band": 1, "summary": "Jesus was conceived by the Holy Spirit and born of the virgin Mary. The virgin conception marks the entrance of the eternal Son into human history: truly born of a woman, yet not merely the product of human generation.", "scripture": ["Isaiah 7:14", "Matthew 1:18-25", "Luke 1:34-35"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}, {"source": "ApostlesCreed", "ref": "'conceived by the Holy Spirit, born of the virgin Mary'"}], "mastery": ["Can narrate the annunciation accounts and state what they claim", "Can connect the virgin birth to the incarnation: how the Son entered humanity"], "prerequisites": [{"id": "chr.one-person", "strength": "soft", "rationale": "The virgin conception is the historical doorway of the incarnation; it is best understood as the 'how' of the person already confessed."}]}, {"id": "chr.sinless-life", "name": "The Sinless Life", "band": 1, "summary": "Jesus was tempted in every respect as we are, yet without sin. He perfectly obeyed the Father in our nature, qualifying him to be both the spotless sacrifice and the righteousness given to his people.", "scripture": ["Hebrews 4:15", "2 Corinthians 5:21", "1 Peter 2:22", "Matthew 3:15"], "anchors": [{"source": "BFM2000", "ref": "Article II.B ('perfect obedience')"}], "mastery": ["Can state that Jesus' temptations were real and his obedience complete", "Can explain why a sinful savior could not save (the lamb without blemish)"], "prerequisites": [{"id": "chr.humanity", "strength": "hard", "rationale": "Sinlessness is only remarkable, and only saving, in one who was truly tempted as a man."}, {"id": "anth.sin-universal", "strength": "soft", "rationale": "The universal sinfulness of mankind is the dark backdrop against which his uniqueness registers."}]}, {"id": "chr.substitutionary-death", "name": "He Died in Our Place", "band": 1, "summary": "On the cross Christ bore the sins of his people as their substitute. The punishment we deserved fell on him; God set him forth as the propitiation that satisfies divine justice, so that God is both just and the justifier of those who believe.", "scripture": ["Isaiah 53:4-6", "Mark 10:45", "Romans 3:25-26", "2 Corinthians 5:21", "1 Peter 3:18"], "anchors": [{"source": "BFM2000", "ref": "Article II.B ('substitutionary death')"}], "mastery": ["Can state substitution in one sentence: he took my place, my sin, my penalty", "Can walk through Isaiah 53:4-6 identifying the exchange", "Can explain why the cross was necessary rather than God simply overlooking sin"], "prerequisites": [{"id": "anth.wages-of-sin", "strength": "hard", "rationale": "Substitution answers a penalty; without sin's real wages there is nothing for a substitute to bear."}, {"id": "theo.god-is-love-and-just", "strength": "hard", "rationale": "The cross is unintelligible unless God's justice cannot waive sin and his love provides the substitute himself."}, {"id": "chr.sinless-life", "strength": "hard", "rationale": "Only a sinless substitute has no debt of his own and can stand in for others."}, {"id": "chr.one-person", "strength": "soft", "rationale": "The infinite worth of the substitute rests on who he is: the God-man's death avails for many."}], "errors": ["Cross as mere moral example", "Cross as divine child abuse caricature (Father and Son opposed rather than united in purpose)"]}, {"id": "chr.resurrection", "name": "The Bodily Resurrection", "band": 1, "summary": "On the third day Jesus rose bodily from the dead. The tomb was empty; he was seen, touched, and ate with witnesses. The resurrection is the Father's vindication of the Son, the receipt of the cross, and the firstfruits of our own resurrection.", "scripture": ["1 Corinthians 15:3-8", "Luke 24:36-43", "Romans 4:25", "Romans 1:4"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}, {"source": "ApostlesCreed", "ref": "'the third day he rose again from the dead'"}], "mastery": ["Can state that the resurrection was bodily, not merely spiritual or symbolic", "Can connect resurrection to justification via Romans 4:25", "Can list the categories of witness in 1 Corinthians 15:3-8"], "prerequisites": [{"id": "chr.substitutionary-death", "strength": "hard", "rationale": "The resurrection is the vindication of the atoning death; preached alone it is a marvel, together it is the gospel."}], "errors": ["Spiritual-only resurrection", "Swoon and hallucination theories"]}, {"id": "chr.ascension-session", "name": "Ascended and Reigning", "band": 1, "summary": "Jesus ascended into heaven and is seated at the right hand of the Father, where he reigns over all things and ever lives to intercede for his people. The Christian life is lived under a living, present Lord.", "scripture": ["Acts 1:9-11", "Ephesians 1:20-22", "Hebrews 7:25", "Romans 8:34"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}, {"source": "ApostlesCreed", "ref": "'he ascended into heaven, and sitteth on the right hand of God'"}], "mastery": ["Can state where Christ is now and what he is doing (reigning and interceding)", "Can explain how Christ's intercession gives assurance to a struggling believer"], "prerequisites": [{"id": "chr.resurrection", "strength": "hard", "rationale": "The ascension is the risen Christ's enthronement; there is no session without resurrection."}]}, {"id": "ecc.what-is-church", "name": "What the Church Is", "band": 1, "summary": "A New Testament church is an autonomous local congregation of baptized believers, associated by covenant in the faith and fellowship of the gospel, observing the two ordinances, governed by his laws, and exercising the gifts, rights, and privileges invested in them by Christ's word. Scripture also speaks of the church as the body of Christ including all the redeemed of all ages.", "scripture": ["Matthew 16:18", "Acts 2:41-47", "1 Corinthians 12:12-14", "Ephesians 1:22-23"], "anchors": [{"source": "BFM2000", "ref": "Article VI (The Church)"}], "mastery": ["Can define the local church as a gathered congregation of baptized believers, not a building or a broadcast audience", "Can distinguish the local church from the universal body of the redeemed"], "prerequisites": [{"id": "sot.gospel", "strength": "hard", "rationale": "The church is created by the gospel; a congregation is defined by the news it shares and confesses."}, {"id": "pneu.regeneration", "strength": "hard", "rationale": "A believers' church presupposes that its members are born again; regenerate membership is the Baptist distinctive."}]}, {"id": "ecc.membership", "name": "Church Membership", "band": 1, "summary": "Believers formally join themselves to a local congregation, covenanting to gather, love, serve, submit, and be accountable to one another. Membership makes visible what conversion creates: belonging to Christ means belonging to his people.", "scripture": ["Acts 2:41-42", "Hebrews 10:24-25", "Hebrews 13:17", "1 Corinthians 5:12-13"], "anchors": [{"source": "BFM2000", "ref": "Article VI ('associated by covenant')"}], "mastery": ["Can explain why membership is more than attendance: mutual covenant obligations", "Can state what a member owes the body and what the body owes the member"], "prerequisites": [{"id": "ecc.what-is-church", "strength": "hard", "rationale": "Membership is the mechanism of the covenant community; the definition of the church comes first."}, {"id": "ecc.baptism", "strength": "hard", "rationale": "Baptism is the entrance marker; membership in a Baptist church is membership of baptized believers."}]}, {"id": "ecc.baptism", "name": "Believer's Baptism", "band": 1, "summary": "Baptism is the immersion of a believer in water in the name of the Father, Son, and Holy Spirit: an act of obedience symbolizing faith in the crucified, buried, and risen Savior, the believer's death to sin, and resurrection to walk in newness of life. It is for believers, and it does not save.", "scripture": ["Matthew 28:19-20", "Romans 6:3-5", "Acts 8:36-38", "Colossians 2:12"], "anchors": [{"source": "BFM2000", "ref": "Article VII (Baptism and the Lord's Supper)"}], "mastery": ["Can state the three-fold symbolism from Romans 6 (death, burial, resurrection)", "Can explain why baptism follows conversion rather than causing it", "Can state Antioch's practice: immersion of professing believers"], "prerequisites": [{"id": "sot.faith", "strength": "hard", "rationale": "Believer's baptism is the public confession of faith already present; the subject of baptism is a believer by definition."}, {"id": "chr.resurrection", "strength": "soft", "rationale": "The sign's meaning is union with Christ's death and resurrection; the resurrection gives the coming-up-out-of-the-water its content."}], "contested": {"positions": ["Credobaptism: baptism of professing believers, normally by immersion (Baptist, most non-denominational)", "Paedobaptism: baptism of believers and their infant children as covenant sign (Presbyterian, Reformed, Anglican, Lutheran, Methodist)"], "house_position": "Credobaptism by immersion, per BFM2000 Article VII: the ordinance belongs to believers, and immersion pictures its meaning.", "note": "Band 3 must treat covenant-theology arguments for paedobaptism fairly (continuity with circumcision) and answer from newness of the new covenant (Jeremiah 31:31-34)."}, "errors": ["Baptismal regeneration (baptism as saving)"]}, {"id": "ecc.lords-supper", "name": "The Lord's Supper", "band": 1, "summary": "The Lord's Supper is a symbolic act of obedience whereby members of the church, through partaking of the bread and the fruit of the vine, memorialize the death of the Redeemer, examine themselves, and anticipate his second coming. It is a means of grace in the sense that Christ meets his people at the table by faith, not that the elements change.", "scripture": ["1 Corinthians 11:23-32", "Matthew 26:26-29", "Luke 22:19-20"], "anchors": [{"source": "BFM2000", "ref": "Article VII"}], "mastery": ["Can narrate the institution and state the three tenses of the Supper: remembering his death, examining ourselves now, anticipating his return", "Can explain self-examination from 1 Corinthians 11 without turning the table into a place of terror"], "prerequisites": [{"id": "chr.substitutionary-death", "strength": "hard", "rationale": "The Supper proclaims the Lord's death; broken body and shed blood are substitution enacted in sign."}, {"id": "ecc.membership", "strength": "soft", "rationale": "The Supper is a church ordinance, an act of the covenanted body, which membership makes concrete."}], "contested": {"positions": ["Memorialism: the elements are symbols; Christ is remembered (Baptist, Zwinglian heritage)", "Spiritual presence: Christ is truly present to faith by the Spirit (Reformed/Calvinist)", "Sacramental union / transubstantiation: Christ's body and blood present in or as the elements (Lutheran, Roman Catholic)"], "house_position": "Memorial view per BFM2000 Article VII, held warmly: a symbolic act, yet a real communion with Christ by faith at his table."}}, {"id": "ecc.polity", "name": "How the Church Is Governed", "band": 1, "summary": "Each local congregation operates under the Lordship of Christ through democratic processes: the gathered members are the final earthly court of appeal in matters of membership, discipline, and doctrine, while entrusting leadership to their pastors. Christ alone is head of the church.", "scripture": ["Matthew 18:15-17", "Acts 6:1-6", "1 Corinthians 5:4-5", "Colossians 1:18"], "anchors": [{"source": "BFM2000", "ref": "Article VI ('democratic processes... Christ as Lord')"}], "mastery": ["Can state that Christ is the head and the congregation acts under him", "Can name matters that come to the gathered church (membership, discipline)"], "prerequisites": [{"id": "ecc.membership", "strength": "hard", "rationale": "Congregational governance presupposes a defined congregation; only covenanted members can bear that responsibility."}], "contested": {"positions": ["Congregationalism, often elder-led: final authority under Christ rests with the gathered congregation (Baptist)", "Presbyterianism: governance by graded courts of elders (sessions, presbyteries)", "Episcopalianism: governance by bishops in historic succession (Anglican, Methodist, Catholic, Orthodox)"], "house_position": "Elder-led congregationalism per BFM2000 Article VI: the congregation is the final earthly authority, served and led by its pastors/elders."}}, {"id": "ecc.offices", "name": "Pastors and Deacons", "band": 1, "summary": "The New Testament church has two scriptural offices: pastors (also called elders and overseers, one office under three names) who teach, shepherd, and lead, and deacons who serve the body's practical needs. Both are qualified by character.", "scripture": ["1 Timothy 3:1-13", "Titus 1:5-9", "Acts 20:28", "1 Peter 5:1-4"], "anchors": [{"source": "BFM2000", "ref": "Article VI ('Its scriptural officers are pastors and deacons')"}], "mastery": ["Can name the two offices and their distinct functions (word and oversight; service)", "Can state that the qualification lists are overwhelmingly about character"], "prerequisites": [{"id": "ecc.polity", "strength": "hard", "rationale": "The offices operate within the congregational frame; leaders lead a body that remains responsible under Christ."}]}, {"id": "ecc.priesthood-of-believers", "name": "Priesthood of All Believers", "band": 1, "summary": "Every believer has direct access to God through Christ, the one mediator, and every believer is a priest called to offer spiritual sacrifices, intercede for others, and minister the word. No human intermediary stands between the Christian and God.", "scripture": ["1 Peter 2:5-9", "Hebrews 4:14-16", "1 Timothy 2:5", "Revelation 1:5-6"], "anchors": [{"source": "BFM2000", "ref": "Article VI; Preamble ('the priesthood of all believers')"}], "mastery": ["Can state that access to God is through Christ alone, for every believer equally", "Can explain what priesthood does not mean: private autonomy that ignores the congregation and its teachers"], "prerequisites": [{"id": "chr.ascension-session", "strength": "hard", "rationale": "Believer-priesthood rests on Christ's high priesthood; we draw near because he ever lives to intercede."}, {"id": "sot.adoption", "strength": "soft", "rationale": "The access of a priest is also the access of a child; adoption warms the doctrine."}]}, {"id": "ecc.discipline", "name": "Church Discipline and Restoration", "band": 1, "summary": "Christ gave his church a process for addressing unrepentant sin among members: private appeal, widening witness, and finally the action of the gathered congregation, always aiming at repentance and restoration, never revenge. Discipline is love refusing to abandon a wandering member.", "scripture": ["Matthew 18:15-17", "Galatians 6:1", "1 Corinthians 5:1-13", "2 Corinthians 2:6-8"], "anchors": [{"source": "BFM2000", "ref": "Article VI ('governed by His laws')"}], "mastery": ["Can walk through the Matthew 18 steps in order", "Can state the goal (restoration) and the spirit (gentleness, Galatians 6:1)"], "prerequisites": [{"id": "ecc.membership", "strength": "hard", "rationale": "Discipline is the covenant's accountability clause; you cannot be removed from a fellowship you never joined (1 Corinthians 5:12, 'those inside')."}, {"id": "sot.sanctification", "strength": "soft", "rationale": "Discipline is corporate sanctification: the body pursuing holiness together."}]}, {"id": "ecc.great-commission", "name": "The Great Commission", "band": 1, "summary": "The risen Christ commands his church to make disciples of all nations, baptizing and teaching them to obey all he commanded. Every Christian and every church is sent; missions and evangelism are not a department but the church's marching orders.", "scripture": ["Matthew 28:18-20", "Acts 1:8", "Romans 10:13-15"], "anchors": [{"source": "BFM2000", "ref": "Article XI (Evangelism and Missions)"}], "mastery": ["Can quote or closely paraphrase Matthew 28:18-20 and identify its one imperative (make disciples)", "Can name their own place in it: personal witness, sending, praying, going"], "prerequisites": [{"id": "sot.gospel", "strength": "hard", "rationale": "The commission is the delivery mandate for the message; without the gospel there is nothing to herald."}, {"id": "chr.ascension-session", "strength": "soft", "rationale": "'All authority has been given to me' grounds the command; the mission proceeds from the throne."}]}, {"id": "ecc.stewardship", "name": "Stewardship and Giving", "band": 1, "summary": "God is the source of all blessings; Christians hold time, talents, and material possessions in trust for his glory. Believers should give cheerfully, regularly, systematically, proportionately, and liberally to advance the Redeemer's cause through the local church.", "scripture": ["2 Corinthians 9:6-8", "Malachi 3:10", "1 Corinthians 16:2", "Matthew 6:19-21"], "anchors": [{"source": "BFM2000", "ref": "Article XIII (Stewardship)"}], "mastery": ["Can state the principle: ownership is God's, stewardship is ours", "Can describe generous giving as worship and treasure-placement (Matthew 6:21), not dues"], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Stewardship follows from creation: everything held is his because everything made is his."}, {"id": "ecc.membership", "strength": "soft", "rationale": "Giving is channeled through the covenant community; membership gives generosity its primary address."}]}, {"id": "esc.christ-returns", "name": "Christ Will Return", "band": 1, "summary": "Jesus Christ will return personally and visibly in glory to the earth. His coming is certain, its timing unknown, and its expectation is meant to produce watchfulness, holiness, and hope, not date-setting.", "scripture": ["Acts 1:11", "Titus 2:13", "Matthew 24:36", "1 Thessalonians 4:16-17"], "anchors": [{"source": "BFM2000", "ref": "Article X (Last Things)"}, {"source": "NiceneCreed", "ref": "'he shall come again, with glory'"}], "mastery": ["Can state the return as personal, visible, and bodily (Acts 1:11: 'in the same way')", "Can explain why date-setting is disobedience to Matthew 24:36", "Can name the practical fruit expectation should produce (Titus 2:12-13)"], "prerequisites": [{"id": "chr.ascension-session", "strength": "hard", "rationale": "The return is the reigning Christ coming from where he now is; ascension and return are one arc (Acts 1:11)."}]}, {"id": "esc.resurrection-judgment", "name": "Resurrection and Final Judgment", "band": 1, "summary": "All the dead will be raised bodily, and Christ will judge all people in righteousness. For those in Christ the judgment holds no condemnation; for those outside it confirms their sentence. Every life will be rendered an account.", "scripture": ["John 5:28-29", "Acts 17:31", "2 Corinthians 5:10", "Revelation 20:11-15"], "anchors": [{"source": "BFM2000", "ref": "Article X"}, {"source": "ApostlesCreed", "ref": "'from thence he shall come to judge the quick and the dead'"}], "mastery": ["Can state that resurrection is universal and bodily, for the just and unjust", "Can distinguish the believer's judgment (works evaluated, salvation secure) from condemnation"], "prerequisites": [{"id": "esc.christ-returns", "strength": "hard", "rationale": "The judgment is an event of the return; Christ himself is the appointed judge (Acts 17:31)."}, {"id": "chr.resurrection", "strength": "hard", "rationale": "Christ's bodily resurrection is the firstfruits and pattern of ours; deny his and the general resurrection loses its anchor (1 Corinthians 15:20)."}, {"id": "anth.wages-of-sin", "strength": "soft", "rationale": "Final judgment is the wages of sin reaching term; the earlier doctrine sets the stakes."}]}, {"id": "esc.eternal-states", "name": "Heaven and Hell", "band": 1, "summary": "The unrighteous will be consigned to hell, the place of everlasting punishment; the righteous, in resurrection bodies, will receive their reward and dwell forever with the Lord in the new heaven and new earth. The Christian hope is not escape from creation but its renewal, with God dwelling among his people.", "scripture": ["Matthew 25:46", "Revelation 21:1-5", "2 Thessalonians 1:9", "John 14:1-3"], "anchors": [{"source": "BFM2000", "ref": "Article X"}], "mastery": ["Can state both destinies without softening either, from Matthew 25:46's parallel ('eternal... eternal')", "Can describe the final hope concretely from Revelation 21: new creation, God with us, no more death", "Can correct the cloud-and-harp caricature with the embodied, renewed-earth hope"], "prerequisites": [{"id": "esc.resurrection-judgment", "strength": "hard", "rationale": "The eternal states are the judgment's outcomes; destiny follows verdict."}, {"id": "theo.god-is-love-and-just", "strength": "soft", "rationale": "Hell is just and heaven is grace; the doctrine of God keeps both destinies from seeming arbitrary."}], "errors": ["Universalism (all saved regardless)", "Annihilationism", "Disembodied cloud-heaven as the final state"]}, {"id": "ht.faith-once-delivered", "name": "The Faith Once for All Delivered", "band": 1, "summary": "Christianity is a received faith, not an invented one. From the beginning the church has confessed the same core truths in short summaries (creeds), guarded them against distortion, and handed them down. The Apostles' Creed is the oldest widely used summary of that deposit.", "scripture": ["Jude 3", "2 Timothy 1:13-14", "1 Corinthians 15:3-4", "2 Thessalonians 2:15"], "anchors": [{"source": "ApostlesCreed", "ref": "Whole text"}, {"source": "BFM2000", "ref": "Preamble (confessions as 'instruments of doctrinal accountability')"}], "mastery": ["Can state why creeds exist: to summarize and guard, never to replace, Scripture", "Can recite or closely follow the Apostles' Creed and connect each line to a doctrine already learned"], "prerequisites": [{"id": "bib.authority", "strength": "hard", "rationale": "Creeds have derivative authority only; the norming norm must be in place before subordinate standards are introduced, or the order of authority inverts."}, {"id": "theo.trinity", "strength": "soft", "rationale": "The creeds are Trinitarian in shape; a learner who knows the doctrine will recognize the structure."}]}, {"id": "ht.baptist-identity", "name": "Who Baptists Are", "band": 1, "summary": "Baptists are evangelical Christians marked by believer's baptism, regenerate church membership, congregational governance, religious liberty, and the authority of Scripture. Southern Baptist churches cooperate voluntarily through the SBC for missions and confess the Baptist Faith & Message 2000. Antioch has stood in this stream since 1979.", "scripture": ["Acts 2:41-42", "Galatians 1:6-9", "Matthew 22:21"], "anchors": [{"source": "BFM2000", "ref": "Preamble; Article XIV (Cooperation); Article XVII (Religious Liberty)"}], "mastery": ["Can name the Baptist distinctives and locate each in a doctrine already learned", "Can explain what the SBC is (voluntary cooperation of autonomous churches) and what the BFM2000 is for"], "prerequisites": [{"id": "ecc.baptism", "strength": "hard", "rationale": "The name is the distinctive; Baptist identity is unintelligible without believer's baptism."}, {"id": "ecc.polity", "strength": "hard", "rationale": "Congregational autonomy and voluntary cooperation are the polity distinctives that define the SBC's structure."}, {"id": "ht.faith-once-delivered", "strength": "soft", "rationale": "Baptist identity sits inside historic orthodoxy; the wider stream should be learned before the tributary."}]}, {"id": "pneu.spirit-is-god", "name": "The Spirit Is a Divine Person", "band": 1, "summary": "The Holy Spirit is not a force or influence but a person, and not a lesser being but fully God: he speaks, teaches, grieves, wills, and is lied to as God himself.", "scripture": ["Acts 5:3-4", "John 14:26", "Ephesians 4:30", "1 Corinthians 2:10-11"], "anchors": [{"source": "BFM2000", "ref": "Article II.C (God the Holy Spirit)"}, {"source": "NiceneCreed", "ref": "'the Lord and Giver of life... who with the Father and the Son together is worshiped'"}], "mastery": ["Can cite Acts 5:3-4 to show lying to the Spirit is lying to God", "Can name personal actions of the Spirit (teaching, grieving, willing) that a mere force cannot do"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "The Spirit's deity is confessed within monotheism, as with the Son; the claim is Trinitarian, not additive."}], "errors": ["Spirit as impersonal power or 'it'", "Pneumatomachianism (denying the Spirit's deity)"]}, {"id": "pneu.regeneration", "name": "The New Birth", "band": 1, "summary": "The Spirit gives new life to the spiritually dead. Regeneration is God's work, not self-improvement: a change of heart wrought by the Holy Spirit through conviction of sin, apart from which no one can see the kingdom of God.", "scripture": ["John 3:3-8", "Ezekiel 36:26-27", "Titus 3:5", "Ephesians 2:4-5"], "anchors": [{"source": "BFM2000", "ref": "Article IV.A (Regeneration)"}], "mastery": ["Can state that the new birth is God's act, as unearned as physical birth", "Can connect Ezekiel's heart of stone/heart of flesh to John 3"], "prerequisites": [{"id": "pneu.spirit-is-god", "strength": "soft", "rationale": "Knowing who the Spirit is dignifies what he does; but the experience of new birth is intelligible before the full doctrine of his person."}, {"id": "anth.sin-universal", "strength": "hard", "rationale": "New birth presupposes death: only those dead in sin need to be born again."}]}, {"id": "pneu.indwelling", "name": "The Spirit Indwells Believers", "band": 1, "summary": "Every believer receives the Holy Spirit at conversion. He dwells within as seal and down payment of the inheritance to come; the Christian's body is a temple of the Spirit.", "scripture": ["Romans 8:9", "1 Corinthians 6:19-20", "Ephesians 1:13-14"], "anchors": [{"source": "BFM2000", "ref": "Article II.C"}], "mastery": ["Can state that indwelling is true of every Christian, not a second-tier attainment", "Can explain 'seal' and 'guarantee' from Ephesians 1:13-14"], "prerequisites": [{"id": "pneu.regeneration", "strength": "hard", "rationale": "The Spirit indwells those he has made alive; indwelling is the continuation of regeneration."}]}, {"id": "pneu.sanctifying-work", "name": "The Spirit's Sanctifying Work", "band": 1, "summary": "The indwelling Spirit progressively conforms believers to Christ: convicting of sin, producing his frui ace, Not Works", "band": 1, "summary": "Salvation is God's free gift, given by grace through faith, not earned by works, so that no one may boast. Good works are the fruit of salvation, never its ground.", "scripture": ["Ephesians 2:8-10", "Titus 3:4-7", "Romans 4:4-5"], "anchors": [{"source": "BFM2000", "ref": "Article IV"}], "mastery": ["Can quote Ephesians 2:8-9 and state verse 10's place (works as fruit)", "Can diagnose works-righteousness in a concrete statement like 'I hope my good outweighs my bad'"], "prerequisites": [{"id": "sot.gospel", "strength": "hard", "rationale": "Grace-alone is the grammar of the gospel; it states how the announcement is received and guards it from becoming advice."}, {"id": "anth.sin-universal", "strength": "hard", "rationale": "If any were righteous, works could save someone; universal sin closes that door and makes grace the only way in."}]}, {"id": "sot.repentance", "name": "Repentance", "band": 1, "summary": "Repentance is a genuine turning from sin toward God: a change of mind that becomes a change of direction. It is inseparable from faith; the two are one turning described from its two sides.", "scripture": ["Mark 1:15", "Acts 3:19", "Luke 15:17-20", "2 Corinthians 7:10"], "anchors": [{"source": "BFM2000", "ref": "Article IV.A ('Repentance and faith are inseparable experiences of grace')"}], "mastery": ["Can define repentance as turning, not merely feeling sorry", "Can distinguish godly grief from worldly grief using 2 Corinthians 7:10 and the prodigal son"], "prerequisites": [{"id": "anth.sin-universal", "strength": "hard", "rationale": "One turns from something; repentance presupposes owned, personal sin."}, {"id": "sot.gospel", "strength": "hard", "rationale": "Gospel repentance turns toward the God who has provided mercy; without the announcement it is only remorse."}]}, {"id": "sot.faith", "name": "Saving Faith", "band": 1, "summary": "Saving faith is the acceptance of Jesus Christ and wholehearted commitment of the ent  "name": "Adoption", "band": 1, "summary": "In Christ, God does more than acquit: he adopts. Believers are made sons and daughters of God, given the Spirit of adoption by whom they cry 'Abba, Father,' and made heirs with Christ.", "scripture": ["John 1:12-13", "Romans 8:14-17", "Galatians 4:4-7", "1 John 3:1"], "anchors": [{"source": "BFM2000", "ref": "Article IV ('the believer into a relationship of peace and favor with God')"}], "mastery": ["Can distinguish adoption (family standing) from justification (legal standing)", "Can pray to God as Father with warrant, and explain that warrant from Galatians 4"], "prerequisites": [{"id": "sot.justification", "strength": "hard", "rationale": "The Judge acquits before the Father embraces; adoption builds on the cleared verdict."}, {"id": "theo.father", "strength": "soft", "rationale": "Adoption brings believers into the Son's own relation to the Father; the Trinitarian name gives adoption its content."}]}, {"id": "sot.sanctification", "name": "Sanctification", "band": 1, "summary": "Sanctification is the lifelong process, beginning in regeneration, by which the believer is set apart to God's purposes and grows toward the likeness of Christ. It is progressive, never complete in this life, and both God's work and the believer's fight.", "scripture": ["1 Thessalonians 4:3", "Philippians 1:6", "Romans 6:11-14", "Hebrews 12:14"], "anchors": [{"source": "BFM2000", "ref": "Article IV.B (Sanctification)"}], "mastery": ["Can place sanctification correctly: after justification, distinct from it, flowing from it", "Can describe growth as normal but gradual, guarding against both perfectionism and complacency"], "prerequisites": [{"id": "sot.justification", "strength": "hard", "rationale": "Holiness grows from acceptance, not toward it; reversing the order rebuilds works-righteousness."}, {"id": "pneu.sanctifying-work", "strength": "hard", "rationale": "Sanctification is the Spirit's work experienced from the believer's side; the two concepts are one reality from two angles."}]}, {"id": "sot.perseverance", "name": "Perseverance of the Saints", "band": 1, "summary": "All true believers endure to the end. Those God has accepted in Christ and sanctified by his Spirit will never fall away from the state of grace; they are kept by the power of God through faith unto salvation.", "scripture": ["John 10:27-30", "Philippians 1:6", "Romans 8:38-39", "1 Peter 1:3-5"], "anchors": [{"source": "BFM2000", "ref": "Article V (God's Purpose of Grace)"}], "mastery": ["Can state the doctrine from John 10: no one snatches them from his hand", "Can answer 'what about people who fall away?' using 1 John 2:19 (they went out because they were not of us)", "Can distinguish assurance grounded in Christ's keeping from presumption that ignores persistent unrepentance"], "prerequisites": [{"id": "sot.justification", "strength": "hard", "rationale": "Security rests on the finality of the verdict; if justification is full and final, condemnation cannot return."}, {"id": "pneu.indwelling", "strength": "hard", "rationale": "The sealing of the Spirit is the down payment that guarantees the inheritance; perseverance is that seal holding."}, {"id": "theo.god-is-sovereign", "strength": "soft", "rationale": "The keeping power is God's; a God who could be thwarted could not promise to keep."}], "contested": {"positions": ["Perseverance of the saints: true believers are kept by God and will endure (Baptist, Reformed)", "Conditional security: genuine believers can finally fall away through unbelief or apostasy (Arminian, Wesleyan)"], "house_position": "Perseverance of the saints, per BFM2000 Article V: real perseverance in faith and holiness is the evidence of genuine conversion, and God keeps his own.", "note": "Band 3 treatment must handle the warning passages (Hebrews 6, 10) honestly as means God uses to preserve his people."}}, {"id": "theo.one-god", "name": "There Is One God", "band": 1, "summary": "There is one and only one living ally exists as three persons: Father, Son, and Holy Spirit. Each person is fully God, the persons are distinct, and yet there is one God, without division of nature, essence, or being.", "scripture": ["Matthew 28:19", "2 Corinthians 13:14", "Matthew 3:16-17", "John 1:1-3"], "anchors": [{"source": "BFM2000", "ref": "Article II"}, {"source": "NiceneCreed", "ref": "Full structure"}, {"source": "AthanasianCreed", "ref": "Lines 3-28"}], "mastery": ["Can state the three claims: one God; three distinct persons; each person fully God", "Can recognize why 'three gods' and 'one God wearing three masks' are both wrong", "Can point to Jesus' baptism as a scene where all three persons act distinctly"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "Without monotheism firmly in place, teaching threeness produces tritheism. The doctrine is only startling, and only true, against the Shema."}, {"id": "chr.deity", "strength": "hard", "rationale": "The Trinity is confessed because Scripture presents the Son as fully God; remove the deity of Christ and the doctrine dissolves."}, {"id": "pneu.spirit-is-god", "strength": "hard", "rationale": "Likewise the personhood and deity of the Spirit is a load-bearing premise of the doctrine."}], "errors": ["Modalism (one person, three modes)", "Arianism (the Son as highest creature)", "Tritheism"]}, {"id": "theo.father", "name": "God the Father", "band": 1, "summary": "The first person of the Trinity is Father: eternally Father to the Son, providential Father over creation, and by adoption the Father of all who believe, who may approach him with the confidence of children.", "scripture": ["Matthew 6:9", "John 20:17", "Romans 8:15", "Ephesians 1:3-5"], "anchors": [{"source": "BFM2000", "ref": "Article II.A (God the Father)"}, {"source": "ApostlesCreed", "ref": "'I believe in God the Father Almighty'"}], "mastery": ["Can distinguish the senses of God's fatherhood: of the Son eternally, of creation providentially, of believers by adoption", "Can explain why the Lord's Prayer begins 'Our Father' and what confidence that grants"], "prerequisites": [{"id": "theo.trinity", "strength": "hard", "rationale": "'Father' is a Trinitarian name before it is a relational comfort; he is Father first with respect to the Son."}]}], "domains": {"bib": {"label": "Scripture", "color": "#9A7B24"}, "theo": {"label": "God & Trinity", "color": "#6B121E"}, "chr": {"label": "Christology", "color": "#55357E"}, "pneu": {"label": "Holy Spirit", "color": "#2E6E5B"}, "anth": {"label": "Man & Sin", "color": "#7A5638"}, "sot": {"label": "Salvation", "color": "#B03A4A"}, "ecc": {"label": "The Church", "color": "#2F5382"}, "esc": {"label": "Last Things", "color": "#B4671E"}, "bt": {"label": "Redemptive History", "color": "#5E7031"}, "ht": {"label": "Historical", "color": "#5A6B7C"}, "apo": {"label": "Apologetics", "color": "#7D4A66"}}};

const concepts = DATA.concepts, domains = DATA.domains;
const byId = Object.fromEntries(concepts.map(c=>[c.id,c]));
const dom = id => id.split(".")[0];

/* ---- layout: topological levels + barycenter ordering ---- */
const dependents = {}; concepts.forEach(c=>dependents[c.id]=[]);
concepts.forEach(c=>c.prerequisites.forEach(p=>dependents[p.id].push(c.id)));
let placed=new Set(), levels=[], rem=new Set(concepts.map(c=>c.id));
while(rem.size){
  const lvl=[...rem].filter(id=>byId[id].prerequisites.every(p=>placed.has(p.id))).sort();
  lvl.forEach(id=>{placed.add(id); rem.delete(id)});
  levels.push(lvl);
}
const domOrder = Object.keys(domains);
levels.forEach(l=>l.sort((a,b)=>domOrder.indexOf(dom(a))-domOrder.indexOf(dom(b))||a.localeCompare(b)));
const pos={};
function idx(l){const m={}; l.forEach((id,i)=>m[id]=i); return m}
for(let sweep=0; sweep<4; sweep++){
  const down = sweep%2===0;
  const order = down? [...levels.keys()].slice(1) : [...levels.keys()].slice(0,-1).reverse();
  for(const li of order){
    const ref = idx(levels[down? li-1 : li+1]);
    levels[li].sort((a,b)=>{
      const bc=id=>{
        const ns = down? byId[id].prerequisites.map(p=>p.id) : dependents[id];
        const xs = ns.filter(n=>n in ref).map(n=>ref[n]);
        return xs.length? xs.reduce((s,x)=>s+x,0)/xs.length : ref[id]??0;
      };
      return bc(a)-bc(b)||a.localeCompare(b);
    });
  }
}
/* pixel positions */
const font="600 10.5px system-ui"; const meas=document.createElement("canvas").getContext("2d"); meas.font=font;
const nw = id => Math.ceil(meas.measureText(byId[id].name).width)+(byId[id].contested?34:20);
const NH=26, VGAP=64, HGAP=14, LEFT=70, TOP=44;
let maxW=0;
levels.forEach(l=>{ maxW=Math.max(maxW, l.reduce((s,id)=>s+nw(id)+HGAP,0)-HGAP); });
const W=Math.max(maxW+LEFT+40, 900), H=TOP+levels.length*(NH+VGAP);
levels.forEach((l,li)=>{
  const total=l.reduce((s,id)=>s+nw(id)+HGAP,0)-HGAP;
  let x=LEFT+(W-LEFT-40-total)/2;
  l.forEach(id=>{ pos[id]={x, y:TOP+li*(NH+VGAP), w:nw(id), lvl:li}; x+=nw(id)+HGAP; });
});

/* ---- render ---- */
const svg=document.getElementById("svg");
svg.setAttribute("width",W); svg.setAttribute("height",H);
svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
const NS="http://www.w3.org/2000/svg";
const el=(t,a)=>{const e=document.createElementNS(NS,t); for(const k in a)e.setAttribute(k,a[k]); return e};
const roman=n=>["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV","XVI","XVII","XVIII"][n-1]||n;
levels.forEach((_,li)=>{
  const y=TOP+li*(NH+VGAP)+NH/2;
  svg.appendChild(el("line",{class:"unitline",x1:8,y1:y,x2:W,y2:y}));
  const t=el("text",{class:"unitlabel",x:14,y:y+4}); t.textContent="Unit "+roman(li+1); svg.appendChild(t);
});
const edgeG=el("g",{}), nodeG=el("g",{}); svg.appendChild(edgeG); svg.appendChild(nodeG);
const edgeEls=[];
concepts.forEach(c=>c.prerequisites.forEach(p=>{
  const a=pos[p.id], b=pos[c.id];
  const x1=a.x+a.w/2, y1=a.y+NH, x2=b.x+b.w/2, y2=b.y;
  const path=el("path",{class:"edge"+(p.strength==="soft"?" soft":""),
    d:`M${x1},${y1} C${x1},${y1+VGAP*.55} ${x2},${y2-VGAP*.55} ${x2},${y2}`});
  path.dataset.from=p.id; path.dataset.to=c.id; path.dataset.strength=p.strength;
  edgeG.appendChild(path); edgeEls.push(path);
}));
const nodeEls={};
concepts.forEach(c=>{
  const p=pos[c.id], color=domains[dom(c.id)].color;
  const g=el("g",{class:"node",transform:`translate(${p.x},${p.y})`});
  g.appendChild(el("rect",{width:p.w,height:NH,fill:color}));
  const t=el("text",{x:p.w/2 - (c.contested?6:0), y:NH/2+3.5, "text-anchor":"middle"});
  t.textContent=c.name; g.appendChild(t);
  if(c.contested){const f=el("text",{class:"flag", x:p.w-13, y:NH/2+3.5}); f.textContent="⚑"; g.appendChild(f);}
  const title=el("title",{}); title.textContent=c.name+" — "+c.summary; g.appendChild(title);
  g.addEventListener("click",()=>select(c.id));
  nodeG.appendChild(g); nodeEls[c.id]=g;
});

/* ---- legend & stats ---- */
document.getElementById("legend").innerHTML = Object.entries(domains)
  .map(([k,v])=>`<span class="lg"><span class="sw" style="background:${v.color}"></span>${v.label}</span>`).join("")
  +`<span class="lg" style="margin-left:8px">⚑ contested — positions differ among the orthodox</span>`;
const nE=concepts.reduce((s,c)=>s+c.prerequisites.length,0);
const nH=concepts.reduce((s,c)=>s+c.prerequisites.filter(p=>p.strength==="hard").length,0);
document.getElementById("stats").textContent=`${concepts.length} doctrines · ${nE} dependencies (${nH} hard, ${nE-nH} soft) · Band I: Foundations`;

/* ---- selection: light the ancestor lineage ---- */
let selected=null;
function ancestors(id){
  const seen=new Set([id]); const stack=[id];
  while(stack.length){ byId[stack.pop()].prerequisites.forEach(p=>{
    if(!seen.has(p.id)){seen.add(p.id); stack.push(p.id);} });}
  return seen;
}
function select(id){
  selected=id;
  const keep=ancestors(id);
  concepts.forEach(c=>{
    nodeEls[c.id].classList.toggle("dim", !keep.has(c.id));
    nodeEls[c.id].classList.toggle("selected", c.id===id);
  });
  edgeEls.forEach(e=>{
    const inChain = keep.has(e.dataset.to) && keep.has(e.dataset.from);
    e.classList.toggle("lit", inChain);
    e.classList.toggle("dim", !inChain);
  });
  renderPanel(id);
}
function clearSel(){
  selected=null;
  Object.values(nodeEls).forEach(n=>n.classList.remove("dim","selected"));
  edgeEls.forEach(e=>e.classList.remove("dim","lit"));
  document.getElementById("panel").classList.remove("open");
}
document.getElementById("clearBtn").addEventListener("click",clearSel);
document.getElementById("softToggle").addEventListener("change",e=>{
  edgeEls.forEach(p=>{ if(p.dataset.strength==="soft") p.style.display=e.target.checked?"":"none"; });
});

/* ---- detail panel ---- */
const esc=s=>s.replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
function renderPanel(id){
  const c=byId[id], d=domains[dom(id)];
  const req=dependents[id].map(x=>byId[x]);
  let h=`<div class="pdomain" style="color:${d.color}">${d.label} · Band ${c.band}</div>
    <h2>${esc(c.name)}</h2><div class="pid">${c.id}</div>
    <div class="summary">${esc(c.summary)}</div>
    <h3>Scripture</h3><div class="chips">${c.scripture.map(s=>`<span class="chip">${esc(s)}</span>`).join("")}</div>
    <h3>Anchored to</h3><div class="chips">${c.anchors.map(a=>`<span class="chip">${esc(a.source)} — ${esc(a.ref)}</span>`).join("")}</div>
    <h3>Evidence of mastery</h3><ul class="mastery">${c.mastery.map(m=>`<li>${esc(m)}</li>`).join("")}</ul>`;
  if(c.prerequisites.length){
    h+=`<h3>Stands on</h3>`+c.prerequisites.map(p=>`
      <div class="prereq ${p.strength}"><a onclick="select('${p.id}')">${esc(byId[p.id].name)}</a>
      <span class="badge ${p.strength}">${p.strength}</span>
      <div class="rationale">${esc(p.rationale)}</div></div>`).join("");
  }
  if(req.length){
    h+=`<h3>Required by</h3><div class="chips">${req.map(r=>`<span class="chip" style="cursor:pointer" onclick="select('${r.id}')">${esc(r.name)}</span>`).join("")}</div>`;
  }
  if(c.errors) h+=`<h3>Guards against</h3><ul class="mastery errors">${c.errors.map(e2=>`<li>${esc(e2)}</li>`).join("")}</ul>`;
  if(c.contested){
    h+=`<h3>Contested among the orthodox</h3><div class="contested">
      ${c.contested.positions.map(p=>`<div>· ${esc(p)}</div>`).join("")}
      <div class="house">Antioch teaches: ${esc(c.contested.house_position)}</div>
      ${c.contested.note?`<div class="rationale" style="margin-top:6px">${esc(c.contested.note)}</div>`:""}</div>`;
  }
  const panel=document.getElementById("panel");
  panel.innerHTML=h; panel.classList.add("open"); panel.scrollTop=0;
}
window.select=select;
</script>
</body>
</html>
