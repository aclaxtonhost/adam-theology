tion as the relational fruit of the wrath-satisfying work of the cross.", "Apply pastorally: assure a believer who still feels distant from God that in Christ the estrangement has already been ended."], "prerequisites": [{"id": "sot.propitiation", "strength": "hard", "rationale": "God's wrath must first be propitiated before friendship with him is possible; reconciliation is the relational result of the wrath-satisfying transaction propitiation describes."}, {"id": "anth.the-fall", "strength": "soft", "rationale": "The estrangement reconciliation overcomes traces back to the hostility toward God introduced at the fall."}]}, {"id": "sot.glorification", "name": "Glorification", "band": 2, "summary": "The golden chain of salvation ends not in death but in resurrection glory: those God foreknew, predestined, called, and justified he will certainly conform to the image of his Son in a body like Christ's own risen body. Glorification is the believer's guaranteed future, not a possibility to be earned.", "scripture": ["Romans 8:29-30", "Philippians 3:20-21", "1 John 3:2"], "anchors": [{"source": "BFM2000", "ref": "Article IV.D, Glorification"}, {"source": "2LBC1689", "ref": "Chapter 31, Paragraph 1"}], "mastery": ["Explain from Scripture how glorification completes the golden chain that begins in God's foreknowledge and predestination.", "Connect glorification to Christ's own bodily resurrection as its pattern and guarantee.", "Apply pastorally: comfort a believer facing bodily decay or death with the certainty of a coming resurrection body like Christ's."], "prerequisites": [{"id": "sot.justification", "strength": "hard", "rationale": "Romans 8:30 runs its chain directly from justification to glorification \u2014 'those whom he justified he also glorified' \u2014 the past-tense certainty of the verdict is what makes the future glory already spoken of as done."}, {"id": "chr.resurrection", "strength": "hard", "rationale": "The nature of the believer's future glorified body is defined by, and guaranteed through union with, Christ's own bodily resurrection as the pattern it will follow."}, {"id": "sot.perseverance", "strength": "soft", "rationale": "Perseverance is the guarded road between the verdict and the glory; it enriches the individual believer's assurance of arriving, though the doctrine's certainty rests on Romans 8:30 itself."}]}, {"id": "sot.atonement-extent", "name": "The Extent of the Atonement", "band": 3, "summary": "Christ's death was not a potential atonement awaiting human activation but an actual one: designed by the Father, accomplished by the Son, and applied by the Spirit for the elect particularly, securing \u2014 not merely making possible \u2014 the salvation of everyone for whom it was made. The good shepherd lays down his life for the sheep; the husband gave himself for the bride. Its worth is sufficient for the whole world, its saving design is for those the Father gave the Son, and the gospel is nonetheless sincerely and freely offered to all.", "scripture": ["John 10:11-15", "John 10:26-29", "John 6:37-39", "Ephesians 5:25", "Matthew 1:21", "Revelation 5:9"], "anchors": [{"source": "2LBC1689", "ref": "8.8 ('to all those for whom Christ hath obtained eternal redemption, He doth certainly and effectually apply and communicate the same')"}, {"source": "2LBC1689", "ref": "8.5"}], "mastery": ["Teach the particularist case from the design texts: the sheep (John 10), those given by the Father (John 6:37-39), the church as bride (Eph 5:25), a people ransomed from every tribe (Rev 5:9), and the double-payment argument \u2014 a wrath actually propitiated cannot be exacted twice.", "Represent the general-atonement reading of 1 John 2:2, 1 Timothy 2:4-6, and 2 Peter 2:1 at its strongest, as its adherents within the SBC would state it, along with the Amyraldian and 'sufficient for all, efficient for the elect' mediating positions.", "Distinguish definite atonement from what it does not entail: the free and sincere offer of the gospel to every hearer stands, evangelism is not narrowed, and no one is turned away who comes \u2014 the doctrine tells us why any come at all.", "Teach the band discipline: this doctrine is taught from band 3; bands 1-2 speak in the BFM2000's own breadth ('offered freely to all who accept Jesus Christ')."], "prerequisites": [{"id": "chr.substitutionary-death", "strength": "hard", "rationale": "The extent question is a question about substitution's design \u2014 in whose place, and to what effect, the Substitute stood; without penal substitution there is no 'for whom' to ask."}, {"id": "sot.propitiation", "strength": "hard", "rationale": "Actual wrath-satisfaction is what forces the question: if God's wrath was truly propitiated for every person, none could finally perish under it \u2014 the doctrine of propitiation makes the extent question unavoidable rather than academic."}, {"id": "sot.election", "strength": "hard", "rationale": "Particularity in the atonement follows the particularity of election: the Son lays down his life for those the Father gives him (John 6:37-39; 10:29), so the atonement's design tracks the Father's choice."}, {"id": "sot.gospel", "strength": "soft", "rationale": "The doctrine must be taught alongside the gospel's free universal offer, which it grounds rather than threatens; the offer is sincere because the atonement offered is actual and sufficient."}], "contested": {"positions": ["Particular (definite) atonement: Christ's death was designed for the elect and actually secures their salvation (Dort; Second London Confession; Owen).", "General atonement: Christ died for every person, with the atonement's benefit applied only to those who believe (classical Arminianism and a broad stream within the SBC, citing 1 John 2:2, 1 Tim 2:4-6, 2 Pet 2:1).", "Mediating positions: hypothetical universalism and Amyraldianism \u2014 an atonement universal in provision or ordained intent, particular in effectual application (Davenant, Ussher; common as 'four-point Calvinism' among Southern Baptists)."], "house_position": "Particular redemption \u2014 the fully Calvinist, definite atonement position, per the pastor's confirmed conviction (July 2026). Taught from band 3 upward with the free offer explicitly affirmed alongside it; bands 1-2 remain within the BFM2000's deliberate breadth.", "note": "This completes the confessionally Reformed soteriology at bands 2-3 (with sot.election and sot.effectual-calling). Pastoral care: the doctrine comforts the believer (a redemption that cannot fail) and must never be taught in a way that makes any hearer wonder whether they are permitted to come."}}, {"id": "theo.one-god", "name": "There Is One God", "band": 1, "summary": "There is one and only one living and true God. He is the source, sustainer, and end of all things, and he alone is to be worshiped.", "scripture": ["Deuteronomy 6:4-5", "Isaiah 45:5-6", "1 Corinthians 8:4-6"], "anchors": [{"source": "BFM2000", "ref": "Article II (God)"}, {"source": "NiceneCreed", "ref": "'We believe in one God'"}], "mastery": ["Can quote or closely paraphrase the Shema (Deuteronomy 6:4)", "Can state that monotheism excludes all rival gods, idols, and ultimate powers"], "prerequisites": [], "errors": ["Polytheism", "Idolatry", "Practical atheism"]}, {"id": "theo.creator", "name": "God the Creator", "band": 1, "summary": "God created all things from nothing by the word of his power, freely and for his glory. Creation is distinct from God, dependent on him, and originally declared very good.", "scripture": ["Genesis 1:1", "Genesis 1:31", "Hebrews 11:3", "Revelation 4:11"], "anchors": [{"source": "BFM2000", "ref": "Article II"}, {"source": "ApostlesCreed", "ref": "'Maker of heaven and earth'"}], "mastery": ["Can state that God created from nothing (ex nihilo) and that creation is not divine", "Can explain why creatureliness means dependence and accountability"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "Creation ex nihilo by one God is what distinguishes biblical creation from pagan cosmologies where gods shape pre-existing stuff or emanate the world."}], "errors": ["Pantheism (world = God)", "Eternal matter", "Creation as emanation of the divine"]}, {"id": "theo.god-is-holy", "name": "God Is Holy", "band": 1, "summary": "God is perfect in holiness: utterly set apart from creation and utterly pure, without sin or shadow. His holiness is the attribute heaven never stops announcing.", "scripture": ["Isaiah 6:1-5", "1 Peter 1:15-16", "Habakkuk 1:13", "Revelation 4:8"], "anchors": [{"source": "BFM2000", "ref": "Article II"}], "mastery": ["Can define holiness in both senses: transcendent otherness and moral purity", "Can describe Isaiah's response to God's holiness and why it is the fitting human response"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "Holiness as set-apartness assumes the Creator-creature distinction that monotheism establishes."}]}, {"id": "theo.god-is-sovereign", "name": "God Is Sovereign", "band": 1, "summary": "God reigns over all things. Nothing happens outside his providence; he works all things according to the counsel of his will, and no purpose of his can be thwarted.", "scripture": ["Psalm 115:3", "Daniel 4:34-35", "Ephesians 1:11", "Romans 8:28"], "anchors": [{"source": "BFM2000", "ref": "Article II"}], "mastery": ["Can state that God's rule extends over nature, nations, and individual lives", "Can apply Romans 8:28 to a concrete circumstance without flattening real grief"], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "God's right and power to govern all things rests on his having made all things."}], "errors": ["Deism", "Open theism (a God who does not know or govern the future)"]}, {"id": "theo.god-is-love-and-just", "name": "God Is Loving and Just", "band": 1, "summary": "God is love: he gives himself for the good of his creatures, supremely in sending his Son. He is also perfectly just: he cannot ignore sin or acquit the guilty by pretending. The cross is where both meet without compromise.", "scripture": ["1 John 4:8-10", "Exodus 34:6-7", "Psalm 89:14", "Romans 3:25-26"], "anchors": [{"source": "BFM2000", "ref": "Article II"}], "mastery": ["Can state both attributes without sacrificing either (not love without justice, nor justice without love)", "Can cite Exodus 34:6-7 as God's own self-description holding both together"], "prerequisites": [{"id": "theo.god-is-holy", "strength": "hard", "rationale": "God's justice is his holiness engaging sin; his love is holy love. Without holiness both attributes collapse into sentiment or severity."}]}, {"id": "theo.trinity", "name": "The Trinity", "band": 1, "summary": "The one God eternally exists as three persons: Father, Son, and Holy Spirit. Each person is fully God, the persons are distinct, and yet there is one God, without division of nature, essence, or being.", "scripture": ["Matthew 28:19", "2 Corinthians 13:14", "Matthew 3:16-17", "John 1:1-3"], "anchors": [{"source": "BFM2000", "ref": "Article II"}, {"source": "NiceneCreed", "ref": "Full structure"}, {"source": "AthanasianCreed", "ref": "Lines 3-28"}], "mastery": ["Can state the three claims: one God; three distinct persons; each person fully God", "Can recognize why 'three gods' and 'one God wearing three masks' are both wrong", "Can point to Jesus' baptism as a scene where all three persons act distinctly"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "Without monotheism firmly in place, teaching threeness produces tritheism. The doctrine is only startling, and only true, against the Shema."}, {"id": "chr.deity", "strength": "hard", "rationale": "The Trinity is confessed because Scripture presents the Son as fully God; remove the deity of Christ and the doctrine dissolves."}, {"id": "pneu.spirit-is-god", "strength": "hard", "rationale": "Likewise the personhood and deity of the Spirit is a load-bearing premise of the doctrine."}], "errors": ["Modalism (one person, three modes)", "Arianism (the Son as highest creature)", "Tritheism"]}, {"id": "theo.father", "name": "God the Father", "band": 1, "summary": "The first person of the Trinity is Father: eternally Father to the Son, providential Father over creation, and by adoption the Father of all who believe, who may approach him with the confidence of children.", "scripture": ["Matthew 6:9", "John 20:17", "Romans 8:15", "Ephesians 1:3-5"], "anchors": [{"source": "BFM2000", "ref": "Article II.A (God the Father)"}, {"source": "ApostlesCreed", "ref": "'I believe in God the Father Almighty'"}], "mastery": ["Can distinguish the senses of God's fatherhood: of the Son eternally, of creation providentially, of believers by adoption", "Can explain why the Lord's Prayer begins 'Our Father' and what confidence that grants"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "The Father who is addressed in prayer is the one true God of the Shema; monotheism is the floor beneath the name."}, {"id": "theo.trinity", "strength": "soft", "rationale": "'Father' is ultimately a Trinitarian name \u2014 he is Father first with respect to the Son \u2014 so the doctrine of the Trinity deepens what the name means, though the Creed rightly teaches the Father first."}]}, {"id": "theo.aseity", "name": "Aseity (Self-Existence)", "band": 2, "summary": "God exists in and of himself, depending on nothing and no one outside himself for his being. He is the uncaused source of all that exists, giving life and breath to everything without himself needing anything.", "scripture": ["Genesis 1:1", "John 5:26", "Acts 17:24-28", "Isaiah 40:13-14"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 2, Paragraph 1 (\"whose subsistence is in and of Himself\")"}, {"source": "BFM2000", "ref": "Article II, Preamble"}], "mastery": ["Explain from Scripture why God's existence depends on nothing outside himself.", "Connect aseity to God's role as Creator and sustainer of all things.", "Apply pastorally: ground the believer's security in a God who needs nothing yet freely gives everything."], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Aseity is what makes God able to create everything else from nothing; only a self-existent being can be the uncaused first cause behind all creation."}, {"id": "theo.one-god", "strength": "soft", "rationale": "Aseity presupposes there is exactly one self-existent being, not many competing sources of existence."}]}, {"id": "theo.immutability", "name": "Immutability", "band": 2, "summary": "God does not change in his character, purposes, or promises. The unchanging faithfulness of his nature is the ground of every promise he has ever made.", "scripture": ["Malachi 3:6", "James 1:17", "Numbers 23:19"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 2, Paragraph 1 (\"immutable\")"}, {"source": "AthanasianCreed", "ref": "the coequal-and-coeternal clauses"}], "mastery": ["Explain from Scripture why God's unchanging character undergirds his covenant faithfulness.", "Connect immutability to God's sovereignty and his other unchanging attributes.", "Apply pastorally: comfort a doubting believer with the fact that God's promises cannot shift or fail."], "prerequisites": [{"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "A sovereign God's plans can only be certain if his character and purposes never shift; immutability is what makes sovereign rule trustworthy rather than arbitrary."}, {"id": "theo.one-god", "strength": "soft", "rationale": "Immutability describes the one true God as distinct from any changeable, humanlike deity."}]}, {"id": "theo.omniscience", "name": "Omniscience", "band": 2, "summary": "God knows all things perfectly and exhaustively \u2014 everything actual and everything possible, including what free creatures would do under circumstances that never occur. Nothing is hidden from him, and nothing surprises him.", "scripture": ["Psalm 139:16", "Hebrews 4:13", "Matthew 11:21-23", "1 Samuel 23:5-14"], "anchors": [{"source": "BFM2000", "ref": "Article II, Preamble (\"all powerful and all knowing... including the future decisions of His free creatures\")"}, {"source": "2LBC1689", "ref": "Chapter 2, Paragraph 2"}], "mastery": ["Explain from Scripture that God's knowledge includes even the free decisions his creatures would make in circumstances that never happen.", "Connect omniscience to God's sovereignty and providence in ordering history.", "Apply pastorally: assure a believer facing an unknown future that nothing about it is unknown to God."], "prerequisites": [{"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "God's sovereign rule over history requires that he actually know, not merely guess at, every contingency his plan must account for."}, {"id": "theo.one-god", "strength": "soft", "rationale": "Omniscience is a perfection of the one true God, distinguishing him from finite gods who must learn."}]}, {"id": "theo.omnipotence", "name": "Omnipotence", "band": 2, "summary": "God is able to do all that is consistent with his own perfect character; nothing he purposes to accomplish can be thwarted. His power is not raw force but the free exercise of his holy will.", "scripture": ["Genesis 17:1", "Job 42:2", "Jeremiah 32:17", "Revelation 1:8"], "anchors": [{"source": "ApostlesCreed", "ref": "Article 1 (\"God the Father Almighty\")"}, {"source": "NiceneCreed", "ref": "Article 1 (\"one God, the Father Almighty\")"}], "mastery": ["Explain from Scripture that God's power is limited only by his own character, never by anything outside himself.", "Connect omnipotence to God's roles as Creator and covenant-keeper.", "Apply pastorally: encourage prayer that rests on the truth that nothing is too hard for God."], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Creation out of nothing is the paradigm case of omnipotence; the God who could speak the universe into being is the God whose power has no rival."}, {"id": "theo.god-is-sovereign", "strength": "soft", "rationale": "Omnipotence supplies the power behind God's sovereign decrees so that what he purposes he is able to accomplish."}]}, {"id": "theo.omnipresence", "name": "Omnipresence", "band": 2, "summary": "God is fully present everywhere at once, not spread thin across space but wholly himself in every place. There is nowhere a creature can go to escape him, and nowhere he is absent to help.", "scripture": ["Psalm 139:7-10", "1 Kings 8:27", "Jeremiah 23:23-24"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 2, Paragraph 1 (\"immense\")"}, {"source": "AthanasianCreed", "ref": "the incomprehensible/immense clauses"}], "mastery": ["Explain from Scripture why no place is outside God's presence, including heaven's highest heights.", "Connect omnipresence to God's omniscience \u2014 he sees all because he is present to all.", "Apply pastorally: comfort the isolated or fearful believer that God is near even when no one else is."], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Because God made space itself rather than existing within it as one more object, his presence is not confined the way a created being's is; the Creator/creature distinction grounds his presence everywhere in creation."}, {"id": "theo.omniscience", "strength": "soft", "rationale": "God's exhaustive knowledge of every place coheres with his being personally present in every place."}]}, {"id": "theo.providence", "name": "Providence", "band": 2, "summary": "God actively governs every event in creation, working through ordinary causes \u2014 human choices, natural laws, even evil intentions \u2014 to accomplish his purposes. His sovereignty is not bare decree from a distance but hands-on rule over history's smallest and largest details.", "scripture": ["Proverbs 16:33", "Genesis 50:20", "Job 1:21", "Acts 17:28"], "anchors": [{"source": "BFM2000", "ref": "Article II.A, God the Father"}, {"source": "2LBC1689", "ref": "Chapter 5, Of Divine Providence"}], "mastery": ["Explain from Scripture how God governs through, not around, ordinary causes such as human decisions.", "Connect providence to God's sovereignty as the 'how' behind the 'that' of his rule over all things.", "Apply pastorally: help a believer see God's hand in circumstances that look, on the surface, like mere chance or others' cruelty."], "prerequisites": [{"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "Providence is sovereignty in action \u2014 the concrete, moment-by-moment outworking of the fact that God rules over all; you cannot grasp the how without first holding the that."}, {"id": "theo.omnipotence", "strength": "soft", "rationale": "Governing every proximate cause in creation without being thwarted requires the power omnipotence describes."}]}, {"id": "theo.simplicity", "name": "Divine Simplicity", "band": 3, "summary": "God is not composed of parts the way creatures are; he does not have holiness as one component alongside love as another. Each of his attributes is identical with his one undivided essence, so that to know any one of his perfections truly is to be brought face to face with the whole God.", "scripture": ["Exodus 3:14", "John 4:24", "1 John 4:8", "James 1:17"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 2, Paragraph 1 (\"without body, parts, or passions\")"}, {"source": "AthanasianCreed", "ref": "the undivided-substance clauses"}], "mastery": ["Teach that God's attributes are not parts assembled into a whole but each identical with his one undivided being.", "Distinguish simplicity from errors that pit one attribute against another, as though God's love must be negotiated against his holiness.", "Represent fairly the philosophical objection that simplicity makes attribute-language merely equivocal, while showing why classical theism has not found this decisive."], "prerequisites": [{"id": "theo.god-is-holy", "strength": "hard", "rationale": "Simplicity's central claim \u2014 that holiness and love are not competing parts of God but the same undivided God under different names \u2014 cannot be taught without the concept of holiness already in hand as one of the attributes in question."}, {"id": "theo.god-is-love-and-just", "strength": "hard", "rationale": "The classic pastoral confusion simplicity resolves is love versus justice; students must already hold both as true of God before they can see they are not in tension within his one being."}, {"id": "theo.trinity", "strength": "soft", "rationale": "Simplicity of essence must be carefully distinguished from the real distinction of persons in the Trinity, so the two doctrines illuminate rather than contradict each other."}]}], "domains": {"bib": {"label": "Scripture", "color": "#9A7B24"}, "theo": {"label": "God & Trinity", "color": "#6B121E"}, "chr": {"label": "Christology", "color": "#55357E"}, "pneu": {"label": "Holy Spirit", "color": "#2E6E5B"}, "anth": {"label": "Man & Sin", "color": "#7A5638"}, "ang": {"label": "Angels", "color": "#4E4E8F"}, "soc": {"label": "Christians in Society", "color": "#5E5470"}, "sot": {"label": "Salvation", "color": "#B03A4A"}, "ecc": {"label": "The Church", "color": "#2F5382"}, "esc": {"label": "Last Things", "color": "#B4671E"}, "bt": {"label": "Redemptive History", "color": "#5E7031"}, "ht": {"label": "Historical", "color": "#5A6B7C"}, "apo": {"label": "Apologetics", "color": "#7D4A66"}}, "verses": {"1 Chronicles 17:11-14": "[17:11] And it shall come to pass, when thy days be expired that thou must go {to be} with thy fathers, that I will raise up thy seed after thee, which shall be of thy sons; and I will establish his kingdom. [17:12] He shall build me an house, and I will stablish his throne for ever. [17:13] I will be his father, and he shall be my son: and I will not take my mercy away from him, as I took {it} from {him} that was before thee: [17:14] But I will settle him in mine house and in my kingdom for ever: and his throne shall be established for evermore.  (KJV)", "1 Corinthians 10:1-4": "[10:1] Moreover, brethren, I would not that ye should be ignorant, how that all our fathers were under the cloud, and all passed through the sea; [10:2] And were all baptized unto Moses in the cloud and in the sea; [10:3] And did all eat the same spiritual meat; [10:4] And did all drink the same spiritual drink: for they drank of that spiritual Rock that followed them: and that Rock was Christ. {followed...: or, went with them}  (KJV)", "1 Corinthians 11:23-32": "[11:23] For I have received of the Lord that which also I delivered unto you, That the Lord Jesus the {same} night in which he was betrayed took bread: [11:24] And when he had given thanks, he brake {it}, and said, Take, eat: this is my body, which is broken for you: this do in remembrance of me. {in...: or, for a remembrance} [11:25] After the same manner also {he took} the cup, when he had supped, saying, This cup is the new testament in my blood: this do ye, as oft as ye drink {it}, in remembrance of me. \u2026 (+7 more verses)  (KJV)", "1 Corinthians 12:12-14": "[12:12] For as the body is one, and hath many members, and all the members of that one body, being many, are one body: so also {is} Christ. [12:13] For by one Spirit are we all baptized into one body, whether {we be} Jews or Gentiles, whether {we be} bond or free; and have been all made to drink into one Spirit. {Gentiles: Gr. Greeks} [12:14] For the body is not one member, but many.  (KJV)", "1 Corinthians 12:13": "[12:13] For by one Spirit are we all baptized into one body, whether {we be} Jews or Gentiles, whether {we be} bond or free; and have been all made to drink into one Spirit. {Gentiles: Gr. Greeks}  (KJV)", "1 Corinthians 12:4-11": "[12:4] Now there are diversities of gifts, but the same Spirit. [12:5] And there are differences of administrations, but the same Lord. {administrations: or, ministries} [12:6] And there are diversi   const order = down? [...levels.keys()].slice(1) : [...levels.keys()].slice(0,-1).reverse();
  for(const li of order){
    const ref = idx(levels[down? li-1 : li+1]);
    levels[li].sort((a,b)=>{
      const bc=id=>{
        const ns = down? byId[id].prerequisites.map(p=>p.id) : dependents[id];
        const xs = ns.filter(n=>n in ref).map(n=>ref[n]);
        return xs.length? xs.reduce((s,x)=>s+x,0)/xs.length : ref[id]??0;
      };
      return bc(a)-bc(b)||a.localeCompare(b);
    });
  }
}
/* pixel positions */
const font="500 13px Georgia"; const meas=document.createElement("canvas").getContext("2d"); meas.font=font;
const nw = id => Math.ceil(meas.measureText(byId[id].name).width*1.06)+(byId[id].contested?42:28);
const NH=30, VGAP=66, HGAP=14, LEFT=76, TOP=48;
let maxW=0;
levels.forEach(l=>{ maxW=Math.max(maxW, l.reduce((s,id)=>s+nw(id)+HGAP,0)-HGAP); });
const W=Math.max(maxW+LEFT+40, 900), H=TOP+levels.length*(NH+VGAP);
levels.forEach((l,li)=>{
  const total=l.reduce((s,id)=>s+nw(id)+HGAP,0)-HGAP;
  let x=LEFT+(W-LEFT-40-total)/2;
  l.forEach(id=>{ pos[id]={x, y:TOP+li*(NH+VGAP), w:nw(id), lvl:li}; x+=nw(id)+HGAP; });
});

/* ---- render ---- */
const svg=document.getElementById("svg");
svg.setAttribute("width",W); svg.setAttribute("height",H);
const NS="http://www.w3.org/2000/svg";
const tint=(hex,f=0.16)=>{const P=[0xFC,0xF9,0xF2],c=[1,3,5].map(i=>parseInt(hex.slice(i,i+2),16));
  return "#"+c.map((v,i)=>Math.round(v*f+P[i]*(1-f)).toString(16).padStart(2,"0")).join("");};
const el=(t,a)=>{const e=document.createElementNS(NS,t); for(const k in a)e.setAttribute(k,a[k]); return e};
const roman=n=>["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV","XVI","XVII","XVIII"][n-1]||n;
levels.forEach((_,li)=>{
  const y=TOP+li*(NH+VGAP)+NH/2;
  svg.appendChild(el("line",{class:"unitline",x1:8,y1:y,x2:W,y2:y}));
  const t=el("text",{class:"unitlabel",x:14,y:y+4}); t.textContent="Unit "+roman(li+1); svg.appendChild(t);
});
const edgeG=el("g",{}), nodeG=el("g",{}); svg.appendChild(edgeG); svg.appendChild(nodeG);
const edgeEls=[];
concepts.forEach(c=>c.prerequisites.forEach(p=>{
  const a=pos[p.id], b=pos[c.id];
  const x1=a.x+a.w/2, y1=a.y+NH, x2=b.x+b.w/2, y2=b.y;
  const path=el("path",{class:"edge"+(p.strength==="soft"?" soft":""),
    d:`M${x1},${y1} C${x1},${y1+VGAP*.55} ${x2},${y2-VGAP*.55} ${x2},${y2}`});
  path.dataset.from=p.id; path.dataset.to=c.id; path.dataset.strength=p.strength;
  edgeG.appendChild(path); edgeEls.push(path);
}));
const nodeEls={};
concepts.forEach(c=>{
  const p=pos[c.id], color=dinfo(c.id).color;
  const g=el("g",{class:"node",transform:`translate(${p.x},${p.y})`});
  g.appendChild(el("rect",{class:"body",width:p.w,height:NH,rx:3,fill:tint(color)}));
  g.appendChild(el("rect",{width:3,height:NH,fill:color}));
  const t=el("text",{x:p.w/2 - (c.contested?6:0), y:NH/2+3.5, "text-anchor":"middle"});
  t.textContent=c.name; g.appendChild(t);
  if(c.contested){const f=el("text",{class:"flag", x:p.w-13, y:NH/2+3.5}); f.textContent="⚑"; g.appendChild(f);}
  const title=el("title",{}); title.textContent=c.name+" — "+c.summary; g.appendChild(title);
  g.addEventListener("click",()=>select(c.id));
  nodeG.appendChild(g); nodeEls[c.id]=g;
});

/* ---- legend & stats ---- */
document.getElementById("legend").innerHTML = Object.entries(domains)
  .map(([k,v])=>`<span class="lg"><span class="sw" style="background:${v.color}"></span>${v.label}</span>`).join("")
  +`<span class="lg" style="margin-left:8px">⚑ contested — positions differ among the orthodox</span>`;
const nE=concepts.reduce((s,c)=>s+c.prerequisites.length,0);
const nH=concepts.reduce((s,c)=>s+c.prerequisites.filter(p=>p.strength==="hard").length,0);
document.getElementById("stats").textContent=`${concepts.length} doctrines · ${nE} dependencies (${nH} hard, ${nE-nH} soft) · Band I: Foundations`;

/* ---- selection: light the ancestor lineage ---- */
let selected=null;
function ancestors(id){
  const seen=new Set([id]); const stack=[id];
  while(stack.length){ byId[stack.pop()].prerequisites.forEach(p=>{
    if(!seen.has(p.id)){seen.add(p.id); stack.push(p.id);} });}
  return seen;
}
function select(id){
  selected=id;
  const keep=ancestors(id);
  concepts.forEach(c=>{
    nodeEls[c.id].classList.toggle("dim", !keep.has(c.id));
    nodeEls[c.id].classList.toggle("selected", c.id===id);
  });
  edgeEls.forEach(e=>{
    const inChain = keep.has(e.dataset.to) && keep.has(e.dataset.from);
    e.classList.toggle("lit", inChain);
    e.classList.toggle("dim", !inChain);
  });
  renderPanel(id);
}
function clearSel(){
  selected=null;
  Object.values(nodeEls).forEach(n=>n.classList.remove("dim","selected"));
  edgeEls.forEach(e=>e.classList.remove("dim","lit"));
  document.getElementById("panel").classList.remove("open");
}
document.getElementById("clearBtn").addEventListener("click",clearSel);
document.getElementById("softToggle").addEventListener("change",e=>{
  edgeEls.forEach(p=>{ if(p.dataset.strength==="soft") p.style.display=e.target.checked?"":"none"; });
});

/* ---- detail panel ---- */
const esc=s=>s.replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
function renderPanel(id){
  const c=byId[id], d=dinfo(id);
  const req=dependents[id].map(x=>byId[x]);
  let h=`<button class="pclose" onclick="clearSel()" aria-label="Close">×</button>
    <div class="pdomain" style="color:${d.color}">${d.label} · Band ${c.band}</div>
    <h2>${esc(c.name)}</h2><div class="pid">${c.id}</div>
    <div class="summary">${esc(c.summary)}</div>
    <h3>Scripture</h3><div class="chips">${c.scripture.map(s=>`<span class="chip" title="${esc(DATA.verses[s]||'')}">${esc(s)}</span>`).join("")}</div>
    <h3>Anchored to</h3><div class="chips">${c.anchors.map(a=>`<span class="chip">${esc(a.source)} — ${esc(a.ref)}</span>`).join("")}</div>
    <h3>Evidence of mastery</h3><ul class="mastery">${c.mastery.map(m=>`<li>${esc(m)}</li>`).join("")}</ul>`;
  if(c.prerequisites.length){
    h+=`<h3>Stands on</h3>`+c.prerequisites.map(p=>`
      <div class="prereq ${p.strength}"><a onclick="select('${p.id}')">${esc(byId[p.id].name)}</a>
      <span class="badge ${p.strength}">${p.strength}</span>
      <div class="rationale">${esc(p.rationale)}</div></div>`).join("");
  }
  if(req.length){
    h+=`<h3>Required by</h3><div class="chips">${req.map(r=>`<span class="chip" style="cursor:pointer" onclick="select('${r.id}')">${esc(r.name)}</span>`).join("")}</div>`;
  }
  if(c.errors) h+=`<h3>Guards against</h3><ul class="mastery errors">${c.errors.map(e2=>`<li>${esc(e2)}</li>`).join("")}</ul>`;
  if(c.contested){
    h+=`<h3>Contested among the orthodox</h3><div class="contested">
      ${c.contested.positions.map(p=>`<div>· ${esc(p)}</div>`).join("")}
      <div class="house">Antioch teaches: ${esc(c.contested.house_position)}</div>
      ${c.contested.note?`<div class="rationale" style="margin-top:6px">${esc(c.contested.note)}</div>`:""}</div>`;
  }
  const panel=document.getElementById("panel");
  panel.innerHTML=h; panel.classList.add("open"); panel.scrollTop=0;
}
/* ---- review mode ---- */
let reviewMode=false, review={}, dirty=false;
const revCount=document.getElementById("revCount");
function paintReview(id){
  const g=nodeEls[id]; if(!g) return;
  g.classList.remove("rev-ok","rev-flag");
  if(review[id]) g.classList.add(review[id].status==="ok"?"rev-ok":"rev-flag");
}
function refreshCount(){
  const n=Object.keys(review).length, f=Object.values(review).filter(r=>r.status==="flag").length;
  revCount.textContent=`${n}/${concepts.length} reviewed · ${f} flagged`;
}
function markReview(id,status,note){
  if(status===null){ delete review[id]; } else {
    review[id]={status, note:(note||"").trim()};
  }
  dirty=true; paintReview(id); refreshCount();
}
function exportReview(){
  const payload={generated:new Date().toISOString(), total:concepts.length, review};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="review-"+new Date().toISOString().slice(0,10)+".json"; a.click();
  dirty=false; return payload;
}
function importReview(obj){
  review=obj.review||obj; Object.keys(nodeEls).forEach(paintReview); refreshCount(); dirty=false;
}
function attachReviewBox(id){
  if(!reviewMode) return;
  const panel=document.getElementById("panel");
  const r=review[id]||{};
  const box=document.createElement("div"); box.id="revbox";
  box.innerHTML=`<button id="rvOk" class="${r.status==="ok"?"on-ok":""}">✓ Approve</button>`+
    `<button id="rvFlag" class="${r.status==="flag"?"on-flag":""}">⚑ Needs revision</button>`+
    `<textarea id="rvNote" placeholder="Note (what to change and why)">${(r.note||"").replace(/</g,"&lt;")}</textarea>`;
  panel.appendChild(box);
  const note=()=>box.querySelector("#rvNote").value;
  box.querySelector("#rvOk").onclick=()=>{ markReview(id, review[id]&&review[id].status==="ok"?null:"ok", note()); attachRefresh(id); };
  box.querySelector("#rvFlag").onclick=()=>{ markReview(id, review[id]&&review[id].status==="flag"?null:"flag", note()); attachRefresh(id); };
  box.querySelector("#rvNote").addEventListener("input",()=>{ if(review[id]){review[id].note=note(); dirty=true;} });
}
function attachRefresh(id){ const b=document.getElementById("revbox"); if(b) b.remove(); attachReviewBox(id); }
const _renderPanel=renderPanel;
renderPanel=function(id){ _renderPanel(id); attachReviewBox(id); };
document.getElementById("reviewToggle").addEventListener("change",e=>{
  reviewMode=e.target.checked;
  for(const el of ["revCount","revExport","revImport"])
    document.getElementById(el).style.display=reviewMode?"":"none";
  refreshCount();
  if(selected) { renderPanel(selected); }
});
document.getElementById("revExport").addEventListener("click",exportReview);
document.getElementById("revImport").addEventListener("click",()=>document.getElementById("revFile").click());
document.getElementById("revFile").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader(); rd.onload=()=>importReview(JSON.parse(rd.result)); rd.readAsText(f);
});
window.addEventListener("beforeunload",e=>{ if(dirty && Object.keys(review).length){ e.preventDefault(); e.returnValue=""; }});
window.select=select;
window.clearSel=clearSel;
window.markReview=markReview; window.exportReview=exportReview; window.importReview=importReview;
</script>
</body>
</html>
