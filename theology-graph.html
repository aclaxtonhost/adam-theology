<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>An Old Gospel, Mapped — Antioch Theology Curriculum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241d16; --ink-soft:#5c5348; --parchment:#F6F1E7; --panel:#FCF9F2;
    --line:#d8cfbf; --oxblood:#6B121E; --gold:#B08A2E; --ghost:.14;
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%}
  body{
    background:var(--parchment); color:var(--ink);
    font:14px/1.5 "EB Garamond", Georgia, serif;
    display:flex; flex-direction:column;
  }
  header{
    padding:22px 28px 16px; border-bottom:2px solid var(--oxblood);
    display:flex; align-items:baseline; gap:22px; flex-wrap:wrap;
  }
  .eyebrow{
    font-family:system-ui,-apple-system,sans-serif; font-size:10px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--ink-soft);
  }
  h1{font-size:30px; font-weight:500; letter-spacing:.01em}
  h1 em{color:var(--oxblood); font-style:italic}
  .stats{font-size:13px; color:var(--ink-soft); font-style:italic}
  .controls{margin-left:auto; display:flex; gap:16px; align-items:center;
    font-family:system-ui,sans-serif; font-size:11.5px; color:var(--ink-soft)}
  .controls label{display:flex; gap:6px; align-items:center; cursor:pointer; user-select:none}
  .controls button{
    font:inherit; background:none; border:1px solid var(--line); border-radius:3px;
    padding:4px 10px; cursor:pointer; color:var(--ink-soft);
  }
  .controls button:hover{border-color:var(--oxblood); color:var(--oxblood)}
  main{flex:1; display:flex; min-height:0}
  #graphwrap{flex:1; overflow:auto; position:relative}
  svg{display:block}
  .unitlabel{font-family:"EB Garamond",serif; font-size:13px; fill:#a89a83; font-style:italic}
  .unitline{stroke:#e7dfd0; stroke-width:1}
  .edge{fill:none; stroke:#c9bcA6; stroke-width:1.1; opacity:.55}
  .edge.soft{stroke-dasharray:4 4; opacity:.4}
  .edge.lit{stroke:var(--gold); stroke-width:2; opacity:.95}
  .edge.lit.soft{stroke-dasharray:4 4; stroke-width:1.6}
  .dim{opacity:var(--ghost)}
  .node{cursor:pointer}
  .node rect{rx:4; stroke:rgba(0,0,0,.18); stroke-width:.75; filter:drop-shadow(0 1px 1px rgba(60,40,20,.18))}
  .node text{
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif; font-size:10.5px; font-weight:600;
    fill:#fff; pointer-events:none;
  }
  .node.selected rect{stroke:var(--gold); stroke-width:2.5}
  .node .flag{fill:#fff; opacity:.9; font-size:9px}
  /* detail panel */
  #panel{
    width:360px; max-width:44vw; border-left:1px solid var(--line); background:var(--panel);
    overflow-y:auto; padding:22px 24px 40px; display:none;
  }
  #panel.open{display:block}
  .pclose{float:right;font:22px/1 system-ui,sans-serif;background:none;border:none;color:var(--soft);cursor:pointer;padding:2px 8px;margin:-4px -10px 0 10px}
  .pclose:hover{color:var(--ox)}
  #panel .pdomain{font-family:system-ui,sans-serif; font-size:10px; letter-spacing:.2em;
    text-transform:uppercase; margin-bottom:6px}
  #panel h2{font-size:23px; font-weight:500; line-height:1.15; margin-bottom:2px}
  #panel .pid{font-family:ui-monospace,monospace; font-size:10.5px; color:#a2947d; margin-bottom:14px}
  #panel .summary{font-size:15px; line-height:1.55; margin-bottom:16px}
  #panel h3{font-family:system-ui,sans-serif; font-size:10px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--ink-soft); margin:18px 0 7px;
    border-bottom:1px solid var(--line); padding-bottom:4px}
  .chips{display:flex; flex-wrap:wrap; gap:5px}
  .chip{font-family:system-ui,sans-serif; font-size:11px; background:#efe7d6;
    border:1px solid var(--line); border-radius:10px; padding:2px 9px}
  ul.mastery{padding-left:18px}
  ul.mastery li{margin-bottom:5px; font-size:13.5px}
  .prereq{margin-bottom:10px; padding-left:10px; border-left:3px solid var(--line)}
  .prereq.hard{border-left-color:var(--oxblood)}
  .prereq a{color:var(--oxblood); text-decoration:none; font-weight:600; cursor:pointer}
  .badge{font-family:system-ui,sans-serif; font-size:9px; letter-spacing:.1em; text-transform:uppercase;
    padding:1px 6px; border-radius:8px; margin-left:6px; vertical-align:1px}
  .badge.hard{background:var(--oxblood); color:#fff}
  .badge.soft{background:#d9cfba; color:var(--ink-soft)}
  .rationale{font-size:12.5px; color:var(--ink-soft); font-style:italic; margin-top:2px}
  .contested{background:#f4ead8; border:1px solid #dcc98f; border-radius:5px; padding:12px 14px; margin-top:8px}
  .contested .house{margin-top:8px; font-weight:600}
  .errors li{font-size:13px; color:#7a2c33}
  #legend{
    position:sticky; bottom:0; left:0; background:linear-gradient(transparent, var(--parchment) 30%);
    padding:16px 28px 12px; display:flex; flex-wrap:wrap; gap:10px 16px;
    font-family:system-ui,sans-serif; font-size:11px; color:var(--ink-soft);
  }
  .lg{display:flex; align-items:center; gap:5px}
  .sw{width:11px; height:11px; border-radius:2px}
  #hint{position:absolute; top:14px; left:24px; font-style:italic; color:#a89a83; font-size:13px; pointer-events:none}
  @media (max-width:760px){
    #panel{position:fixed; right:0; top:0; bottom:0; max-width:86vw; box-shadow:-8px 0 24px rgba(0,0,0,.15); z-index:5}
    .controls{width:100%}
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="eyebrow">Antioch Southern Baptist Church · Est. 1979</div>
    <h1>An Old Gospel, <em>Mapped</em></h1>
  </div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <label><input type="checkbox" id="softToggle" checked> soft prerequisites</label>
    <button id="clearBtn">Clear selection</button>
  </div>
</header>
<main>
  <div id="graphwrap">
    <div id="hint">Click any doctrine to trace its lineage — everything it stands on lights in gold.</div>
    <svg id="svg"></svg>
    <div id="legend"></div>
  </div>
  <aside id="panel"></aside>
</main>
<script>
const DATA = {"concepts": [{"id": "ang.creation-nature", "name": "Creation and Nature of Angels", "band": 2, "summary": "Angels are created spirits, personal and powerful yet entirely creaturely, brought into being by God rather than existing alongside him from eternity. They do not marry or reproduce, and Scripture presents their number as fixed by their Creator, not growing over time.", "scripture": ["Psalm 148:2-5", "Colossians 1:16", "Matthew 22:30", "Hebrews 12:22"], "anchors": [{"source": "NiceneCreed", "ref": "\"maker of heaven and earth, and of all things visible and invisible\""}], "mastery": ["Explain from Scripture that angels are created, personal spirits rather than eternal or human-derived beings.", "Connect angelic creatureliness to the Creator/creature distinction that governs all theology.", "Apply pastorally: correct popular misconceptions such as 'people become angels when they die.'"], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Angels belong on the creature side of the Creator/creature line; the doctrine of God as Creator is what establishes that angels, however powerful, are made things and not another category of deity."}, {"id": "theo.one-god", "strength": "soft", "rationale": "Angels' creatureliness reinforces that there is only one God, with no other spiritual beings sharing his eternal, uncreated nature."}]}, {"id": "ang.holy-angels", "name": "The Holy Angels", "band": 2, "summary": "The angels who remained loyal to God serve as his messengers and ministers, sent to serve those who will inherit salvation. However exalted their power, they are fellow servants who point away from themselves and must never be worshiped.", "scripture": ["Psalm 103:20-21", "Hebrews 1:14", "Colossians 2:18", "Revelation 22:8-9"], "anchors": [{"source": "NiceneCreed", "ref": "\"of all things visible and invisible\""}], "mastery": ["Explain from Scripture the twin roles of holy angels as messengers of God's word and ministers to God's people.", "Connect the prohibition on angel worship to the Creator/creature distinction underlying angelic nature.", "Apply pastorally: address curiosity or fascination with angels by redirecting worship and attention to God alone."], "prerequisites": [{"id": "ang.creation-nature", "strength": "hard", "rationale": "Holy angels are described here as a subset of the created spirits already established in the doctrine of angelic creation and nature, so their ministry presupposes that prior category."}, {"id": "theo.god-is-holy", "strength": "soft", "rationale": "Angels are called 'holy' because their loyalty and service reflect and derive from the holiness of the God they serve."}]}, {"id": "ang.satan", "name": "Satan", "band": 2, "summary": "Satan was the highest of the created angels until pride led him to rebel against his Maker, and he became the tempter who drew humanity into sin in Eden. He now functions as accuser and adversary of God's people, though never outside the bounds of God's sovereign control.", "scripture": ["Ezekiel 28:12-17", "Isaiah 14:13-14", "1 Timothy 3:6", "Genesis 3:1-5", "Job 1:6-12", "1 Peter 5:8"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 6, Paragraph 1"}], "mastery": ["Explain from Scripture Satan's origin as a fallen created angel rather than an eternal evil counterpart to God.", "Connect Satan's role as tempter in Eden to his ongoing work as accuser and adversary.", "Apply pastorally: equip a believer to resist the accuser's lies about their standing before God without either dismissing or fearing him wrongly."], "prerequisites": [{"id": "ang.creation-nature", "strength": "hard", "rationale": "Satan is, first and foremost, a created angel; his fall and his rebellion only make sense once his creatureliness and original angelic nature are established."}, {"id": "anth.the-fall", "strength": "soft", "rationale": "Satan's role as the tempter in Eden connects his rebellion to the historical fall of humanity that his temptation set in motion."}]}, {"id": "ang.demons", "name": "Demons", "band": 2, "summary": "Demons are angels who joined Satan's rebellion against God; some now roam free to oppose God's purposes and blind unbelievers, while others are already confined awaiting judgment. Like Satan, they remain creatures under God's ultimate authority, however real their malice.", "scripture": ["Revelation 12:4", "Jude 1:6", "2 Peter 2:4", "2 Corinthians 4:4"], "anchors": [{"source": "NiceneCreed", "ref": "'maker of heaven and earth, and of all things visible and invisible'"}], "mastery": ["Explain from Scripture the origin of demons as angels who fell together with Satan.", "Connect demonic activity, including spiritual blinding, to the broader pattern of opposition to God's saving purposes.", "Apply pastorally: help a believer distinguish real demonic influence from psychological or physical struggles that deserve other kinds of care."], "prerequisites": [{"id": "ang.satan", "strength": "hard", "rationale": "Demons are defined here specifically as the angels who fell together with Satan, so the doctrine of demons presupposes Satan's own fall as its origin point."}, {"id": "ang.creation-nature", "strength": "soft", "rationale": "Like Satan, demons remain within the broader category of created angelic spirits even in their fallen rebellion."}]}, {"id": "ang.opposition-and-limits", "name": "Satanic and Demonic Opposition, and Its Limits", "band": 2, "summary": "Satan and his demons exert real influence and can afflict believers, yet every attack operates strictly within the boundaries God permits, as Job's testing and Peter's sifting both show. Believers cannot be possessed by demons, but they can be resisted and opposed, and must stand firm against real spiritual attack.", "scripture": ["Job 1:12", "Luke 22:31-32", "1 John 4:4", "James 4:7"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 5, Paragraphs 1 and 4 (providence over evil acts)"}], "mastery": ["Explain from Scripture how Satan's opposition, though real, always operates within limits God himself sets.", "Connect the believer's security in Christ to their ability to resist rather than fear demonic attack.", "Apply pastorally: help a fearful believer resist spiritual attack through prayer and Scripture rather than superstition or panic."], "prerequisites": [{"id": "ang.satan", "strength": "hard", "rationale": "This concept qualifies the nature of Satan's opposition already established in the doctrine of Satan, so it presupposes his identity and hostility as its starting point."}, {"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "That demonic opposition is leashed rather than unlimited is a direct application of God's sovereignty over every created power, including hostile spiritual ones."}]}, {"id": "ang.no-redemption-judgment", "name": "No Redemption for Angels, and Their Certain Judgment", "band": 2, "summary": "Christ came to help the offspring of Abraham, not to assume angelic nature or provide a Savior for fallen angels; no redemption is offered them. Their judgment is certain and will be carried out at the appointed time, with believers even sharing in the judging of angels.", "scripture": ["Hebrews 2:16", "Matthew 25:41", "1 Corinthians 6:3", "Revelation 20:10"], "anchors": [{"source": "BFM2000", "ref": "Article X, Last Things"}], "mastery": ["Explain from Scripture why Christ's incarnation and atonement were for humanity and not for fallen angels.", "Connect the certainty of angelic judgment to the broader biblical hope of final justice.", "Apply pastorally: contrast the fallen angels' fixed, hopeless judgment with the open, gracious offer of redemption still extended to every human being."], "prerequisites": [{"id": "chr.humanity", "strength": "hard", "rationale": "That Christ took on human nature rather than angelic nature is precisely why redemption reaches humanity but not fallen angels; this doctrine presupposes what kind of nature the Son assumed."}, {"id": "ang.demons", "strength": "hard", "rationale": "The certainty of judgment described here is specifically the judgment awaiting the fallen angels already identified as demons, so it presupposes their prior fall and present rebellion."}]}, {"id": "anth.image-of-god", "name": "Made in God's Image", "band": 1, "summary": "God created mankind in his own image: the crowning work of creation, made to know God, represent his rule, and reflect his character. Every human being possesses full dignity and worth from conception to death.", "scripture": ["Genesis 1:26-28", "Psalm 8:3-8", "Genesis 9:6", "James 3:9"], "anchors": [{"source": "BFM2000", "ref": "Article III (Man)"}], "mastery": ["Can state what the image grounds: universal human dignity and the sanctity of life", "Can connect Genesis 9:6 and James 3:9 to how we treat other people"], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Image-bearing is a created status; it presupposes the Creator whose image is borne."}], "errors": ["Human worth grounded in ability or usefulness"]}, {"id": "anth.male-female", "name": "Male and Female He Created Them", "band": 1, "summary": "God created humanity male and female, both fully in his image, distinct and complementary. The gift of gender is part of the goodness of creation, and marriage between one man and one woman is God's design from the beginning.", "scripture": ["Genesis 1:27", "Genesis 2:18-24", "Matthew 19:4-6"], "anchors": [{"source": "BFM2000", "ref": "Article III; Article XVIII (The Family)"}], "mastery": ["Can state the equal dignity and designed distinction of male and female", "Can cite Jesus' appeal to Genesis in Matthew 19 as the pattern for marriage"], "prerequisites": [{"id": "anth.image-of-god", "strength": "hard", "rationale": "The male-female design is the concrete form image-bearing takes; equality of image grounds equality of worth across the distinction."}]}, {"id": "anth.the-fall", "name": "The Fall", "band": 1, "summary": "Adam and Eve, created good and free, disobeyed God at the serpent's temptation. Through this historical act sin entered the world, fellowship with God was broken, and creation itself fell under the curse.", "scripture": ["Genesis 3:1-19", "Romans 5:12", "Romans 8:20-22"], "anchors": [{"source": "BFM2000", "ref": "Article III"}], "mastery": ["Can narrate Genesis 3 accurately: the temptation, the act, the consequences", "Can state that the fall was a real event with universal consequences, not a myth about everyone's private failings"], "prerequisites": [{"id": "anth.image-of-god", "strength": "hard", "rationale": "The fall's tragedy is measured by the height of what fell; ruined image-bearers, not evolved animals behaving naturally."}, {"id": "theo.god-is-holy", "strength": "soft", "rationale": "Sin as offense against holiness, not mere rule-breaking, gives the fall its true weight."}]}, {"id": "anth.sin-universal", "name": "All Have Sinned", "band": 1, "summary": "Since the fall, all people inherit a nature and environment inclined toward sin, and as soon as they are capable of moral action they become transgressors in their own right. There is no one righteous; sin is universal in scope and personal in guilt.", "scripture": ["Romans 3:10-12", "Romans 3:23", "Psalm 51:5", "Ephesians 2:1-3"], "anchors": [{"source": "BFM2000", "ref": "Article III"}], "mastery": ["Can state both truths: an inherited sinful nature and personal responsible transgression", "Can answer 'aren't people basically good?' from Romans 3"], "prerequisites": [{"id": "anth.the-fall", "strength": "hard", "rationale": "Universal sinfulness is the downstream effect of the fall; without Genesis 3, Romans 3 has no origin story."}], "errors": ["Pelagianism (sin as mere bad example; humans born neutral)"]}, {"id": "anth.wages-of-sin", "name": "The Wages of Sin", "band": 1, "summary": "Sin earns death: spiritual separation from God now, physical death, and, apart from Christ, condemnation under God's righteous judgment. Sin is not a weakness God grades on a curve but a debt his justice must answer.", "scripture": ["Romans 6:23", "Isaiah 59:2", "Ephesians 2:1-3", "Hebrews 9:27"], "anchors": [{"source": "BFM2000", "ref": "Article III ('under condemnation')"}], "mastery": ["Can state the three dimensions of death sin brings: spiritual, physical, eternal", "Can explain why judgment is just rather than harsh, given who God is"], "prerequisites": [{"id": "anth.sin-universal", "strength": "hard", "rationale": "The penalty presupposes the crime and its universal reach; wages are owed because all have earned them."}, {"id": "theo.god-is-love-and-just", "strength": "hard", "rationale": "Judgment is God's justice in act; without his justice the wages of sin looks arbitrary."}]}, {"id": "anth.imputed-sin", "name": "Imputed Sin", "band": 2, "summary": "Adam stood as the covenant head of the human race, so that when he sinned, his guilt was credited to every one of his descendants, not merely his corrupted nature passed down by imitation. This same principle of imputation is the ground of the gospel's good news: our sin credited to Christ, and his righteousness credited to us.", "scripture": ["Romans 5:12-21", "1 Corinthians 15:21-22", "Romans 5:19"], "anchors": [{"source": "BFM2000", "ref": "Article III, Man"}, {"source": "2LBC1689", "ref": "Chapter 6, Paragraph 3"}], "mastery": ["Explain from Scripture how Adam's sin is credited to the whole human race as its covenant head.", "Connect imputed sin to the saving symmetry in which our sin is imputed to Christ and his righteousness to us.", "Apply pastorally: help a person struggling with 'it's not fair that I'm guilty for Adam's sin' see the same structure that makes salvation by another's righteousness good news."], "prerequisites": [{"id": "anth.the-fall", "strength": "hard", "rationale": "There is no sin to impute to the race until Adam's actual, historical fall is in view; imputation is the mechanism by which that one event reaches everyone after him."}, {"id": "anth.sin-universal", "strength": "soft", "rationale": "The universality of human sin is the observable effect for which imputed guilt from Adam is the theological explanation."}]}, {"id": "anth.depravity-extent", "name": "The Extent of Depravity", "band": 2, "summary": "Sin has corrupted every part of the human person \u2014 mind, affections, and will \u2014 so that no faculty is left untouched by the fall. This is total in extent, reaching the whole person, not total in degree, as though every person were as evil as possible.", "scripture": ["2 Corinthians 4:4", "Romans 1:21-26", "Romans 6:20", "John 6:44"], "anchors": [{"source": "BFM2000", "ref": "Article III, Man"}, {"source": "2LBC1689", "ref": "Chapter 6, Paragraphs 2-4"}], "mastery": ["Explain from Scripture how sin affects the mind, affections, and will, not just outward behavior.", "Distinguish the extent of depravity ('every faculty affected') from the error of total depravity meaning 'utter badness.'", "Apply pastorally: help a moral, likeable unbeliever see their need for grace even though they are not, by human comparison, a monster."], "prerequisites": [{"id": "anth.the-fall", "strength": "hard", "rationale": "Depravity is fallen humanity's condition after Eden; the doctrine describes the fall's effect on every human faculty and so presupposes the fall itself."}, {"id": "anth.wages-of-sin", "strength": "soft", "rationale": "That sin's wage is death coheres with sin having corrupted every part of the person under judgment, not merely isolated acts."}]}, {"id": "anth.composition", "name": "Human Composition", "band": 2, "summary": "God made each person a unified whole of material body and immaterial soul or spirit, not a soul trapped inside a disposable body. Death is the unnatural tearing apart of what God joined together, which is why the Christian hope is bodily resurrection, not escape from the body.", "scripture": ["Genesis 2:7", "James 2:26", "1 Thessalonians 5:23", "Ecclesiastes 12:7"], "anchors": [{"source": "BFM2000", "ref": "Article III, Man"}, {"source": "ApostlesCreed", "ref": "\"the resurrection of the body\""}], "mastery": ["Explain from Scripture that the body is part of God's good design for humanity, not a prison for the soul.", "Connect the material/immaterial unity of human nature to death as separation rather than annihilation.", "Apply pastorally: correct a believer's assumption that the body doesn't matter spiritually, given that God made it and will raise it."], "prerequisites": [{"id": "anth.image-of-god", "strength": "hard", "rationale": "Humanity bears God's image as embodied creatures, not as souls that merely happen to occupy bodies, so the doctrine of composition unpacks what kind of creature the image-bearer is."}, {"id": "chr.resurrection", "strength": "soft", "rationale": "Christ's bodily resurrection is the pattern and guarantee of the believer's own future bodily resurrection, confirming that the body is integral to, not incidental to, human identity."}]}, {"id": "anth.origins", "name": "The Special Creation of Man", "band": 2, "summary": "God directly and specially created the universe and, as its capstone, mankind: Adam formed from the dust and Eve from his side, historical persons made on the sixth day of the creation week. Humanity is not the product of evolutionary processes, guided or unguided, but the immediate work of God's hands.", "scripture": ["Genesis 1:26-31", "Genesis 2:7", "Exodus 20:11", "Mark 10:6", "Hebrews 11:3"], "anchors": [{"source": "BFM2000", "ref": "Article III ('Man is the special creation of God, made in His own image')"}], "mastery": ["Explain from Scripture the direct, special creation of Adam and Eve as historical persons.", "Connect Exodus 20:11 and Mark 10:6 to the creation week: the Sabbath command and Jesus himself treat the account as history at the beginning.", "Apply pastorally: show why a historical Adam is load-bearing for Romans 5 \u2014 no first Adam, no logic for the last."], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Special creation specifies the mode of the creation doctrine already confessed; the who must be in place before the how and how-fast can be weighed."}, {"id": "bib.reading-in-context", "strength": "hard", "rationale": "The position stands or falls with the hermeneutic: reading Genesis 1-2 in its plain, historical-narrative sense is what rules out evolutionary accommodations, so the interpretive method must already be owned."}], "errors": ["Atheistic evolution", "Deistic and theistic evolution as accounts of human origins", "Day-age and progressive-creation accommodations"], "contested": {"positions": ["Recent six-day special creation: the days of Genesis 1 are ordinary days and humanity was directly created (young-earth creationism).", "Old-earth special creation: long ages or a day-age reading of Genesis 1, with Adam and Eve still directly and historically created.", "Evolutionary creationism: God worked through evolutionary means \u2014 a view some professing evangelicals hold but which this church judges incompatible with the hermeneutic above."], "house_position": "Recent six-day special creation with a historical Adam and Eve and no evolutionary means, per the pastor's confirmed position (2026). The BFM2000 itself does not specify the earth's age.", "note": "Band-3 treatment should engage old-earth exegesis (e.g., the seventh day's non-ending) fairly while showing why the house reads the text as it does."}}, {"id": "apo.ready-with-gentleness", "name": "Ready to Give an Answer", "band": 1, "summary": "Every believer is called to be prepared to give a reason for the hope within them, with gentleness and respect. Apologetics is not winning arguments but honoring Christ as Lord while answering honest questions honestly.", "scripture": ["1 Peter 3:15-16", "Colossians 4:5-6", "2 Timothy 2:24-25"], "anchors": [{"source": "BFM2000", "ref": "Article XI (Evangelism and Missions)"}], "mastery": ["Can quote 1 Peter 3:15 including its posture clauses (in your hearts honor Christ; gentleness and respect)", "Can state their own reason for hope in two or three sentences"], "prerequisites": [{"id": "sot.gospel", "strength": "hard", "rationale": "The hope being defended is the gospel; apologetics is the gospel's escort, not its substitute."}, {"id": "ecc.great-commission", "strength": "soft", "rationale": "Answer-giving serves disciple-making; the commission gives apologetics its purpose."}]}, {"id": "apo.why-trust-bible", "name": "Why the Bible Can Be Trusted", "band": 1, "summary": "The Bible's trustworthiness is supported by publicly checkable evidence: an unmatched manuscript tradition, historical and archaeological corroboration, internal coherence across centuries of authors, and fulfilled prophecy, with Jesus' own view of Scripture as the believer's decisive warrant.", "scripture": ["Matthew 5:17-18", "John 10:35", "Luke 1:1-4", "2 Peter 1:16"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can give a two-minute answer to 'hasn't the Bible been changed over time?' (manuscript abundance, early copies)", "Can state that Jesus' own confidence in Scripture is the Christian's deepest reason to share it"], "prerequisites": [{"id": "bib.inerrancy", "strength": "hard", "rationale": "This concept defends a claim already defined; the doctrine of Scripture's truthfulness must be in hand before its defense is mounted."}, {"id": "bib.canon", "strength": "soft", "rationale": "Questions about 'lost gospels' and which books belong require the canon concept to answer."}]}, {"id": "apo.resurrection-case", "name": "The Case for the Resurrection", "band": 1, "summary": "The resurrection is a historical claim with historical evidence: Jesus' death by crucifixion, the empty tomb, the appearances to individuals and groups including skeptics, and the sudden transformation of the disciples into witnesses willing to die. The alternatives fail to explain all the facts.", "scripture": ["1 Corinthians 15:3-8", "1 Corinthians 15:14-19", "Acts 26:26"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}], "mastery": ["Can present the basic facts case (death, burial, empty tomb, appearances, transformed witnesses)", "Can respond to the two most common alternatives (theft, hallucination) in a sentence each", "Can state from 1 Corinthians 15:14 why everything hangs on this"], "prerequisites": [{"id": "chr.resurrection", "strength": "hard", "rationale": "The case defends the doctrine; the claim's content precedes its evidence."}, {"id": "apo.ready-with-gentleness", "strength": "soft", "rationale": "The manner of 1 Peter 3:15 should govern the material; posture before polemics."}]}, {"id": "apo.problem-of-evil", "name": "The Problem of Evil", "band": 2, "summary": "The problem of evil poses both a logical challenge (can a good, all-powerful God coexist with evil?) and an evidential challenge (does the sheer scale of suffering count against his existence?), and Scripture does not dodge either one. The fall explains evil's origin in creaturely rebellion rather than in God, while greater-good and soul-making responses may be surveyed honestly as partial, non-overclaiming defenses. Christianity's distinctive answer is that God himself bore evil's weight at the cross and has promised its final end.", "scripture": ["Gen 50:20", "Job 42:1-6", "Rom 8:18-28", "Rev 21:4"], "anchors": [{"source": "BFM2000", "ref": "III. Man"}, {"source": "2LBC1689", "ref": "Chapter 6, Of the Fall of Man, of Sin, and of the Punishment thereof"}], "mastery": ["Explain from Scripture how Genesis 50:20 and Romans 8:18-28 hold together real evil, God's sovereignty, and a promised future good without minimizing suffering.", "Connect concepts by relating evil's origin in the fall to God's sovereignty and to the cross as his own self-involving answer to it.", "Apply pastorally by following Job 42's pattern: sound philosophical defenses are for defending the truth to skeptics, not for speaking to the suffering \u2014 Job's friends were right in content until they opened their mouths to Job himself."], "prerequisites": [{"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "The logical problem of evil directly questions whether a sovereign, all-powerful God is compatible with evil's existence, so the learner needs the doctrine of God's sovereignty before engaging the problem honestly."}, {"id": "anth.the-fall", "strength": "hard", "rationale": "Scripture locates evil's origin in humanity's fall rather than in God's creative intent, so this doctrine supplies the reason a good creation now contains evil."}, {"id": "chr.substitutionary-death", "strength": "soft", "rationale": "Christianity's distinctive answer to evil is that God bore it himself at the cross, so this doctrine supplies the gospel's own resolution, though the philosophical problem can be stated without it."}]}, {"id": "apo.gospels-reliability", "name": "The Reliability of the Gospels", "band": 2, "summary": "The Gospels repeatedly claim eyewitness origin \u2014 Luke's careful investigation, John's 'we know that his testimony is true,' Peter's 'we did not follow cleverly devised myths' \u2014 and this claim is reinforced by early dating, an unmatched manuscript tradition, archaeological and historical corroboration, and the kind of undesigned coincidences that mark honest, independent testimony. Read as the ancient biographies they are, the Gospels bear the marks of careful historical reporting rather than later legend.", "scripture": ["Luke 1:1-4", "John 21:24", "2 Pet 1:16", "Acts 26:26"], "anchors": [{"source": "BFM2000", "ref": "I. The Scriptures"}, {"source": "2LBC1689", "ref": "Chapter 1, Of the Holy Scriptures"}], "mastery": ["Explain from Scripture how Luke 1:1-4, John 21:24, and 2 Peter 1:16 each stake the Gospels' truth-claim on eyewitness testimony rather than invented myth.", "Connect concepts by showing how early dating, manuscript wealth, and undesigned coincidences corroborate the eyewitness claims the Gospels themselves make.", "Apply pastorally by equipping believers to answer 'how do we know the Gospels are true' with concrete historical evidence rather than bare assertion."], "prerequisites": [{"id": "apo.why-trust-bible", "strength": "hard", "rationale": "The reliability of the Gospels is a specific case study within the larger question of why Scripture as a whole can be trusted, so the general apologetic for trusting the Bible is presupposed here."}, {"id": "bib.canon", "strength": "soft", "rationale": "Knowing why these four Gospels, and not others, were received as authoritative Scripture supports the historical case that they are also reliable eyewitness documents, though the reliability argument can proceed without settling canon questions first."}]}, {"id": "apo.worldviews", "name": "Christianity Among the Worldviews", "band": 2, "summary": "Every worldview must answer four questions \u2014 origins, meaning, morality, and destiny \u2014 and Christianity answers all four coherently where naturalism, pantheism, and relativism each break down on at least one. Unbelief still borrows Christian capital: human dignity and moral outrage make sense only on the image-of-God account many reject in principle. The aim is to commend the faith's coherence and beauty, not merely to defeat rivals.", "scripture": ["Acts 17:22-31", "Rom 1:18-23", "Eccl 3:11"], "anchors": [{"source": "BFM2000", "ref": "II. God (A. God the Father)"}, {"source": "BFM2000", "ref": "III. Man"}], "mastery": ["Explain from Scripture how Acts 17:22-31 models answering a pagan worldview on its own ground while pointing to the Creator it unknowingly worships.", "Connect concepts by tracing how theo.creator and anth.image-of-god answer the origins and morality questions that naturalism, pantheism, and relativism cannot coherently answer.", "Apply pastorally by helping believers name the 'borrowed capital' in a skeptic's moral outrage as evidence pointing toward, not away from, the God they resist."], "prerequisites": [{"id": "apo.ready-with-gentleness", "strength": "hard", "rationale": "Comparing worldviews is itself an act of apologetic engagement with people, so the disposition and method of giving a reasoned answer with gentleness and respect governs how this content is used, not just what it contains."}, {"id": "theo.creator", "strength": "hard", "rationale": "The origins question, one of the four every worldview must answer, is answered specifically by God as Creator, so this doctrine supplies Christianity's own answer against which rival worldviews are measured."}, {"id": "anth.image-of-god", "strength": "soft", "rationale": "Naturalism's and relativism's inability to ground human dignity and moral outrage is best diagnosed by contrast with the image-of-God doctrine, so this doctrine sharpens the worldview comparison without being strictly required to state it."}]}, {"id": "bt.one-story", "name": "The Bible Tells One Story", "band": 1, "summary": "The sixty-six books form a single unfolding drama: creation, fall, redemption, and restoration, with Jesus Christ at its center. Every part is read as an episode in this one story, and all Scripture is a testimony to Christ.", "scripture": ["Luke 24:25-27", "Luke 24:44-47", "John 5:39", "Genesis 3:15"], "anchors": [{"source": "BFM2000", "ref": "Article I ('All Scripture is a testimony to Christ, who is Himself the focus of divine revelation')"}], "mastery": ["Can name the four movements (creation, fall, redemption, restoration) and place a given book roughly within them", "Can state from Luke 24 that Jesus read the whole Old Testament as about himself"], "prerequisites": [{"id": "bib.canon", "strength": "hard", "rationale": "One story presupposes one book; the unity of the canon is the premise of the unified plot."}, {"id": "bib.reading-in-context", "strength": "soft", "rationale": "The whole-Bible context is the widest circle of contextual reading; the skill and the storyline reinforce each other."}]}, {"id": "bt.covenants", "name": "God Works Through Covenants", "band": 1, "summary": "God advances his one plan through covenants: solemn, binding commitments with Noah, Abraham, Israel at Sinai, and David, all reaching their fulfillment in the new covenant sealed by Christ's blood. The covenants are the backbone of the story.", "scripture": ["Genesis 12:1-3", "Exodus 19:4-6", "2 Samuel 7:12-16", "Jeremiah 31:31-34", "Luke 22:20"], "anchors": [{"source": "BFM2000", "ref": "Article I (implicit in the testimony-to-Christ hermeneutic)"}], "mastery": ["Can name the major covenants in order and one sentence of content for each", "Can state that the Lord's Supper cup is 'the new covenant in my blood,' linking the table to Jeremiah 31"], "prerequisites": [{"id": "bt.one-story", "strength": "hard", "rationale": "Covenants are the structure of the story; without the single plot they read as disconnected contracts."}, {"id": "theo.god-is-sovereign", "strength": "soft", "rationale": "Covenant promises are only as good as the God who keeps them; sovereignty underwrites the backbone."}]}, {"id": "bt.promise-fulfillment", "name": "Promise and Fulfillment in Christ", "band": 1, "summary": "All the promises of God find their Yes in Christ. Old Testament promises, patterns, offices, and institutions (prophet, priest, king, temple, sacrifice, exodus) anticipate and arrive at Jesus, so that the New Testament reads as fulfillment, not replacement of the story.", "scripture": ["2 Corinthians 1:20", "Matthew 5:17", "Hebrews 1:1-2", "1 Corinthians 10:1-4"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can give two examples of an OT pattern arriving at Christ (e.g., Passover lamb, temple, Davidic king)", "Can state 2 Corinthians 1:20 as the summary rule of fulfillment"], "prerequisites": [{"id": "bt.covenants", "strength": "hard", "rationale": "The promises being fulfilled are covenant promises; fulfillment presupposes the covenant structure it completes."}, {"id": "chr.one-person", "strength": "soft", "rationale": "The fulfiller must be who the promises require: the divine-human Son who can be prophet, priest, and king at once."}]}, {"id": "bt.noahic-covenant", "name": "The Noahic Covenant", "band": 2, "summary": "After the flood, God swore an everlasting covenant with Noah, his descendants, and every living creature to preserve the created order and never again destroy the earth by flood. This covenant undergirds a sanction on human life rooted in the image of God and provides the stable stage on which every subsequent redemptive covenant unfolds.", "scripture": ["Gen 8:20-9:17", "Jer 33:20-25", "Isa 54:9-10", "Gen 9:6"], "anchors": [{"source": "BFM2000", "ref": "II. God (A. God the Father)"}, {"source": "2LBC1689", "ref": "Chapter 5, Of Divine Providence"}], "mastery": ["Explain from Scripture how Genesis 9's flood sanction and 'never again' oath together constitute a real, sworn covenant distinct from the covenants that follow.", "Connect concepts by showing how the Noahic covenant's preservation of the created order is the necessary precondition for the Abrahamic promise and every covenant after it.", "Apply pastorally by grounding the sanctity of human life and confidence in a stable created order in God's sworn commitment rather than in nature's bare regularity."], "prerequisites": [{"id": "bt.covenants", "strength": "hard", "rationale": "The Noahic covenant is a specific instance of the biblical covenant pattern, so the learner must already grasp what a covenant is \u2014 a sworn, binding relationship with stipulations and signs \u2014 before this particular covenant makes sense."}, {"id": "theo.creator", "strength": "hard", "rationale": "Because this covenant is God's sworn commitment to creation itself, it presupposes that God is the sovereign Creator with the standing and authority to bind himself to the created order he made."}, {"id": "anth.image-of-god", "strength": "soft", "rationale": "Genesis 9:6 grounds the covenant's prohibition of murder in humanity's creation in God's image, so understanding that doctrine deepens the covenant's ethical sanction."}]}, {"id": "bt.abrahamic-covenant", "name": "The Abrahamic Covenant", "band": 2, "summary": "God unilaterally bound himself to Abraham, swearing land, seed, and blessing to all the families of the earth, walking alone between the pieces as the sole covenant-maker. Paul calls this 'the gospel preached beforehand,' making it the engine that drives redemptive history toward Christ.", "scripture": ["Gen 12:1-3", "Gen 15:7-21", "Gen 17:1-8", "Gen 22:16-18", "Gal 3:8"], "anchors": [{"source": "BFM2000", "ref": "V. God's Purpose of Grace"}], "mastery": ["Explain from Scripture why Genesis 15's smoking-pot ceremony marks this as a unilateral divine oath rather than a mutual pact Abraham could break.", "Connect concepts by tracing how the land, seed, and blessing promises given here are narrowed at Sinai, focused in David's line, and fulfilled in Christ without losing their original referents.", "Apply pastorally by showing believers, Jew and Gentile alike, that their share in Abraham's blessing rests on God's oath and Christ's faithfulness, not on their own performance."], "prerequisites": [{"id": "bt.covenants", "strength": "hard", "rationale": "As with every covenant node, the learner needs the general grammar of covenant \u2014 promise, oath, sign \u2014 before the specific content of God's oath to Abraham will hold together."}, {"id": "bt.noahic-covenant", "strength": "soft", "rationale": "The Abrahamic promise assumes a preserved, stable world in which land can be granted and nations can multiply, so the prior covenant that secures that stage enriches this one."}, {"id": "bt.promise-fulfillment", "strength": "soft", "rationale": "Grasping how biblical promises reach fulfillment across time helps the learner see the Abrahamic covenant as the start of a trajectory rather than an isolated ancient transaction."}]}, {"id": "bt.mosaic-covenant", "name": "The Mosaic Covenant", "band": 2, "summary": "At Sinai God gave Israel his law only after he had already redeemed them from Egypt \u2014 'I bore you on eagles' wings and brought you to myself' precedes 'if you will obey.' The law is therefore a covenant-relational gift ordering an already-redeemed people's life and priestly vocation among the nations, never a ladder by which they earned their salvation.", "scripture": ["Exod 19:4-6", "Deut 6:20-25", "Ps 19:7-11", "Exod 2:24"], "anchors": [{"source": "BFM2000", "ref": "IV. Salvation (B. Justification)"}], "mastery": ["Explain from Scripture the redemption-before-law order of Exodus 19:4-6 and why it rules out reading Sinai as a means of earning God's favor.", "Connect concepts by relating the Mosaic covenant's priestly-vocation aim ('a kingdom of priests') to Israel's calling to mediate the blessing promised to Abraham to the nations.", "Apply pastorally by helping believers see obedience as grateful response within an existing relationship with God rather than a transaction that secures it."], "prerequisites": [{"id": "bt.abrahamic-covenant", "strength": "hard", "rationale": "Exodus 2:24 explicitly ties Sinai to God 'remembering his covenant' with Abraham, Isaac, and Jacob, so Sinai must be understood as administering a people already claimed by that earlier promise."}, {"id": "sot.grace-alone", "strength": "soft", "rationale": "Recognizing that salvation has always been by grace alone helps the learner see the grace-before-law pattern at Sinai as consistent with, not an exception to, how God has always dealt with his people."}]}, {"id": "bt.davidic-covenant", "name": "The Davidic Covenant", "band": 2, "summary": "God swore to David an eternal throne and a son-of-God kingship for his line, promising that David would never lack a man to sit on it. This covenant narrows the Abrahamic seed promise to a royal line through whom God's kingdom purposes will be realized.", "scripture": ["2 Sam 7:12-16", "Ps 89:19-37", "Ps 132:11-12"], "anchors": [{"source": "NiceneCreed", "ref": "'and his kingdom shall have no end'"}], "mastery": ["Explain from Scripture how 2 Samuel 7's dynastic oath establishes an unconditional, everlasting throne rather than a conditional political arrangement.", "Connect concepts by showing how this covenant narrows Abraham's seed promise to a single royal line and sets up the kingdom-of-God trajectory Jesus announces.", "Apply pastorally by anchoring hope for a righteous, permanent king in God's sworn oath to David rather than in the failures of Israel's actual kings."], "prerequisites": [{"id": "bt.abrahamic-covenant", "strength": "hard", "rationale": "The Davidic covenant is the seed promise given to Abraham narrowing to a specific royal line, so the learner needs the earlier covenant's content to see what is being narrowed and why."}, {"id": "chr.messiah", "strength": "soft", "rationale": "Seeing how the Davidic promise lands on Jesus as the messianic king helps the learner grasp the covenant's ultimate referent, though the Old Testament oath itself can be stated without it."}]}, {"id": "bt.new-covenant", "name": "The New Covenant", "band": 2, "summary": "Promised to Israel and Judah through Jeremiah and Ezekiel, the new covenant is sealed in Christ's blood: God's law written on hearts, sins fully and finally forgiven, the Spirit given, and all who are in it knowing the LORD. Believers today genuinely participate in this covenant, and its promises to Israel are supplemented rather than reinterpreted away.", "scripture": ["Jer 31:31-34", "Ezek 36:25-27", "Luke 22:20", "Heb 8:6-13"], "anchors": [{"source": "BFM2000", "ref": "VII. Baptism and the Lord's Supper"}], "mastery": ["Explain from Scripture how Jeremiah 31 explicitly contrasts the new covenant with 'the covenant I made with their fathers' at Sinai, marking it as a distinct covenant rather than a renewal of the old.", "Connect concepts by tying the new covenant's forgiveness and Spirit-given new heart to Christ's substitutionary death and to the Spirit's regenerating work.", "Apply pastorally by grounding assurance of forgiveness and the meaning of the Lord's Supper in the covenant Christ inaugurated 'in my blood.'"], "prerequisites": [{"id": "bt.mosaic-covenant", "strength": "hard", "rationale": "Jeremiah 31:32 defines the new covenant explicitly against the Sinai covenant ('not like the covenant I made with their fathers'), so the learner must know the Mosaic covenant to see what the new covenant is distinct from and improves upon."}, {"id": "chr.substitutionary-death", "strength": "hard", "rationale": "Luke 22:20 grounds the new covenant in Christ's blood poured out, so the covenant cannot be understood apart from the atoning death that seals it."}, {"id": "pneu.regeneration", "strength": "soft", "rationale": "Ezekiel's promise of a new heart and Spirit describes the subjective, applied side of the new covenant, so this doctrine enriches understanding of how the covenant reaches individual believers."}]}, {"id": "bt.kingdom-of-god", "name": "The Kingdom of God", "band": 2, "summary": "God has always reigned as king over all creation, but he promised to exercise that kingship concretely through David's line. Jesus proclaimed this kingdom as breaking in, now exercises it from the Father's right hand, and will consummate it in Davidic form at his return.", "scripture": ["Ps 103:19", "Mark 1:14-15", "Eph 1:20-22", "Luke 1:32-33"], "anchors": [{"source": "BFM2000", "ref": "IX. The Kingdom"}, {"source": "NiceneCreed", "ref": "'and his kingdom shall have no end'"}], "mastery": ["Explain from Scripture the difference between God's universal, ever-present kingship (Ps 103:19) and the Davidic kingdom specifically promised, announced, and still awaiting consummation.", "Connect concepts by tracing the line from the Davidic covenant's throne promise through Christ's ascension-session to his still-future Davidic return.", "Apply pastorally by teaching believers to live under Christ's present reign in hope while awaiting its visible, earthly consummation."], "prerequisites": [{"id": "bt.davidic-covenant", "strength": "hard", "rationale": "The kingdom of God's specifically Davidic shape comes directly from God's oath to David, so that covenant's content is presupposed by any claim about how God's kingship is exercised through a king."}, {"id": "chr.ascension-session", "strength": "soft", "rationale": "Ephesians 1 locates the kingdom's present exercise in Christ's session at the Father's right hand, so this doctrine explains the 'already' half of the kingdom's already/not-yet shape."}, {"id": "esc.christ-returns", "strength": "soft", "rationale": "The kingdom's Davidic consummation is tied to Christ's future return, so this doctrine supplies the 'not-yet' half without which the kingdom's descriptive arc would be incomplete."}]}, {"id": "bib.god-has-spoken", "name": "God Has Spoken", "band": 1, "summary": "God is not silent. He has freely made himself known to his creatures, supremely in his Son and in the Scriptures, so that knowing God truly is possible because God has revealed himself.", "scripture": ["Hebrews 1:1-2", "Psalm 19:1-4", "Deuteronomy 29:29"], "anchors": [{"source": "BFM2000", "ref": "Article I (The Scriptures)"}], "mastery": ["Can state that our knowledge of God rests on God's own self-revelation, not human discovery", "Can cite Hebrews 1:1-2 as the summary of how God has spoken"], "prerequisites": [], "errors": ["Deism (a silent, uninvolved creator)", "Agnosticism (God, if real, is unknowable)"]}, {"id": "bib.general-special-revelation", "name": "General and Special Revelation", "band": 1, "summary": "God reveals himself in two ways: generally to all people through creation and conscience, and specially through his saving words and acts recorded in Scripture. General revelation leaves everyone without excuse; special revelation is necessary to know the gospel.", "scripture": ["Psalm 19:1-11", "Romans 1:18-20", "Romans 10:14-17"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can distinguish what creation reveals (God's power and nature) from what only Scripture reveals (the gospel)", "Can explain from Romans 1 why no one is excused by ignorance"], "prerequisites": [{"id": "bib.god-has-spoken", "strength": "hard", "rationale": "The two modes of revelation are subdivisions of the prior claim that God reveals himself at all."}]}, {"id": "bib.inspiration", "name": "Inspiration of Scripture", "band": 1, "summary": "All Scripture is breathed out by God. Human authors wrote with their own styles and circumstances, yet what they wrote is God's own word, carried along by the Holy Spirit.", "scripture": ["2 Timothy 3:16-17", "2 Peter 1:20-21"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can state that Scripture has dual authorship: fully human writing, fully God's word", "Can quote or closely paraphrase 2 Timothy 3:16"], "prerequisites": [{"id": "bib.general-special-revelation", "strength": "hard", "rationale": "Inspiration is the mechanism of special revelation in written form; without the category of special revelation, inspiration has no place to live."}], "errors": ["Dictation theory (authors as passive stenographers)", "Merely human religious genius"]}, {"id": "bib.inerrancy", "name": "Truthfulness of Scripture", "band": 1, "summary": "Because Scripture is God's word and God cannot lie, the Bible is totally true and trustworthy in all it affirms. It has truth, without any mixture of error, for its matter.", "scripture": ["Psalm 119:160", "John 17:17", "Titus 1:2", "Numbers 23:19"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can trace the logic: God cannot lie, Scripture is God's word, therefore Scripture is true", "Can state the BFM phrase that Scripture has 'truth, without any mixture of error, for its matter'"], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "Inerrancy is an entailment of inspiration by a truthful God; asserted without inspiration it is groundless."}, {"id": "theo.god-is-holy", "strength": "soft", "rationale": "The character of God (who cannot lie) is the premise that makes the entailment work; a basic grasp of God's perfection strengthens the argument."}]}, {"id": "bib.authority", "name": "Authority of Scripture", "band": 1, "summary": "Scripture is the supreme standard by which all human conduct, creeds, and religious opinions are tried. To disbelieve or disobey Scripture is to disbelieve or disobey God.", "scripture": ["Isaiah 66:2", "Matthew 4:4", "John 10:35", "2 Timothy 3:16-17"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can state that Scripture, not experience, tradition, or preference, is the final authority for faith and practice", "Can give one concrete example of submitting a personal opinion to the text"], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "Scripture's authority is God's authority; it binds the conscience only because it is God's word."}, {"id": "bib.inerrancy", "strength": "soft", "rationale": "A word that could err in what it affirms would be a diminished standard; trustworthiness undergirds functional authority."}]}, {"id": "bib.canon", "name": "The Canon: Sixty-Six Books", "band": 1, "summary": "The Bible consists of thirty-nine Old Testament and twenty-seven New Testament books. The church did not create the canon but recognized the books God had inspired.", "scripture": ["Luke 24:44", "2 Peter 3:15-16", "John 10:27"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can state the structure of the Bible (39 OT, 27 NT) and name the major divisions", "Can articulate that the church recognized, rather than conferred, canonicity"], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "Canon is the boundary question of inspiration: which books are God-breathed. Without inspiration there is nothing to bound."}], "errors": ["Canon as a fourth-century political invention"]}, {"id": "bib.clarity-sufficiency", "name": "Clarity and Sufficiency of Scripture", "band": 1, "summary": "Scripture is clear enough that ordinary believers, reading it faithfully with the Spirit's help, can understand what is necessary for salvation and godliness; and it is sufficient, needing no supplement of new revelation for faith and life.", "scripture": ["Psalm 119:105", "Psalm 119:130", "Deuteronomy 6:6-7", "2 Timothy 3:15-17"], "anchors": [{"source": "BFM2000", "ref": "Article I"}, {"source": "2LBC1689", "ref": "1.6-1.7"}], "mastery": ["Can state that an ordinary Christian can understand the Bible's central message without an expert intermediary", "Can explain why the church does not need, and should not expect, new revelation added to Scripture"], "prerequisites": [{"id": "bib.authority", "strength": "hard", "rationale": "Sufficiency is authority applied to scope: Scripture is the final standard because nothing else is needed alongside it."}, {"id": "bib.canon", "strength": "soft", "rationale": "Sufficiency presupposes a closed, identifiable canon to be sufficient."}]}, {"id": "bib.reading-in-context", "name": "Reading Scripture in Context", "band": 1, "summary": "Scripture is read according to its plain sense in context: each passage means what its author, carried by the Spirit, meant, understood in its literary and historical setting and in light of the whole Bible, which centers on Christ.", "scripture": ["Nehemiah 8:8", "Luke 24:27", "2 Timothy 2:15", "Acts 17:11"], "anchors": [{"source": "BFM2000", "ref": "Article I ('All Scripture is a testimony to Christ')"}], "mastery": ["Can state the basic questions of context: who wrote it, to whom, why, and what surrounds the verse", "Can identify one example of a verse commonly misused out of context and give its contextual sense"], "prerequisites": [{"id": "bib.clarity-sufficiency", "strength": "soft", "rationale": "Clarity motivates the ordinary reader to read for themselves; contextual reading is the discipline that honors it."}, {"id": "bib.authority", "strength": "hard", "rationale": "Submitting to Scripture's authority requires seeking the text's actual meaning rather than imposing one."}]}, {"id": "bib.autographs", "name": "The Autographs", "band": 2, "summary": "Inspiration and inerrancy belong properly to the original manuscripts of Scripture as God gave them through the biblical authors. Copies and translations carry that authority faithfully to the degree they accurately reflect the autographs, so today's believer can trust the Bible in hand without needing to hold the original parchment.", "scripture": ["2 Timothy 3:16", "2 Peter 1:20-21", "Psalm 12:6-7"], "anchors": [{"source": "BFM2000", "ref": "Article I, The Scriptures"}], "mastery": ["Explain from Scripture why inspiration is predicated most precisely of the original manuscripts rather than of any single copy or translation.", "Connect the doctrine of the autographs to functional trust in modern translations, given the reliability of the manuscript tradition.", "Apply pastorally: answer the objection 'we don't have the originals, so how can we trust the Bible' without overclaiming or underclaiming."], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "You cannot locate where inspiration properly applies until you already understand what inspiration claims God did in giving the text through human authors."}, {"id": "bib.inerrancy", "strength": "hard", "rationale": "Inerrancy is classically qualified as pertaining to the autographs; the qualification only makes sense once inerrancy itself is understood as a claim about the text God breathed out."}]}, {"id": "bib.progressive-revelation", "name": "Progressive Revelation", "band": 2, "summary": "God revealed himself and his purposes gradually across redemptive history, with earlier revelation genuinely true but incomplete, and later revelation fulfilling and clarifying rather than contradicting it. Christ stands as the climax toward which every earlier word was moving.", "scripture": ["Hebrews 1:1-2", "2 Timothy 3:16-17", "Genesis 3:15"], "anchors": [{"source": "BFM2000", "ref": "Article I, The Scriptures"}], "mastery": ["Explain from Scripture how God spoke 'at many times and in many ways' before speaking finally in his Son.", "Connect progressive revelation to the single unfolding storyline of Scripture.", "Apply pastorally: help a reader make sense of texts that seem to say less, or differently, than later Scripture will say."], "prerequisites": [{"id": "bt.one-story", "strength": "hard", "rationale": "Progressive revelation only makes sense within a single unfolding storyline moving toward Christ; without one story, 'earlier' and 'later' revelation would just be disconnected fragments rather than stages of one plan."}, {"id": "bib.god-has-spoken", "strength": "soft", "rationale": "That God has spoken at all is the presupposition beneath the claim that he has spoken progressively, in stages, over time."}]}, {"id": "bib.self-authentication", "name": "Self-Authentication of Scripture", "band": 2, "summary": "Scripture's authority is inherent to itself as God's word, not conferred upon it by church councils or human decree. The church recognized and received the canon it did not create, because God's sheep hear their Shepherd's voice in these words.", "scripture": ["John 10:27", "1 Corinthians 2:9-13", "1 Thessalonians 2:13"], "anchors": [{"source": "BFM2000", "ref": "Article I, The Scriptures"}, {"source": "2LBC1689", "ref": "Chapter 1, Paragraphs 4-5"}], "mastery": ["Explain from Scripture the difference between the church recognizing the canon and the church conferring authority upon it.", "Connect self-authentication to the doctrine of canon as its theological foundation.", "Apply pastorally: reassure a believer troubled by claims that 'councils decided what's in the Bible' that the councils were recognizing, not creating, God's word."], "prerequisites": [{"id": "bib.canon", "strength": "hard", "rationale": "Self-authentication explains the mechanism by which the canon was recognized rather than invented, so it presupposes and deepens the prior claim that a canon exists."}, {"id": "bib.authority", "strength": "soft", "rationale": "Claiming Scripture authenticates itself is a specific account of where its authority comes from, which depends on already affirming that Scripture is authoritative."}]}, {"id": "chr.deity", "name": "Jesus Is Fully God", "band": 1, "summary": "Jesus Christ is the eternal Son of God: fully divine, worshiped, sovereign over creation, forgiving sins, and identified with the God of Israel. He did not become God; he is God from all eternity.", "scripture": ["John 1:1-3", "John 8:58", "John 20:28", "Colossians 1:15-17", "Hebrews 1:3"], "anchors": [{"source": "BFM2000", "ref": "Article II.B (God the Son)"}, {"source": "NiceneCreed", "ref": "'Very God of very God... of one substance with the Father'"}], "mastery": ["Can cite at least two texts where Jesus receives worship or divine titles", "Can state that the Son is eternal, not created or promoted"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "The claim 'Jesus is God' has its true weight only within monotheism; otherwise it is merely adding a god."}], "errors": ["Arianism", "Jesus as merely a great teacher or prophet"]}, {"id": "chr.humanity", "name": "Jesus Is Fully Man", "band": 1, "summary": "The eternal Son took on true and complete human nature: body, mind, and soul. He was born, grew, hungered, wept, suffered, and died. His humanity is not a costume but the condition of his saving work.", "scripture": ["John 1:14", "Luke 2:52", "Hebrews 2:14-17", "Hebrews 4:15"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}, {"source": "ChalcedonianDefinition", "ref": "'truly man... consubstantial with us according to the manhood'"}], "mastery": ["Can name concrete gospel evidence of Jesus' real humanity (hunger, sleep, grief, death)", "Can state from Hebrews 2 why the Savior had to share our nature"], "prerequisites": [{"id": "anth.image-of-god", "strength": "soft", "rationale": "Grasping what human nature is clarifies what the Son assumed; the true man is also the true image."}], "errors": ["Docetism (Jesus only seemed human)"]}, {"id": "chr.one-person", "name": "One Person, Truly God and Truly Man", "band": 1, "summary": "Jesus Christ is one person with two natures: fully God and fully man, without confusion, change, division, or separation. He is not half of each, nor two persons sharing a body, but one Lord who is both.", "scripture": ["John 1:14", "Philippians 2:5-11", "Colossians 2:9", "1 Timothy 2:5"], "anchors": [{"source": "ChalcedonianDefinition", "ref": "Full definition"}, {"source": "BFM2000", "ref": "Article II.B"}], "mastery": ["Can state the formula: one person, two natures, fully God and fully man", "Can recognize the two basic mistakes: dividing him into two persons, or blending the natures into a hybrid"], "prerequisites": [{"id": "chr.deity", "strength": "hard", "rationale": "The union presupposes the full deity being united."}, {"id": "chr.humanity", "strength": "hard", "rationale": "The union presupposes the full humanity being united."}], "errors": ["Nestorianism (two persons)", "Eutychianism (natures blended)", "Apollinarianism (divine mind in a human body)"]}, {"id": "chr.virgin-birth", "name": "The Virgin Birth", "band": 1, "summary": "Jesus was conceived by the Holy Spirit and born of the virgin Mary. The virgin conception marks the entrance of the eternal Son into human history: truly born of a woman, yet not merely the product of human generation.", "scripture": ["Isaiah 7:14", "Matthew 1:18-25", "Luke 1:34-35"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}, {"source": "ApostlesCreed", "ref": "'conceived by the Holy Spirit, born of the virgin Mary'"}], "mastery": ["Can narrate the annunciation accounts and state what they claim", "Can connect the virgin birth to the incarnation: how the Son entered humanity"], "prerequisites": [{"id": "chr.one-person", "strength": "soft", "rationale": "The virgin conception is the historical doorway of the incarnation; it is best understood as the 'how' of the person already confessed."}]}, {"id": "chr.sinless-life", "name": "The Sinless Life", "band": 1, "summary": "Jesus was tempted in every respect as we are, yet without sin. He perfectly obeyed the Father in our nature, qualifying him to be both the spotless sacrifice and the righteousness given to his people.", "scripture": ["Hebrews 4:15", "2 Corinthians 5:21", "1 Peter 2:22", "Matthew 3:15"], "anchors": [{"source": "BFM2000", "ref": "Article II.B ('perfect obedience')"}], "mastery": ["Can state that Jesus' temptations were real and his obedience complete", "Can explain why a sinful savior could not save (the lamb without blemish)"], "prerequisites": [{"id": "chr.humanity", "strength": "hard", "rationale": "Sinlessness is only remarkable, and only saving, in one who was truly tempted as a man."}, {"id": "anth.sin-universal", "strength": "soft", "rationale": "The universal sinfulness of mankind is the dark backdrop against which his uniqueness registers."}]}, {"id": "chr.substitutionary-death", "name": "He Died in Our Place", "band": 1, "summary": "On the cross Christ bore the sins of his people as their substitute. The punishment we deserved fell on him; God set him forth as the propitiation that satisfies divine justice, so that God is both just and the justifier of those who believe.", "scripture": ["Isaiah 53:4-6", "Mark 10:45", "Romans 3:25-26", "2 Corinthians 5:21", "1 Peter 3:18"], "anchors": [{"source": "BFM2000", "ref": "Article II.B ('substitutionary death')"}], "mastery": ["Can state substitution in one sentence: he took my place, my sin, my penalty", "Can walk through Isaiah 53:4-6 identifying the exchange", "Can explain why the cross was necessary rather than God simply overlooking sin"], "prerequisites": [{"id": "anth.wages-of-sin", "strength": "hard", "rationale": "Substitution answers a penalty; without sin's real wages there is nothing for a substitute to bear."}, {"id": "theo.god-is-love-and-just", "strength": "hard", "rationale": "The cross is unintelligible unless God's justice cannot waive sin and his love provides the substitute himself."}, {"id": "chr.sinless-life", "strength": "hard", "rationale": "Only a sinless substitute has no debt of his own and can stand in for others."}, {"id": "chr.one-person", "strength": "soft", "rationale": "The infinite worth of the substitute rests on who he is: the God-man's death avails for many."}], "errors": ["Cross as mere moral example", "Cross as divine child abuse caricature (Father and Son opposed rather than united in purpose)"]}, {"id": "chr.resurrection", "name": "The Bodily Resurrection", "band": 1, "summary": "On the third day Jesus rose bodily from the dead. The tomb was empty; he was seen, touched, and ate with witnesses. The resurrection is the Father's vindication of the Son, the receipt of the cross, and the firstfruits of our own resurrection.", "scripture": ["1 Corinthians 15:3-8", "Luke 24:36-43", "Romans 4:25", "Romans 1:4"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}, {"source": "ApostlesCreed", "ref": "'the third day he rose again from the dead'"}], "mastery": ["Can state that the resurrection was bodily, not merely spiritual or symbolic", "Can connect resurrection to justification via Romans 4:25", "Can list the categories of witness in 1 Corinthians 15:3-8"], "prerequisites": [{"id": "chr.substitutionary-death", "strength": "hard", "rationale": "The resurrection is the vindication of the atoning death; preached alone it is a marvel, together it is the gospel."}], "errors": ["Spiritual-only resurrection", "Swoon and hallucination theories"]}, {"id": "chr.ascension-session", "name": "Ascended and Reigning", "band": 1, "summary": "Jesus ascended into heaven and is seated at the right hand of the Father, where he reigns over all things and ever lives to intercede for his people. The Christian life is lived under a living, present Lord.", "scripture": ["Acts 1:9-11", "Ephesians 1:20-22", "Hebrews 7:25", "Romans 8:34"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}, {"source": "ApostlesCreed", "ref": "'he ascended into heaven, and sitteth on the right hand of God'"}], "mastery": ["Can state where Christ is now and what he is doing (reigning and interceding)", "Can explain how Christ's intercession gives assurance to a struggling believer"], "prerequisites": [{"id": "chr.resurrection", "strength": "hard", "rationale": "The ascension is the risen Christ's enthronement; there is no session without resurrection."}]}, {"id": "chr.offices", "name": "The Threefold Office of Christ", "band": 2, "summary": "Jesus fulfills the three anointed offices of the Old Testament as prophet, priest, and king: he speaks God's final word, offers himself and now intercedes as our great high priest, and will reign forever on David's throne. Together the three offices show a Savior who reveals, reconciles, and rules.", "scripture": ["Hebrews 1:1-2", "Luke 4:43", "Hebrews 5:6", "Hebrews 7:25", "Psalm 89:35-37", "Revelation 11:15"], "anchors": [{"source": "AbstractOfPrinciples", "ref": "Article VII, The Mediator"}, {"source": "BFM2000", "ref": "Article II.B, God the Son"}], "mastery": ["Explain from Scripture how Christ fulfills each of the three anointed offices of prophet, priest, and king.", "Connect the offices to the Old Testament roles they fulfill and complete.", "Apply pastorally: show a struggling believer why Christ's ongoing priestly intercession means their standing before God does not depend on their own performance."], "prerequisites": [{"id": "chr.deity", "strength": "hard", "rationale": "Only one who is fully God can be the final prophet who speaks God's own word, the priest whose sacrifice is sufficient, and the king who reigns forever, rather than a merely human placeholder in each office."}, {"id": "chr.ascension-session", "strength": "soft", "rationale": "Christ's present priestly intercession and future kingly reign depend on his having ascended and been seated at the Father's right hand."}]}, {"id": "chr.kenosis-glory", "name": "Kenosis and the Veiling of Glory", "band": 2, "summary": "In becoming man, Christ laid aside the independent exercise of his divine prerogatives and the visible display of his glory, not one atom of his deity. He emptied himself by taking the form of a servant, not by subtracting anything from who he eternally is.", "scripture": ["Philippians 2:5-11", "John 17:5", "2 Corinthians 8:9"], "anchors": [{"source": "ChalcedonianDefinition", "ref": "the two-natures, one-person formula"}, {"source": "NiceneCreed", "ref": "\"who for us men and for our salvation came down\""}], "mastery": ["Explain from Scripture that Christ's self-emptying was an addition of humanity and a veiling of glory, not a subtraction from his deity.", "Distinguish this from the kenotic-theory error, which claims the Son actually surrendered one or more divine attributes in the incarnation.", "Apply pastorally: help a believer marvel at humility that chose lowliness while remaining fully God throughout."], "prerequisites": [{"id": "chr.deity", "strength": "hard", "rationale": "Kenosis can only be rightly understood as the veiling of glory rather than the loss of deity if the concept's ceiling \u2014 that Christ never stopped being fully God \u2014 is already firmly in place."}, {"id": "chr.humanity", "strength": "hard", "rationale": "The 'taking on' side of kenosis is Christ's genuine assumption of humanity and servanthood, which requires already understanding that he is truly and fully man."}]}, {"id": "chr.messiah", "name": "Jesus as Messiah", "band": 2, "summary": "Jesus is the promised Messiah, David's greater son, in whom every royal and prophetic hope of the Old Testament converges and finds its fulfillment. The long-awaited anointed one has come, and his name is Jesus of Nazareth.", "scripture": ["1 Chronicles 17:11-14", "Matthew 22:41-46", "Luke 2:11", "Luke 24:27"], "anchors": [{"source": "ApostlesCreed", "ref": "Article 2 (\"Jesus Christ\")"}, {"source": "BFM2000", "ref": "Article II.B, God the Son"}], "mastery": ["Explain from Scripture how the Davidic covenant's promises are fulfilled in Jesus as Messiah.", "Connect messianic fulfillment to the promise-fulfillment pattern running through the whole Bible.", "Apply pastorally: strengthen confidence in Scripture's reliability by tracing a single promise from Old Testament announcement to New Testament fulfillment in Christ."], "prerequisites": [{"id": "chr.deity", "strength": "hard", "rationale": "The New Testament identifies the promised Messiah not merely as a great king but as one who shares the divine name and prerogatives, so messiahship in its full biblical sense presupposes his deity."}, {"id": "bt.promise-fulfillment", "strength": "soft", "rationale": "Recognizing Jesus as Messiah is a specific instance of the broader biblical pattern in which God's promises find their yes and amen in Christ."}]}, {"id": "ecc.what-is-church", "name": "What the Church Is", "band": 1, "summary": "A New Testament church is an autonomous local congregation of baptized believers, associated by covenant in the faith and fellowship of the gospel, observing the two ordinances, governed by his laws, and exercising the gifts, rights, and privileges invested in them by Christ's word. Scripture also speaks of the church as the body of Christ including all the redeemed of all ages.", "scripture": ["Matthew 16:18", "Acts 2:41-47", "1 Corinthians 12:12-14", "Ephesians 1:22-23"], "anchors": [{"source": "BFM2000", "ref": "Article VI (The Church)"}], "mastery": ["Can define the local church as a gathered congregation of baptized believers, not a building or a broadcast audience", "Can distinguish the local church from the universal body of the redeemed"], "prerequisites": [{"id": "sot.gospel", "strength": "hard", "rationale": "The church is created by the gospel; a congregation is defined by the news it shares and confesses."}, {"id": "pneu.regeneration", "strength": "hard", "rationale": "A believers' church presupposes that its members are born again; regenerate membership is the Baptist distinctive."}]}, {"id": "ecc.membership", "name": "Church Membership", "band": 1, "summary": "Believers formally join themselves to a local congregation, covenanting to gather, love, serve, submit, and be accountable to one another. Membership makes visible what conversion creates: belonging to Christ means belonging to his people.", "scripture": ["Acts 2:41-42", "Hebrews 10:24-25", "Hebrews 13:17", "1 Corinthians 5:12-13"], "anchors": [{"source": "BFM2000", "ref": "Article VI ('associated by covenant')"}], "mastery": ["Can explain why membership is more than attendance: mutual covenant obligations", "Can state what a member owes the body and what the body owes the member"], "prerequisites": [{"id": "ecc.what-is-church", "strength": "hard", "rationale": "Membership is the mechanism of the covenant community; the definition of the church comes first."}, {"id": "ecc.baptism", "strength": "hard", "rationale": "Baptism is the entrance marker; membership in a Baptist church is membership of baptized believers."}]}, {"id": "ecc.baptism", "name": "Believer's Baptism", "band": 1, "summary": "Baptism is the immersion of a believer in water in the name of the Father, Son, and Holy Spirit: an act of obedience symbolizing faith in the crucified, buried, and risen Savior, the believer's death to sin, and resurrection to walk in newness of life. It is for believers, and it does not save.", "scripture": ["Matthew 28:19-20", "Romans 6:3-5", "Acts 8:36-38", "Colossians 2:12"], "anchors": [{"source": "BFM2000", "ref": "Article VII (Baptism and the Lord's Supper)"}], "mastery": ["Can state the three-fold symbolism from Romans 6 (death, burial, resurrection)", "Can explain why baptism follows conversion rather than causing it", "Can state Antioch's practice: immersion of professing believers"], "prerequisites": [{"id": "sot.faith", "strength": "hard", "rationale": "Believer's baptism is the public confession of faith already present; the subject of baptism is a believer by definition."}, {"id": "chr.resurrection", "strength": "soft", "rationale": "The sign's meaning is union with Christ's death and resurrection; the resurrection gives the coming-up-out-of-the-water its content."}], "contested": {"positions": ["Credobaptism: baptism of professing believers, normally by immersion (Baptist, most non-denominational)", "Paedobaptism: baptism of believers and their infant children as covenant sign (Presbyterian, Reformed, Anglican, Lutheran, Methodist)"], "house_position": "Credobaptism by immersion, per BFM2000 Article VII: the ordinance belongs to believers, and immersion pictures its meaning.", "note": "Band 3 must treat covenant-theology arguments for paedobaptism fairly (continuity with circumcision) and answer from newness of the new covenant (Jeremiah 31:31-34)."}, "errors": ["Baptismal regeneration (baptism as saving)"]}, {"id": "ecc.lords-supper", "name": "The Lord's Supper", "band": 1, "summary": "The Lord's Supper is a symbolic act of obedience whereby members of the church, through partaking of the bread and the fruit of the vine, memorialize the death of the Redeemer, examine themselves, and anticipate his second coming. It is a means of grace in the sense that Christ meets his people at the table by faith, not that the elements change.", "scripture": ["1 Corinthians 11:23-32", "Matthew 26:26-29", "Luke 22:19-20"], "anchors": [{"source": "BFM2000", "ref": "Article VII"}], "mastery": ["Can narrate the institution and state the three tenses of the Supper: remembering his
