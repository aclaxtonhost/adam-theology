}], "mastery": ["Explain from Scripture that God's power is limited only by his own character, never by anything outside himself.", "Connect omnipotence to God's roles as Creator and covenant-keeper.", "Apply pastorally: encourage prayer that rests on the truth that nothing is too hard for God."], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Creation out of nothing is the paradigm case of omnipotence; the God who could speak the universe into being is the God whose power has no rival."}, {"id": "theo.god-is-sovereign", "strength": "soft", "rationale": "Omnipotence supplies the power behind God's sovereign decrees so that what he purposes he is able to accomplish."}]}, {"id": "theo.omnipresence", "name": "Omnipresence", "band": 2, "summary": "God is fully present everywhere at once, not spread thin across space but wholly himself in every place. There is nowhere a creature can go to escape him, and nowhere he is absent to help.", "scripture": ["Psalm 139:7-10", "1 Kings 8:27", "Jeremiah 23:23-24"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 2, Paragraph 1 (\"immense\")"}, {"source": "AthanasianCreed", "ref": "the incomprehensible/immense clauses"}], "mastery": ["Explain from Scripture why no place is outside God's presence, including heaven's highest heights.", "Connect omnipresence to God's omniscience \u2014 he sees all because he is present to all.", "Apply pastorally: comfort the isolated or fearful believer that God is near even when no one else is."], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Because God made space itself rather than existing within it as one more object, his presence is not confined the way a created being's is; the Creator/creature distinction grounds his presence everywhere in creation."}, {"id": "theo.omniscience", "strength": "soft", "rationale": "God's exhaustive knowledge of every place coheres with his being personally present in every place."}]}, {"id": "theo.providence", "name": "Providence", "band": 2, "summary": "God actively governs every event in creation, working through ordinary causes \u2014 human choices, natural laws, even evil intentions \u2014 to accomplish his purposes. His sovereignty is not bare decree from a distance but hands-on rule over history's smallest and largest details.", "scripture": ["Proverbs 16:33", "Genesis 50:20", "Job 1:21", "Acts 17:28"], "anchors": [{"source": "BFM2000", "ref": "Article II.A, God the Father"}, {"source": "2LBC1689", "ref": "Chapter 5, Of Divine Providence"}], "mastery": ["Explain from Scripture how God governs through, not around, ordinary causes such as human decisions.", "Connect providence to God's sovereignty as the 'how' behind the 'that' of his rule over all things.", "Apply pastorally: help a believer see God's hand in circumstances that look, on the surface, like mere chance or others' cruelty."], "prerequisites": [{"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "Providence is sovereignty in action \u2014 the concrete, moment-by-moment outworking of the fact that God rules over all; you cannot grasp the how without first holding the that."}, {"id": "theo.omnipotence", "strength": "soft", "rationale": "Governing every proximate cause in creation without being thwarted requires the power omnipotence describes."}]}, {"id": "theo.simplicity", "name": "Divine Simplicity", "band": 3, "summary": "God is not assembled out of parts the way creatures are; he does not have holiness as one component alongside love as another. Each of his attributes is identical with his one undivided essence, so that to know any one of his perfections truly is to be brought face to face with the whole God.", "scripture": ["Exodus 3:14", "John 4:24", "1 John 4:8", "James 1:17"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 2, Paragraph 1 (\"without body, parts, or passions\")"}, {"source": "AthanasianCreed", "ref": "the undivided-substance clauses"}], "mastery": ["Teach that God's attributes are not parts assembled into a whole but each identical with his one undivided being.", "Distinguish simplicity from errors that pit one attribute against another, as though God's love must be negotiated against his holiness.", "Represent fairly the philosophical objection that simplicity makes attribute-language merely equivocal, while showing why classical theism has not found this decisive."], "prerequisites": [{"id": "theo.god-is-holy", "strength": "hard", "rationale": "Simplicity's central claim \u2014 that holiness and love are not competing parts of God but the same undivided God under different names \u2014 cannot be taught without the concept of holiness already in hand as one of the attributes in question."}, {"id": "theo.god-is-love-and-just", "strength": "hard", "rationale": "The classic pastoral confusion simplicity resolves is love versus justice; students must already hold both as true of God before they can see they are not in tension within his one being."}, {"id": "theo.trinity", "strength": "soft", "rationale": "Simplicity of essence must be carefully distinguished from the real distinction of persons in the Trinity, so the two doctrines illuminate rather than contradict each other."}]}], "domains": {"bib": {"label": "Scripture", "color": "#9A7B24"}, "theo": {"label": "God & Trinity", "color": "#6B121E"}, "chr": {"label": "Christology", "color": "#55357E"}, "pneu": {"label": "Holy Spirit", "color": "#2E6E5B"}, "anth": {"label": "Man & Sin", "color": "#7A5638"}, "ang": {"label": "Angels", "color": "#4E4E8F"}, "sot": {"label": "Salvation", "color": "#B03A4A"}, "ecc": {"label": "The Church", "color": "#2F5382"}, "esc": {"label": "Last Things", "color": "#B4671E"}, "bt": {"label": "Redemptive History", "color": "#5E7031"}, "ht": {"label": "Historical", "color": "#5A6B7C"}, "apo": {"label": "Apologetics", "color": "#7D4A66"}}};
const concepts = DATA.concepts, domains = DATA.domains;
const byId = Object.fromEntries(concepts.map(c=>[c.id,c]));
const dom = id => id.split(".")[0];
const dinfo = id => domains[dom(id)] || {label:dom(id), color:"#777"};

/* ---- layout: topological levels + barycenter ordering ---- */
const dependents = {}; concepts.forEach(c=>dependents[c.id]=[]);
concepts.forEach(c=>c.prerequisites.forEach(p=>dependents[p.id].push(c.id)));
let placed=new Set(), levels=[], rem=new Set(concepts.map(c=>c.id));
while(rem.size){
  const lvl=[...rem].filter(id=>byId[id].prerequisites.every(p=>p.strength!=="hard"||placed.has(p.id))).sort();
  lvl.forEach(id=>{placed.add(id); rem.delete(id)});
  levels.push(lvl);
}
const domOrder = Object.keys(domains);
levels.forEach(l=>l.sort((a,b)=>domOrder.indexOf(dom(a))-domOrder.indexOf(dom(b))||a.localeCompare(b)));
const pos={};
function idx(l){const m={}; l.forEach((id,i)=>m[id]=i); return m}
for(let sweep=0; sweep<4; sweep++){
  const down = sweep%2===0;
  const order = down? [...levels.keys()].slice(1) : [...levels.keys()].slice(0,-1).reverse();
  for(const li of order){
    const ref = idx(levels[down? li-1 : li+1]);
    levels[li].sort((a,b)=>{
      const bc=id=>{
        const ns = down? byId[id].prerequisites.map(p=>p.id) : dependents[id];
        const xs = ns.filter(n=>n in ref).map(n=>ref[n]);
        return xs.length? xs.reduce((s,x)=>s+x,0)/xs.length : ref[id]??0;
      };
      return bc(a)-bc(b)||a.localeCompare(b);
    });
  }
}
/* pixel positions */
const font="600 10.5px system-ui"; const meas=document.createElement("canvas").getContext("2d"); meas.font=font;
const nw = id => Math.ceil(meas.measureText(byId[id].name).width)+(byId[id].contested?34:20);
const NH=26, VGAP=64, HGAP=14, LEFT=70, TOP=44;
let maxW=0;
levels.forEach(l=>{ maxW=Math.max(maxW, l.reduce((s,id)=>s+nw(id)+HGAP,0)-HGAP); });
const W=Math.max(maxW+LEFT+40, 900), H=TOP+levels.length*(NH+VGAP);
levels.forEach((l,li)=>{
  const total=l.reduce((s,id)=>s+nw(id)+HGAP,0)-HGAP;
  let x=LEFT+(W-LEFT-40-total)/2;
  l.forEach(id=>{ pos[id]={x, y:TOP+li*(NH+VGAP), w:nw(id), lvl:li}; x+=nw(id)+HGAP; });
});

/* ---- render ---- */
const svg=document.getElementById("svg");
svg.setAttribute("width",W); svg.setAttribute("height",H);
const NS="http://www.w3.org/2000/svg";
const el=(t,a)=>{const e=document.createElementNS(NS,t); for(const k in a)e.setAttribute(k,a[k]); return e};
const roman=n=>["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV","XVI","XVII","XVIII"][n-1]||n;
levels.forEach((_,li)=>{
  const y=TOP+li*(NH+VGAP)+NH/2;
  svg.appendChild(el("line",{class:"unitline",x1:8,y1:y,x2:W,y2:y}));
  const t=el("text",{class:"unitlabel",x:14,y:y+4}); t.textContent="Unit "+roman(li+1); svg.appendChild(t);
});
const edgeG=el("g",{}), nodeG=el("g",{}); svg.appendChild(edgeG); svg.appendChild(nodeG);
const edgeEls=[];
concepts.forEach(c=>c.prerequisites.forEach(p=>{
  const a=pos[p.id], b=pos[c.id];
  const x1=a.x+a.w/2, y1=a.y+NH, x2=b.x+b.w/2, y2=b.y;
  const path=el("path",{class:"edge"+(p.strength==="soft"?" soft":""),
    d:`M${x1},${y1} C${x1},${y1+VGAP*.55} ${x2},${y2-VGAP*.55} ${x2},${y2}`});
  path.dataset.from=p.id; path.dataset.to=c.id; path.dataset.strength=p.strength;
  edgeG.appendChild(path); edgeEls.push(path);
}));
const nodeEls={};
concepts.forEach(c=>{
  const p=pos[c.id], color=dinfo(c.id).color;
  const g=el("g",{class:"node",transform:`translate(${p.x},${p.y})`});
  g.appendChild(el("rect",{width:p.w,height:NH,fill:color}));
  const t=el("text",{x:p.w/2 - (c.contested?6:0), y:NH/2+3.5, "text-anchor":"middle"});
  t.textContent=c.name; g.appendChild(t);
  if(c.contested){const f=el("text",{class:"flag", x:p.w-13, y:NH/2+3.5}); f.textContent="⚑"; g.appendChild(f);}
  const title=el("title",{}); title.textContent=c.name+" — "+c.summary; g.appendChild(title);
  g.addEventListener("click",()=>select(c.id));
  nodeG.appendChild(g); nodeEls[c.id]=g;
});

/* ---- legend & stats ---- */
document.getElementById("legend").innerHTML = Object.entries(domains)
  .map(([k,v])=>`<span class="lg"><span class="sw" style="background:${v.color}"></span>${v.label}</span>`).join("")
  +`<span class="lg" style="margin-left:8px">⚑ contested — positions differ among the orthodox</span>`;
const nE=concepts.reduce((s,c)=>s+c.prerequisites.length,0);
const nH=concepts.reduce((s,c)=>s+c.prerequisites.filter(p=>p.strength==="hard").length,0);
document.getElementById("stats").textContent=`${concepts.length} doctrines · ${nE} dependencies (${nH} hard, ${nE-nH} soft) · Band I: Foundations`;

/* ---- selection: light the ancestor lineage ---- */
let selected=null;
function ancestors(id){
  const seen=new Set([id]); const stack=[id];
  while(stack.length){ byId[stack.pop()].prerequisites.forEach(p=>{
    if(!seen.has(p.id)){seen.add(p.id); stack.push(p.id);} });}
  return seen;
}
function select(id){
  selected=id;
  const keep=ancestors(id);
  concepts.forEach(c=>{
    nodeEls[c.id].classList.toggle("dim", !keep.has(c.id));
    nodeEls[c.id].classList.toggle("selected", c.id===id);
  });
  edgeEls.forEach(e=>{
    const inChain = keep.has(e.dataset.to) && keep.has(e.dataset.from);
    e.classList.toggle("lit", inChain);
    e.classList.toggle("dim", !inChain);
  });
  renderPanel(id);
}
function clearSel(){
  selected=null;
  Object.values(nodeEls).forEach(n=>n.classList.remove("dim","selected"));
  edgeEls.forEach(e=>e.classList.remove("dim","lit"));
  document.getElementById("panel").classList.remove("open");
}
document.getElementById("clearBtn").addEventListener("click",clearSel);
document.getElementById("softToggle").addEventListener("change",e=>{
  edgeEls.forEach(p=>{ if(p.dataset.strength==="soft") p.style.display=e.target.checked?"":"none"; });
});

/* ---- detail panel ---- */
const esc=s=>s.replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
function renderPanel(id){
  const c=byId[id], d=dinfo(id);
  const req=dependents[id].map(x=>byId[x]);
  let h=`<button class="pclose" onclick="clearSel()" aria-label="Close">×</button>
    <div class="pdomain" style="color:${d.color}">${d.label} · Band ${c.band}</div>
    <h2>${esc(c.name)}</h2><div class="pid">${c.id}</div>
    <div class="summary">${esc(c.summary)}</div>
    <h3>Scripture</h3><div class="chips">${c.scripture.map(s=>`<span class="chip">${esc(s)}</span>`).join("")}</div>
    <h3>Anchored to</h3><div class="chips">${c.anchors.map(a=>`<span class="chip">${esc(a.source)} — ${esc(a.ref)}</span>`).join("")}</div>
    <h3>Evidence of mastery</h3><ul class="mastery">${c.mastery.map(m=>`<li>${esc(m)}</li>`).join("")}</ul>`;
  if(c.prerequisites.length){
    h+=`<h3>Stands on</h3>`+c.prerequisites.map(p=>`
      <div class="prereq ${p.strength}"><a onclick="select('${p.id}')">${esc(byId[p.id].name)}</a>
      <span class="badge ${p.strength}">${p.strength}</span>
      <div class="rationale">${esc(p.rationale)}</div></div>`).join("");
  }
  if(req.length){
    h+=`<h3>Required by</h3><div class="chips">${req.map(r=>`<span class="chip" style="cursor:pointer" onclick="select('${r.id}')">${esc(r.name)}</span>`).join("")}</div>`;
  }
  if(c.errors) h+=`<h3>Guards against</h3><ul class="mastery errors">${c.errors.map(e2=>`<li>${esc(e2)}</li>`).join("")}</ul>`;
  if(c.contested){
    h+=`<h3>Contested among the orthodox</h3><div class="contested">
      ${c.contested.positions.map(p=>`<div>· ${esc(p)}</div>`).join("")}
      <div class="house">Antioch teaches: ${esc(c.contested.house_position)}</div>
      ${c.contested.note?`<div class="rationale" style="margin-top:6px">${esc(c.contested.note)}</div>`:""}</div>`;
  }
  const panel=document.getElementById("panel");
  panel.innerHTML=h; panel.classList.add("open"); panel.scrollTop=0;
}
window.select=select;
window.clearSel=clearSel;
</script>
</body>
</html>
