death, examining ourselves now, anticipating his return", "Can explain self-examination from 1 Corinthians 11 without turning the table into a place of terror"], "prerequisites": [{"id": "chr.substitutionary-death", "strength": "hard", "rationale": "The Supper proclaims the Lord's death; broken body and shed blood are substitution enacted in sign."}, {"id": "ecc.membership", "strength": "soft", "rationale": "The Supper is a church ordinance, an act of the covenanted body, which membership makes concrete."}], "contested": {"positions": ["Memorialism: the elements are symbols; Christ is remembered (Baptist, Zwinglian heritage)", "Spiritual presence: Christ is truly present to faith by the Spirit (Reformed/Calvinist)", "Sacramental union / transubstantiation: Christ's body and blood present in or as the elements (Lutheran, Roman Catholic)"], "house_position": "Memorial view per BFM2000 Article VII, held warmly: a symbolic act, yet a real communion with Christ by faith at his table."}}, {"id": "ecc.polity", "name": "How the Church Is Governed", "band": 1, "summary": "Each local congregation operates under the Lordship of Christ through democratic processes: the gathered members are the final earthly court of appeal in matters of membership, discipline, and doctrine, while entrusting leadership to their pastors. Christ alone is head of the church.", "scripture": ["Matthew 18:15-17", "Acts 6:1-6", "1 Corinthians 5:4-5", "Colossians 1:18"], "anchors": [{"source": "BFM2000", "ref": "Article VI ('democratic processes... Christ as Lord')"}], "mastery": ["Can state that Christ is the head and the congregation acts under him", "Can name matters that come to the gathered church (membership, discipline)"], "prerequisites": [{"id": "ecc.membership", "strength": "hard", "rationale": "Congregational governance presupposes a defined congregation; only covenanted members can bear that responsibility."}], "contested": {"positions": ["Congregationalism, often elder-led: final authority under Christ rests with the gathered congregation (Baptist)", "Presbyterianism: governance by graded courts of elders (sessions, presbyteries)", "Episcopalianism: governance by bishops in historic succession (Anglican, Methodist, Catholic, Orthodox)"], "house_position": "Elder-led congregationalism per BFM2000 Article VI: the congregation is the final earthly authority, served and led by its pastors/elders."}}, {"id": "ecc.offices", "name": "Pastors and Deacons", "band": 1, "summary": "The New Testament church has two scriptural offices: pastors (also called elders and overseers, one office under three names) who teach, shepherd, and lead, and deacons who serve the body's practical needs. Both are qualified by character.", "scripture": ["1 Timothy 3:1-13", "Titus 1:5-9", "Acts 20:28", "1 Peter 5:1-4"], "anchors": [{"source": "BFM2000", "ref": "Article VI ('Its scriptural officers are pastors and deacons')"}], "mastery": ["Can name the two offices and their distinct functions (word and oversight; service)", "Can state that the qualification lists are overwhelmingly about character"], "prerequisites": [{"id": "ecc.polity", "strength": "hard", "rationale": "The offices operate within the congregational frame; leaders lead a body that remains responsible under Christ."}], "contested": {"positions": ["Both offices limited to men: 1 Timothy 3:11 read as the deacons' wives, and the office, though one of service rather than teaching-leadership, carries a measure of standing and authority (1 Tim 3:13).", "Women may serve as deacons: 1 Timothy 3:11 read as women deacons, with Phoebe (Romans 16:1) as precedent and the office understood as service without headship \u2014 a view held by some Southern Baptist churches."], "house_position": "Both offices are limited to men. The office of pastor/elder is limited to men per BFM2000 Article VI; for deacons, the house reads 1 Timothy 3:11 as 'wives,' and holds that although the diaconate is a serving office rather than a teaching-leading one, the standing it confers (1 Tim 3:13) makes it a male office as well. Pastor's resolved position, 2026.", "note": "Teach the alternative reading fairly; the debate is exegetical, not a dispute over biblical authority."}}, {"id": "ecc.priesthood-of-believers", "name": "Priesthood of All Believers", "band": 1, "summary": "Every believer has direct access to God through Christ, the one mediator, and every believer is a priest called to offer spiritual sacrifices, intercede for others, and minister the word. No human intermediary stands between the Christian and God.", "scripture": ["1 Peter 2:5-9", "Hebrews 4:14-16", "1 Timothy 2:5", "Revelation 1:5-6"], "anchors": [{"source": "BFM2000", "ref": "Article VI; Preamble ('the priesthood of all believers')"}], "mastery": ["Can state that access to God is through Christ alone, for every believer equally", "Can explain what priesthood does not mean: private autonomy that ignores the congregation and its teachers"], "prerequisites": [{"id": "chr.ascension-session", "strength": "hard", "rationale": "Believer-priesthood rests on Christ's high priesthood; we draw near because he ever lives to intercede."}, {"id": "sot.adoption", "strength": "soft", "rationale": "The access of a priest is also the access of a child; adoption warms the doctrine."}]}, {"id": "ecc.discipline", "name": "Church Discipline and Restoration", "band": 1, "summary": "Christ gave his church a process for addressing unrepentant sin among members: private appeal, widening witness, and finally the action of the gathered congregation, always aiming at repentance and restoration, never revenge. Discipline is love refusing to abandon a wandering member.", "scripture": ["Matthew 18:15-17", "Galatians 6:1", "1 Corinthians 5:1-13", "2 Corinthians 2:6-8"], "anchors": [{"source": "BFM2000", "ref": "Article VI ('governed by His laws')"}], "mastery": ["Can walk through the Matthew 18 steps in order", "Can state the goal (restoration) and the spirit (gentleness, Galatians 6:1)"], "prerequisites": [{"id": "ecc.membership", "strength": "hard", "rationale": "Discipline is the covenant's accountability clause; you cannot be removed from a fellowship you never joined (1 Corinthians 5:12, 'those inside')."}, {"id": "sot.sanctification", "strength": "soft", "rationale": "Discipline is corporate sanctification: the body pursuing holiness together."}]}, {"id": "ecc.great-commission", "name": "The Great Commission", "band": 1, "summary": "The risen Christ commands his church to make disciples of all nations, baptizing and teaching them to obey all he commanded. Every Christian and every church is sent; missions and evangelism are not a department but the church's marching orders.", "scripture": ["Matthew 28:18-20", "Acts 1:8", "Romans 10:13-15"], "anchors": [{"source": "BFM2000", "ref": "Article XI (Evangelism and Missions)"}], "mastery": ["Can quote or closely paraphrase Matthew 28:18-20 and identify its one imperative (make disciples)", "Can name their own place in it: personal witness, sending, praying, going"], "prerequisites": [{"id": "sot.gospel", "strength": "hard", "rationale": "The commission is the delivery mandate for the message; without the gospel there is nothing to herald."}, {"id": "chr.ascension-session", "strength": "soft", "rationale": "'All authority has been given to me' grounds the command; the mission proceeds from the throne."}]}, {"id": "ecc.stewardship", "name": "Stewardship and Giving", "band": 1, "summary": "God is the source of all blessings; Christians hold time, talents, and material possessions in trust for his glory. Believers should give cheerfully, regularly, systematically, proportionately, and liberally to advance the Redeemer's cause through the local church.", "scripture": ["2 Corinthians 9:6-8", "Malachi 3:10", "1 Corinthians 16:2", "Matthew 6:19-21"], "anchors": [{"source": "BFM2000", "ref": "Article XIII (Stewardship)"}], "mastery": ["Can state the principle: ownership is God's, stewardship is ours", "Can describe generous giving as worship and treasure-placement (Matthew 6:21), not dues"], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Stewardship follows from creation: everything held is his because everything made is his."}, {"id": "ecc.membership", "strength": "soft", "rationale": "Giving is channeled through the covenant community; membership gives generosity its primary address."}]}, {"id": "esc.christ-returns", "name": "Christ Will Return", "band": 1, "summary": "Jesus Christ will return personally and visibly in glory to the earth. His coming is certain, its timing unknown, and its expectation is meant to produce watchfulness, holiness, and hope, not date-setting.", "scripture": ["Acts 1:11", "Titus 2:13", "Matthew 24:36", "1 Thessalonians 4:16-17"], "anchors": [{"source": "BFM2000", "ref": "Article X (Last Things)"}, {"source": "NiceneCreed", "ref": "'he shall come again, with glory'"}], "mastery": ["Can state the return as personal, visible, and bodily (Acts 1:11: 'in the same way')", "Can explain why date-setting is disobedience to Matthew 24:36", "Can name the practical fruit expectation should produce (Titus 2:12-13)"], "prerequisites": [{"id": "chr.ascension-session", "strength": "hard", "rationale": "The return is the reigning Christ coming from where he now is; ascension and return are one arc (Acts 1:11)."}]}, {"id": "esc.resurrection-judgment", "name": "Resurrection and Final Judgment", "band": 1, "summary": "All the dead will be raised bodily, and Christ will judge all people in righteousness. For those in Christ the judgment holds no condemnation; for those outside it confirms their sentence. Every life will be rendered an account.", "scripture": ["John 5:28-29", "Acts 17:31", "2 Corinthians 5:10", "Revelation 20:11-15"], "anchors": [{"source": "BFM2000", "ref": "Article X"}, {"source": "ApostlesCreed", "ref": "'from thence he shall come to judge the quick and the dead'"}], "mastery": ["Can state that resurrection is universal and bodily, for the just and unjust", "Can distinguish the believer's judgment (works evaluated, salvation secure) from condemnation"], "prerequisites": [{"id": "esc.christ-returns", "strength": "hard", "rationale": "The judgment is an event of the return; Christ himself is the appointed judge (Acts 17:31)."}, {"id": "chr.resurrection", "strength": "hard", "rationale": "Christ's bodily resurrection is the firstfruits and pattern of ours; deny his and the general resurrection loses its anchor (1 Corinthians 15:20)."}, {"id": "anth.wages-of-sin", "strength": "soft", "rationale": "Final judgment is the wages of sin reaching term; the earlier doctrine sets the stakes."}]}, {"id": "esc.eternal-states", "name": "Heaven and Hell", "band": 1, "summary": "The unrighteous will be consigned to hell, the place of everlasting punishment; the righteous, in resurrection bodies, will receive their reward and dwell forever with the Lord in the new heaven and new earth. The Christian hope is not escape from creation but its renewal, with God dwelling among his people.", "scripture": ["Matthew 25:46", "Revelation 21:1-5", "2 Thessalonians 1:9", "John 14:1-3"], "anchors": [{"source": "BFM2000", "ref": "Article X"}], "mastery": ["Can state both destinies without softening either, from Matthew 25:46's parallel ('eternal... eternal')", "Can describe the final hope concretely from Revelation 21: new creation, God with us, no more death", "Can correct the cloud-and-harp caricature with the embodied, renewed-earth hope"], "prerequisites": [{"id": "esc.resurrection-judgment", "strength": "hard", "rationale": "The eternal states are the judgment's outcomes; destiny follows verdict."}, {"id": "theo.god-is-love-and-just", "strength": "soft", "rationale": "Hell is just and heaven is grace; the doctrine of God keeps both destinies from seeming arbitrary."}], "errors": ["Universalism (all saved regardless)", "Annihilationism", "Disembodied cloud-heaven as the final state"]}, {"id": "esc.intermediate-state", "name": "The Intermediate State", "band": 2, "summary": "At death, the believer's spirit departs to be consciously with the Lord, a state of blessing while awaiting the future resurrection of the body. The unbeliever likewise continues in conscious existence, but in torment and separation from God, awaiting final judgment.", "scripture": ["2 Corinthians 5:8", "Philippians 1:23", "Luke 23:43", "Luke 16:19-31"], "anchors": [{"source": "BFM2000", "ref": "Article X, Last Things"}], "mastery": ["Explain from Scripture that both believer and unbeliever exist consciously between death and resurrection, not in soul sleep.", "Distinguish the biblical intermediate state from the errors of purgatory and postmortem second chances.", "Apply pastorally: comfort a grieving believer with the assurance that their loved one in Christ is consciously present with the Lord now, while awaiting the resurrection."], "prerequisites": [{"id": "esc.eternal-states", "strength": "hard", "rationale": "The intermediate state is explicitly a temporary condition preceding the final, eternal states, so it presupposes that a permanent destiny still lies ahead for both believer and unbeliever."}, {"id": "anth.composition", "strength": "hard", "rationale": "An intermediate, disembodied state between death and resurrection only makes sense given the material/immaterial composition of the human person, whose soul can be separated from the body for a time."}]}, {"id": "esc.judgment-seat", "name": "The Judgment Seat of Christ", "band": 2, "summary": "Every believer will stand before Christ to have their works evaluated for reward, a judgment of a Christian's service, never a re-litigation of their guilt or standing. Because there is no condemnation for those in Christ, this judgment tests what has been built on the one foundation, not whether the foundation itself is secure.", "scripture": ["1 Corinthians 3:10-15", "2 Corinthians 5:10", "Romans 8:1"], "anchors": [{"source": "BFM2000", "ref": "Article IV.D, Glorification"}], "mastery": ["Explain from Scripture the difference between the judgment seat of Christ, which evaluates believers' works, and the final judgment of the unbeliever.", "Connect the judgment seat to assurance grounded in 'no condemnation' rather than anxiety about losing salvation.", "Apply pastorally: motivate faithful service and stewardship using reward rather than fear of condemnation as the incentive Scripture actually gives."], "prerequisites": [{"id": "sot.justification", "strength": "hard", "rationale": "The judgment seat of Christ presupposes a believer already justified and secure, since it evaluates works for reward rather than determining whether the person belongs to Christ at all."}, {"id": "chr.resurrection", "strength": "soft", "rationale": "Standing before Christ to be evaluated presupposes his resurrection and exaltation as the one now positioned to judge his people's service."}]}, {"id": "esc.israel-and-church", "name": "Israel and the Church", "band": 3, "summary": "God has one salvation program: in every age, one people redeemed by grace through faith in the one Savior. Interrelated with it, yet distinct from it, runs his nations program, in which ethnic-national Israel retains irrevocable promises and a future role. The church does not replace Israel, and Israel and the church are not two peoples with two salvations \u2014 forcing a choice between 'one people of God' and 'a national future for Israel' is a false dichotomy.", "scripture": ["Romans 11:1-2", "Romans 11:25-29", "Galatians 3:28-29", "Ephesians 2:11-16", "Jeremiah 31:31-34"], "anchors": [{"source": "BFM2000", "ref": "Article X (Last Things)"}], "mastery": ["Teach the distinction between God's single salvation program and his nations program, and how Romans 11 holds both.", "Represent fairly the supersessionist reading (the church as the fulfillment-heir of Israel's promises) and the classic dispensational reading (two distinct peoples and programs), each at its strongest.", "Distinguish the house position from both errors it refuses: a two-salvations scheme, and a replacement scheme that voids 'the gifts and the calling of God are irrevocable.'"], "prerequisites": [{"id": "bt.covenants", "strength": "hard", "rationale": "The whole question is what the covenants promise and to whom; without the covenant structure the Israel-church debate has no material to adjudicate."}, {"id": "bt.promise-fulfillment", "strength": "hard", "rationale": "The positions divide precisely over how OT promises reach fulfillment \u2014 expanded to the church, deferred to national Israel, or both in ordered relation \u2014 so the fulfillment pattern must already be understood."}, {"id": "ecc.what-is-church", "strength": "hard", "rationale": "One side of the relation must be defined before the relation can be: what the church is, and that it comprises all the redeemed, is the fixed point the debate turns around."}], "errors": ["Two-salvations schemes (Israel saved on other terms than grace through faith)", "Hard supersessionism that empties Romans 11 of a future for ethnic Israel"], "contested": {"positions": ["Fulfillment/supersessionist views: Israel's promises are inherited and fulfilled in Christ and his church, with no distinct national future (covenant theology; amillennial and postmillennial mainstream).", "Classic dispensationalism: Israel and the church are two distinct peoples with distinct programs, kept separate through history and eternity.", "Mediating positions: one people of God across the ages, with a genuine future for ethnic-national Israel within it (historic premillennialism; progressive dispensationalism)."], "house_position": "One salvation program for one people of God in every age, interrelated with a distinct nations program in which Israel's ethnic-national identity and promises hold \u2014 the pastor's stated framework (2026), judging the usual either/or a false dichotomy.", "note": "This node governs how the millennium and tribulation nodes are taught; keep the hermeneutical continuity claim in view \u2014 the method never changed, only the architecture."}}, {"id": "esc.tribulation", "name": "The Tribulation", "band": 3, "summary": "Scripture foretells a future period of unparalleled distress and divine judgment preceding Christ's return \u2014 Daniel's seventieth week, the time of Jacob's trouble \u2014 in which God purges and saves Israel while judgment engulfs the whole earth. Its horror is real, its length bounded, and its end fixed: the King returns.", "scripture": ["Daniel 9:24-27", "Jeremiah 30:7", "Matthew 24:15-31", "Revelation 6:15-17"], "anchors": [{"source": "BFM2000", "ref": "Article X (Last Things)"}], "mastery": ["Teach the tribulation's biblical shape from Daniel 9, Matthew 24, and Revelation 6-19, including its double character as wrath on the world and refining of Israel.", "Represent fairly the preterist reading (fulfilled in A.D. 70) and idealist reading (symbolic of church-age suffering) alongside the futurist reading, at their strongest.", "Distinguish sober expectation from sensationalism: the doctrine produces watchfulness and evangelistic urgency, not newspaper exegesis."], "prerequisites": [{"id": "esc.christ-returns", "strength": "hard", "rationale": "The tribulation is defined by what it precedes; without the certainty of the return it is terror without telos."}, {"id": "esc.israel-and-church", "strength": "hard", "rationale": "Reading the period as Jacob's trouble \u2014 Israel's purging within God's nations program \u2014 depends on the Israel-church framework already being in place."}, {"id": "bib.reading-in-context", "strength": "soft", "rationale": "The futurist reading follows from the same grammatical-historical method applied to Daniel and Revelation; the hermeneutic motivates the position."}], "contested": {"positions": ["Futurist: a future, bounded period of divine judgment before Christ's return (premillennial readings generally).", "Preterist: substantially fulfilled in the judgment on Jerusalem in A.D. 70.", "Idealist/symbolic: Revelation's judgments picture the whole church age's conflict rather than one future period."], "house_position": "Futurist: a real, future, bounded tribulation preceding the return, read by the same literal hermeneutic that governs the rest of the graph."}}, {"id": "esc.rapture-timing", "name": "The Catching Up of the Church, and Its Timing", "band": 3, "summary": "At Christ's coming, the dead in Christ will rise and living believers will be caught up together with them to meet the Lord in the air, all transformed in a moment. That this will happen is certain; when it happens relative to the tribulation is a debate among premillennialists, and this congregation binds no one's conscience on the timing.", "scripture": ["1 Thessalonians 4:13-18", "1 Corinthians 15:51-52", "1 Thessalonians 5:9", "Titus 2:13"], "anchors": [{"source": "BFM2000", "ref": "Article X (Last Things)"}], "mastery": ["Teach the certainty of the catching-up from 1 Thessalonians 4 and 1 Corinthians 15 before any timing question is raised.", "Represent the pretribulational, midtribulational/prewrath, and posttribulational positions with their strongest texts (1 Thess 5:9 and Rev 3:10; the trumpet parallels; Matt 24:29-31), each as its adherents would state it.", "Distinguish the doctrine's pastoral point \u2014 comfort and readiness \u2014 from timing controversy, so that hope, not charting, is what students carry out of the room."], "prerequisites": [{"id": "esc.christ-returns", "strength": "hard", "rationale": "The catching-up is an event of Christ's coming; its certainty is borrowed entirely from his."}, {"id": "esc.tribulation", "strength": "hard", "rationale": "The timing debate is defined relative to the tribulation; the period must be understood before positions about placement around it can be."}, {"id": "sot.glorification", "strength": "soft", "rationale": "The instantaneous transformation of 1 Corinthians 15:51-52 is glorification's moment of arrival; the two doctrines describe one event from two angles."}], "contested": {"positions": ["Pretribulational: the church is caught up before the tribulation, kept from the hour of trial (1 Thess 5:9; Rev 3:10).", "Midtribulational / prewrath: the church is removed partway through, before the outpouring of divine wrath proper.", "Posttribulational: the catching-up occurs at the visible return itself, the church meeting the descending King (the historic-premillennial pairing)."], "house_position": "No formal congregational position; Antioch teaches the certainty of the catching-up and readiness for Christ's return. The pastor leans pretribulational, and holds that the standard objection \u2014 that pretribulationism requires two peoples of God \u2014 is a false dichotomy, since God's single salvation program and his nations program are interrelated but distinct.", "note": "Confirmed 2026. Teach all three positions as within the family; the certainty is confessional, the timing is not."}}, {"id": "esc.millennium", "name": "The Millennial Reign", "band": 3, "summary": "After his return, Christ will reign on the earth for a thousand years, Satan bound, the promises to Israel and the nations realized in history: the Davidic King on David's throne, worldwide peace and justice, creation's flourishing, long life \u2014 an age gloriously better than this one yet not itself the eternal state, since death at great age and a final rebellion still mark it. The same hermeneutic that reads the first coming's prophecies plainly reads these plainly too.", "scripture": ["Revelation 20:1-6", "Zechariah 14:9", "Isaiah 65:20-25", "Psalm 89:35-37", "Micah 4:1-4"], "anchors": [{"source": "BFM2000", "ref": "Article X (Last Things \u2014 intentionally broad on millennial views)"}], "mastery": ["Teach the premillennial case from the sequence of Revelation 19-20 and from OT texts that fit neither this age nor the eternal state (Isaiah 65:20's death at advanced age).", "Represent amillennialism and postmillennialism fairly at their strongest \u2014 Rev 20 as the church age with Satan bound from deceiving the nations; the gospel's leavening triumph \u2014 as their adherents would state them.", "Distinguish the house's classical premillennialism from the dispensational form: same earthly reign, same national promises kept, but one people of God throughout, per the Israel-and-church framework."], "prerequisites": [{"id": "esc.christ-returns", "strength": "hard", "rationale": "Premillennialism is a claim about the return's sequence \u2014 Christ comes, then reigns; the return's certainty and character are its foundation."}, {"id": "esc.israel-and-church", "strength": "hard", "rationale": "Whose promises the millennium keeps, and how, is settled by the Israel-church framework; the millennium is that framework's payoff in history."}, {"id": "chr.offices", "strength": "soft", "rationale": "The millennium is the kingly office publicly exercised: David's greater Son visibly on David's throne."}, {"id": "bt.promise-fulfillment", "strength": "soft", "rationale": "The reign is the arrival point of the promise-fulfillment pattern for the national and creational promises still outstanding."}], "contested": {"positions": ["Premillennialism: Christ returns before a future earthly reign \u2014 in classical/historic form (one people of God) or dispensational form (two peoples, two programs).", "Amillennialism: the thousand years symbolize the present church age; Christ returns to immediate final judgment and the eternal state.", "Postmillennialism: the gospel progressively triumphs in history, Christ returning after a millennial golden age."], "house_position": "Classical/traditional premillennialism, per the pastor's position (2026): a literal hermeneutic held consistently from Genesis to Revelation, a future earthly reign in which Israel's national promises are kept, within one people of God saved by one gospel.", "note": "Frame the debate as exegetically live and within the family; the hermeneutic-held-constant point (the method that predicted the first coming plainly reads the second the same way) is the house's strongest card and should be taught as such."}}, {"id": "ht.faith-once-delivered", "name": "The Faith Once for All Delivered", "band": 1, "summary": "Christianity is a received faith, not an invented one. From the beginning the church has confessed the same core truths in short summaries (creeds), guarded them against distortion, and handed them down. The Apostles' Creed is the oldest widely used summary of that deposit.", "scripture": ["Jude 3", "2 Timothy 1:13-14", "1 Corinthians 15:3-4", "2 Thessalonians 2:15"], "anchors": [{"source": "ApostlesCreed", "ref": "Whole text"}, {"source": "BFM2000", "ref": "Preamble (confessions as 'instruments of doctrinal accountability')"}], "mastery": ["Can state why creeds exist: to summarize and guard, never to replace, Scripture", "Can recite or closely follow the Apostles' Creed and connect each line to a doctrine already learned"], "prerequisites": [{"id": "bib.authority", "strength": "hard", "rationale": "Creeds have derivative authority only; the norming norm must be in place before subordinate standards are introduced, or the order of authority inverts."}, {"id": "theo.trinity", "strength": "soft", "rationale": "The creeds are Trinitarian in shape; a learner who knows the doctrine will recognize the structure."}]}, {"id": "ht.baptist-identity", "name": "Who Baptists Are", "band": 1, "summary": "Baptists are evangelical Christians marked by believer's baptism, regenerate church membership, congregational governance, religious liberty, and the authority of Scripture. Southern Baptist churches cooperate voluntarily through the SBC for missions and confess the Baptist Faith & Message 2000. Antioch has stood in this stream since 1979.", "scripture": ["Acts 2:41-42", "Galatians 1:6-9", "Matthew 22:21"], "anchors": [{"source": "BFM2000", "ref": "Preamble; Article XIV (Cooperation); Article XVII (Religious Liberty)"}], "mastery": ["Can name the Baptist distinctives and locate each in a doctrine already learned", "Can explain what the SBC is (voluntary cooperation of autonomous churches) and what the BFM2000 is for"], "prerequisites": [{"id": "ecc.baptism", "strength": "hard", "rationale": "The name is the distinctive; Baptist identity is unintelligible without believer's baptism."}, {"id": "ecc.polity", "strength": "hard", "rationale": "Congregational autonomy and voluntary cooperation are the polity distinctives that define the SBC's structure."}, {"id": "ht.faith-once-delivered", "strength": "soft", "rationale": "Baptist identity sits inside historic orthodoxy; the wider stream should be learned before the tributary."}]}, {"id": "ht.nicaea-trinity", "name": "Nicaea, Constantinople, and the Trinity", "band": 2, "summary": "When Arius taught 'there was when he was not,' the councils of Nicaea (325) and Constantinople (381) responded not by inventing a new doctrine but by confessing, in the word homoousios, what Scripture had already taught about the Son's full deity. This episode is the church's clearest historical instance of the recognized-not-created pattern that marks all sound doctrine.", "scripture": ["John 1:1-3", "John 10:30", "Jude 3", "1 Tim 6:20"], "anchors": [{"source": "NiceneCreed", "ref": "whole creed, esp. 'begotten, not made, of one substance with the Father'"}, {"source": "AthanasianCreed", "ref": "Trinitarian sections"}, {"source": "BFM2000", "ref": "II. God"}], "mastery": ["Explain from Scripture why homoousios was chosen to guard, not go beyond, what John 1 and John 10:30 already teach about the Son's deity.", "Connect concepts by showing how Nicaea's confession of a received Trinity illustrates the broader pattern of ht.faith-once-delivered rather than doctrinal innovation.", "Apply pastorally by helping believers see historic creeds as the church's tested, careful hearing of Scripture rather than as additions to it."], "prerequisites": [{"id": "theo.trinity", "strength": "hard", "rationale": "Nicaea's homoousios formula is a historical confession of the doctrine of the Trinity under pressure, so the learner needs the doctrine itself before studying how and why the church defended it."}, {"id": "ht.faith-once-delivered", "strength": "hard", "rationale": "Nicaea's entire argument rests on the claim that the church was confessing, not inventing, doctrine, which presupposes the pattern of a faith once for all delivered to the saints that later councils only recognize."}]}, {"id": "ht.chalcedon-christology", "name": "The Road to Chalcedon", "band": 2, "summary": "Apollinarianism, Nestorianism, and Eutychianism each broke one side of the mystery of Christ's person, and the Council of Chalcedon (451) answered with four guarding adverbs: one person in two natures, without confusion, without change, without division, without separation. The definition does not explain the union but fences it against every distortion.", "scripture": ["John 1:14", "Phil 2:5-11", "Heb 2:14-17"], "anchors": [{"source": "ChalcedonianDefinition", "ref": "whole definition, esp. the four adverbs"}, {"source": "NiceneCreed", "ref": "'and was incarnate... and was made man'"}], "mastery": ["Explain from Scripture how John 1:14 and Philippians 2:5-11 together require both a real divine nature and a real human nature united in one person.", "Connect concepts by naming which historical error (Apollinarian, Nestorian, or Eutychian) each of Chalcedon's four adverbs was written to exclude.", "Apply pastorally by using Chalcedon's guardrails to correct popular but confused pictures of Jesus as a hybrid being or a divided personality."], "prerequisites": [{"id": "chr.one-person", "strength": "hard", "rationale": "Chalcedon's four adverbs exist to protect the confession that Christ is one person in two natures, so the learner must already hold that doctrine before the historical definition's precise wording will make sense."}, {"id": "ht.nicaea-trinity", "strength": "soft", "rationale": "Chalcedon presupposes the Trinitarian grammar Nicaea and Constantinople established \u2014 that the Son is fully God alongside the Father \u2014 so that earlier council's confession enriches understanding of what is being united to humanity at the incarnation."}]}, {"id": "ht.canon-history", "name": "How the Canon Was Recognized", "band": 2, "summary": "The Old Testament canon was received by Israel and confirmed by Jesus himself as an already-closed collection of Law, Prophets, and Writings. The New Testament was recognized \u2014 not decided \u2014 by the churches' shared tests of apostolic origin, doctrinal orthodoxy, and widespread reception, a process sharpened by Marcion's truncated canon, documented in the Muratorian fragment, and summarized in Athanasius' 367 festal letter, with later councils simply ratifying what the churches already held.", "scripture": ["Luke 24:44", "2 Pet 3:15-16", "Col 4:16"], "anchors": [{"source": "BFM2000", "ref": "I. The Scriptures"}, {"source": "2LBC1689", "ref": "Chapter 1, Of the Holy Scriptures, paragraph 3"}], "mastery": ["Explain from Scripture how Luke 24:44 shows Jesus already treating the Hebrew Scriptures as a closed, three-part canon before the church existed.", "Connect concepts by relating 2 Peter 3:15-16's treatment of Paul's letters as 'Scripture' to the historical tests of apostolicity, orthodoxy, and reception the churches later formalized against Marcion.", "Apply pastorally by reassuring believers that the canon's boundaries were recognized through a traceable historical process, not imposed by late ecclesiastical fiat."], "prerequisites": [{"id": "bib.canon", "strength": "hard", "rationale": "This node narrates the history behind the doctrine of the canon, so the learner needs the doctrine itself \u2014 what a canon is and why it is closed \u2014 before the historical process of its recognition will be meaningful."}, {"id": "bib.self-authentication", "strength": "soft", "rationale": "The historical tests of apostolicity, orthodoxy, and reception trace the church discerning books that already carried God's authority in themselves, so the theology of self-authentication explains why this history unfolded as recognition rather than decision."}]}, {"id": "ht.reformation-solas", "name": "The Reformation and the Five Solas", "band": 2, "summary": "Justification by faith alone, eclipsed under medieval sacramental practice, was recovered at the Reformation and confessed together with the other four solas as a single, unified conviction: Scripture alone stands over the church as its formal authority, and grace alone, through faith alone, in Christ alone, is the substance of the gospel it authorizes.", "scripture": ["Rom 1:16-17", "Gal 1:6-9", "Eph 2:8-9"], "anchors": [{"source": "BFM2000", "ref": "IV. Salvation (B. Justification)"}, {"source": "2LBC1689", "ref": "Chapter 11, Of Justification"}], "mastery": ["Explain from Scripture how Romans 1:16-17's 'the righteous shall live by faith' grounds justification by faith alone against a merit-based reading of the gospel.", "Connect concepts by showing how sola Scriptura functions as the Reformation's formal principle that authorizes and protects the material principle of justification by faith alone.", "Apply pastorally by helping believers see the five solas as one confession of the gospel rather than five separate slogans."], "prerequisites": [{"id": "sot.justification", "strength": "hard", "rationale": "This node is the historical recovery of the doctrine of justification by faith alone, so the learner needs the doctrine's content before the Reformation's historical struggle to recover it will carry weight."}, {"id": "bib.authority", "strength": "hard", "rationale": "Sola Scriptura, the Reformation's formal principle, is the claim that Scripture alone holds final authority over the church, so the learner needs the doctrine of Scripture's authority to grasp what was actually at stake in setting Scripture over magisterium."}]}, {"id": "ht.baptist-origins", "name": "Baptist Origins", "band": 2, "summary": "Baptist origins trace from English Separatism through John Smyth and Thomas Helwys (1609) and the Particular Baptists' recovery of believer's baptism by immersion in the 1630s-40s, confessed in the 1644 and 1689 confessions and defended as a matter of religious liberty by Roger Williams and John Leland. The Southern Baptist Convention was founded in 1845 specifically in defense of appointing slaveholders as missionaries \u2014 an origin the SBC's own 1995 resolution explicitly repudiated. The Baptist Faith and Message that flows from this history has since been revised in 1925, 1963, and 2000.", "scripture": ["Acts 2:41", "Matt 22:21", "Gal 5:1"], "anchors": [{"source": "BFM2000", "ref": "Preamble, noting the 1925/1963/2000 revisions"}, {"source": "2LBC1689", "ref": "whole confession, as the Particular Baptists' confessional product"}], "mastery": ["Explain from Scripture how Acts 2:41's pattern of baptism following profession of faith underlies the Baptist insistence on believer's, not infant, baptism.", "Connect concepts by tracing the line from English Separatism and Reformation sola Scriptura through the 1644 and 1689 confessions to the SBC's 1845 founding and its later revisions of the Baptist Faith and Message.", "Apply pastorally by teaching this history honestly, including the SBC's founding defense of slaveholding missionaries and its 1995 repudiation of that origin, as a model of naming institutional sin and repenting of it."], "prerequisites": [{"id": "ht.baptist-identity", "strength": "hard", "rationale": "This node narrates how Baptist convictions emerged historically, so the learner needs to already know what those convictions are \u2014 believer's baptism, regenerate membership, local church autonomy, religious liberty \u2014 to recognize them taking shape in the history."}, {"id": "ecc.baptism", "strength": "hard", "rationale": "The Baptist origins story turns centrally on the 1630s-40s recovery of immersion as the proper mode of baptism, so the doctrine of baptism itself is necessary to see what was being recovered and why it was worth dividing over."}, {"id": "ht.reformation-solas", "strength": "soft", "rationale": "Baptist origins grow out of the Reformation's sola Scriptura principle applied more consistently to the church's membership and ordinances, so that background enriches the Separatist and Baptist story without being strictly required to narrate it."}]}, {"id": "pneu.spirit-is-god", "name": "The Spirit Is a Divine Person", "band": 1, "summary": "The Holy Spirit is not a force or influence but a person, and not a lesser being but fully God: he speaks, teaches, grieves, wills, and is lied to as God himself.", "scripture": ["Acts 5:3-4", "John 14:26", "Ephesians 4:30", "1 Corinthians 2:10-11"], "anchors": [{"source": "BFM2000", "ref": "Article II.C (God the Holy Spirit)"}, {"source": "NiceneCreed", "ref": "'the Lord and Giver of life... who with the Father and the Son together is worshiped'"}], "mastery": ["Can cite Acts 5:3-4 to show lying to the Spirit is lying to God", "Can name personal actions of the Spirit (teaching, grieving, willing) that a mere force cannot do"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "The Spirit's deity is confessed within monotheism, as with the Son; the claim is Trinitarian, not additive."}], "errors": ["Spirit as impersonal power or 'it'", "Pneumatomachianism (denying the Spirit's deity)"]}, {"id": "pneu.regeneration", "name": "The New Birth", "band": 1, "summary": "The Spirit gives new life to the spiritually dead. Regeneration is God's work, not self-improvement: a change of heart wrought by the Holy Spirit through conviction of sin, apart from which no one can see the kingdom of God.", "scripture": ["John 3:3-8", "Ezekiel 36:26-27", "Titus 3:5", "Ephesians 2:4-5"], "anchors": [{"source": "BFM2000", "ref": "Article IV.A (Regeneration)"}], "mastery": ["Can state that the new birth is God's act, as unearned as physical birth", "Can connect Ezekiel's heart of stone/heart of flesh to John 3"], "prerequisites": [{"id": "pneu.spirit-is-god", "strength": "soft", "rationale": "Knowing who the Spirit is dignifies what he does; but the experience of new birth is intelligible before the full doctrine of his person."}, {"id": "anth.sin-universal", "strength": "hard", "rationale": "New birth presupposes death: only those dead in sin need to be born again."}]}, {"id": "pneu.indwelling", "name": "The Spirit Indwells Believers", "band": 1, "summary": "Every believer receives the Holy Spirit at conversion. He dwells within as seal and down payment of the inheritance to come; the Christian's body is a temple of the Spirit.", "scripture": ["Romans 8:9", "1 Corinthians 6:19-20", "Ephesians 1:13-14"], "anchors": [{"source": "BFM2000", "ref": "Article II.C"}], "mastery": ["Can state that indwelling is true of every Christian, not a second-tier attainment", "Can explain 'seal' and 'guarantee' from Ephesians 1:13-14"], "prerequisites": [{"id": "pneu.regeneration", "strength": "hard", "rationale": "The Spirit indwells those he has made alive; indwelling is the continuation of regeneration."}]}, {"id": "pneu.sanctifying-work", "name": "The Spirit's Sanctifying Work", "band": 1, "summary": "The indwelling Spirit progressively conforms believers to Christ: convicting of sin, producing his fruit, empowering obedience and witness, and illuminating Scripture. Growth in holiness is Spirit-wrought, worked out by the believer.", "scripture": ["Galatians 5:16-25", "Philippians 2:12-13", "2 Corinthians 3:18", "John 16:8"], "anchors": [{"source": "BFM2000", "ref": "Article II.C; Article IV.B (Sanctification)"}], "mastery": ["Can list the fruit of the Spirit and contrast it with the works of the flesh", "Can hold together Philippians 2:12-13: we work because God works in us"], "prerequisites": [{"id": "pneu.indwelling", "strength": "hard", "rationale": "The Spirit sanctifies from within; his transforming work presupposes his residence."}]}, {"id": "pneu.spirit-baptism", "name": "Baptism in/with the Spirit", "band": 2, "summary": "At the moment of conversion, the Holy Spirit places every believer into the one body of Christ, uniting them to the church and to one another. This baptism is positional and universal among believers \u2014 true of every Christian the instant they trust Christ \u2014 not a second, later experience some believers have and others lack.", "scripture": ["1 Corinthians 12:13", "Ephesians 4:5", "Acts 1:5"], "anchors": [{"source": "BFM2000", "ref": "Article II.C, God the Holy Spirit"}], "mastery": ["Explain from Scripture that Spirit-baptism happens to every believer at conversion, not as a later or optional experience.", "Connect Spirit-baptism to union with Christ and incorporation into his body, the church.", "Apply pastorally: relieve a believer's anxiety over not having had a 'second experience' they've been told they must seek."], "prerequisites": [{"id": "pneu.indwelling", "strength": "hard", "rationale": "Spirit-baptism and the Spirit's indwelling both describe realities that begin at conversion; the baptism that unites a believer to Christ's body presupposes the Spirit has already come to dwell within them."}, {"id": "ecc.what-is-church", "strength": "soft", "rationale": "Being baptized 'into one body' only makes sense against the backdrop of what that body, the church, actually is."}]}, {"id": "pneu.illumination", "name": "Illumination", "band": 2, "summary": "The Holy Spirit opens the believer's mind to understand and embrace the truth of Scripture, not by giving new revelation but by removing the blindness sin causes toward truth already given. Illumination moves a reader from bare information to grasped, obeyed truth.", "scripture": ["1 Corinthians 2:10-16", "1 John 2:20", "1 John 2:27"], "anchors": [{"source": "BFM2000", "ref": "Article I, The Scriptures"}], "mastery": ["Explain from Scripture how illumination differs from revelation and inspiration as distinct works of the Spirit relative to Scripture.", "Connect illumination to the Spirit's sanctifying work in producing obedience, not merely comprehension.", "Apply pastorally: encourage prayerful, Spirit-dependent Bible reading rather than purely academic study alone."], "prerequisites": [{"id": "pneu.indwelling", "strength": "hard", "rationale": "Illumination is carried out by the Spirit who already dwells within the believer; an indwelling Spirit is the precondition for his ongoing work of opening the believer's mind to the word."}, {"id": "bib.clarity-sufficiency", "strength": "soft", "rationale": "Illumination assumes Scripture is clear enough to be understood once the Spirit removes the reader's blindness, rather than being inherently obscure."}]}, {"id": "pneu.gifts", "name": "Spiritual Gifts", "band": 2, "summary": "The Holy Spirit sovereignly distributes a diversity of gifts to every believer for the building up of the whole church, not for private status or self-display. No believer is left without some gift to contribute to the body's health and mission.", "scripture": ["Romans 12:4-8", "1 Corinthians 12:4-11", "Ephesians 4:7-16", "1 Peter 4:10-11"], "anchors": [{"source": "BFM2000", "ref": "Article VI, The Church"}], "mastery": ["Explain from Scripture that spiritual gifts are sovereignly distributed by the Spirit for the common good, not chosen or earned by the believer.", "Connect spiritual gifts to the health and edification of the local church as one body with many members.", "Apply pastorally: help a believer identify and steward their gift for the church's benefit rather than comparing themselves to others."], "prerequisites": [{"id": "pneu.indwelling", "strength": "hard", "rationale": "Every gift the Spirit distributes flows from his personal presence within each believer; gifting is one expression of the same Spirit who indwells the whole church."}, {"id": "ecc.what-is-church", "strength": "soft", "rationale": "Gifts are given for the body's edification, so understanding what the church is clarifies the purpose toward which every gift is aimed."}]}, {"id": "pneu.sign-gifts-cessation", "name": "The Sign Gifts and Their Cessation", "band": 3, "summary": "The miraculous sign and revelatory gifts \u2014 apostolic miracles, tongues, and prophecy \u2014 authenticated the apostles' message while the church's once-for-all foundation was being laid, and ceased with that foundation. The Spirit's gifting of the church continues undiminished, but it is ministry-shaped and non-revelatory: the canon is closed and sufficient.", "scripture": ["2 Corinthians 12:12", "Hebrews 2:3-4", "Ephesians 2:20", "1 Corinthians 13:8-10", "Jude 3"], "anchors": [{"source": "2LBC1689", "ref": "1.1 ('those former ways of God's revealing His will unto His people being now ceased')"}], "mastery": ["Teach the authentication purpose of the sign gifts from 2 Corinthians 12:12 and Hebrews 2:3-4, and the foundation logic of Ephesians 2:20.", "Represent continuationism fairly at its strongest \u2014 the reading of 'when the perfect comes' (1 Cor 13:10) as the eschaton, and the ordered practice of 1 Corinthians 14 \u2014 in a way its adherents would recognize.", "Distinguish cessationism from denying the Spirit's present power: God still heals and acts in answer to prayer; it is the revelatory offices and attesting gifts that have ceased."], "prerequisites": [{"id": "pneu.gifts", "strength": "hard", "rationale": "Cessation is a qualification of the general doctrine of gifts \u2014 which gifts, for which era, for what purpose \u2014 and is unintelligible before the gifts themselves are understood."}, {"id": "bib.clarity-sufficiency", "strength": "hard", "rationale": "The cessationist case finally rests on sufficiency: ongoing revelatory gifts would rival a closed, sufficient canon, so the doctrine of Scripture must be in hand first."}, {"id": "bib.canon", "strength": "soft", "rationale": "A recognized, closed canon is the concrete boundary that continuing revelation would breach; the canon concept sharpens what is at stake."}], "contested": {"positions": ["Cessationism: the sign and revelatory gifts ceased with the apostolic foundation era (the position of the Reformed confessional tradition and, in our day, of teachers such as John MacArthur).", "Continuationism: all the gifts continue and are to be practiced in biblical order (Pentecostal, charismatic, and 'reformed continuationist' streams).", "Open-but-cautious: no settled conclusion; neither seeking nor forbidding."], "house_position": "Cessationist, per the pastor's confirmed position (2026): the attesting and revelatory gifts belonged to the apostolic foundation; the Spirit's ongoing gifting is real, ordinary, and aimed at edification.", "note": "Guard the pastoral tone: the debate is within the family, and the doctrine must never be taught as skepticism about the Spirit himself."}}, {"id": "sot.gospel", "name": "The Gospel", "band": 1, "summary": "The gospel is the good news that Christ died for our sins according to the Scriptures, was buried, and was raised on the third day according to the Scriptures. It is an announcement of what God has done, received by faith, and it is the power of God for salvation.", "scripture": ["1 Corinthians 15:1-8", "Romans 1:16-17", "Mark 1:14-15"], "anchors": [{"source": "BFM2000", "ref": "Article IV (Salvation)"}], "mastery": ["Can state the gospel in one minute using 1 Corinthians 15:3-4 as the skeleton", "Can distinguish the gospel (news to be believed) from advice (steps to be performed)", "Can share it with an unbeliever in plain words"], "prerequisites": [{"id": "chr.substitutionary-death", "strength": "hard", "rationale": "'Died for our sins' is substitution; the gospel's first clause is unintelligible without it."}, {"id": "chr.resurrection", "strength": "hard", "rationale": "'Raised on the third day' is the gospel's second clause; a dead Christ is no good news."}, {"id": "anth.wages-of-sin", "strength": "hard", "rationale": "Good news is only news against the bad news; the gospel answers a real condemnation."}], "errors": ["Moralism (gospel as be-better advice)", "Prosperity gospel", "Gospel reduced to social improvement"]}, {"id": "sot.grace-alone", "name": "By Grace, Not Works", "band": 1, "summary": "Salvation is God's free gift, given by grace through faith, not earned by works, so that no one may boast. Good works are the fruit of salvation, never its ground.", "scripture": ["Ephesians 2:8-10", "Titus 3:4-7", "Romans 4:4-5"], "anchors": [{"source": "BFM2000", "ref": "Article IV"}], "mastery": ["Can quote Ephesians 2:8-9 and state verse 10's place (works as fruit)", "Can diagnose works-righteousness in a concrete statement like 'I hope my good outweighs my bad'"], "prerequisites": [{"id": "sot.gospel", "strength": "hard", "rationale": "Grace-alone is the grammar of the gospel; it states how the announcement is received and guards it from becoming advice."}, {"id": "anth.sin-universal", "strength": "hard", "rationale": "If any were righteous, works could save someone; universal sin closes that door and makes grace the only way in."}]}, {"id": "sot.repentance", "name": "Repentance", "band": 1, "summary": "Repentance is a genuine turning from sin toward God: a change of mind that becomes a change of direction. It is inseparable from faith; the two are one turning described from its two sides.", "scripture": ["Mark 1:15", "Acts 3:19", "Luke 15:17-20", "2 Corinthians 7:10"], "anchors": [{"source": "BFM2000", "ref": "Article IV.A ('Repentance and faith are inseparable experiences of grace')"}], "mastery": ["Can define repentance as turning, not merely feeling sorry", "Can distinguish godly grief from worldly grief using 2 Corinthians 7:10 and the prodigal son"], "prerequisites": [{"id": "anth.sin-universal", "strength": "hard", "rationale": "One turns from something; repentance presupposes owned, personal sin."}, {"id": "sot.gospel", "strength": "hard", "rationale": "Gospel repentance turns toward the God who has provided mercy; without the announcement it is only remorse."}]}, {"id": "sot.faith", "name": "Saving Faith", "band": 1, "summary": "Saving faith is the acceptance of Jesus Christ and wholehearted commitment of the entire person to him as Lord and Savior: knowing the gospel, agreeing it is true, and resting one's whole weight on Christ alone.", "scripture": ["John 3:16", "Romans 10:9-10", "Hebrews 11:1", "Acts 16:31"], "anchors": [{"source": "BFM2000", "ref": "Article IV.A"}], "mastery": ["Can distinguish saving faith from mere intellectual agreement (the demons believe, James 2:19)", "Can articulate trust in Christ alone rather than Christ plus performance"], "prerequisites": [{"id": "sot.gospel", "strength": "hard", "rationale": "Faith has an object; it is only as good as the news it rests on."}, {"id": "sot.repentance", "strength": "soft", "rationale": "Faith and repentance are inseparable twin graces; each is best taught in sight of the other."}]}, {"id": "sot.justification", "name": "Justification", "band": 1, "summary": "Justification is God's gracious and full acquittal of sinners who trust in Christ: he declares them righteous, not by making them good first, but by counting Christ's righteousness to them and their sin to Christ. The verdict of the last day is announced now.", "scripture": ["Romans 3:23-26", "Romans 5:1", "2 Corinthians 5:21", "Romans 8:1"], "anchors": [{"source": "BFM2000", "ref": "Article IV.B (Justification)"}], "mastery": ["Can define justification as a legal declaration, distinct from inner transformation", "Can state the great exchange from 2 Corinthians 5:21", "Can apply Romans 8:1 to a believer haunted by past sin"], "prerequisites": [{"id": "sot.faith", "strength": "hard", "rationale": "Justification is by faith; the declaration is received through the empty hand of trust."}, {"id": "chr.substitutionary-death", "strength": "hard", "rationale": "The verdict is just only because the penalty was truly paid; justification without atonement is legal fiction."}, {"id": "chr.sinless-life", "strength": "soft", "rationale": "The righteousness counted to believers is Christ's real obedience; his sinless life is what gets imputed."}]}, {"id": "sot.adoption", "name": "Adoption", "band": 1, "summary": "In Christ, God does more than acquit: he adopts. Believers are made sons and daughters of God, given the Spirit of adoption by whom they cry 'Abba, Father,' and made heirs with Christ.", "scripture": ["John 1:12-13", "Romans 8:14-17", "Galatians 4:4-7", "1 John 3:1"], "anchors": [{"source": "BFM2000", "ref": "Article IV ('the believer into a relationship of peace and favor with God')"}], "mastery": ["Can distinguish adoption (family standing) from justification (legal standing)", "Can pray to God as Father with warrant, and explain that warrant from Galatians 4"], "prerequisites": [{"id": "sot.justification", "strength": "hard", "rationale": "The Judge acquits before the Father embraces; adoption builds on the cleared verdict."}, {"id": "theo.father", "strength": "soft", "rationale": "Adoption brings believers into the Son's own relation to the Father; the Trinitarian name gives adoption its content."}]}, {"id": "sot.sanctification", "name": "Sanctification", "band": 1, "summary": "Sanctification is the lifelong process, beginning in regeneration, by which the believer is set apart to God's purposes and grows toward the likeness of Christ. It is progressive, never complete in this life, and both God's work and the believer's fight.", "scripture": ["1 Thessalonians 4:3", "Philippians 1:6", "Romans 6:11-14", "Hebrews 12:14"], "anchors": [{"source": "BFM2000", "ref": "Article IV.B (Sanctification)"}], "mastery": ["Can place sanctification correctly: after justification, distinct from it, flowing from it", "Can describe growth as normal but gradual, guarding against both perfectionism and complacency"], "prerequisites": [{"id": "sot.justification", "strength": "hard", "rationale": "Holiness grows from acceptance, not toward it; reversing the order rebuilds works-righteousness."}, {"id": "pneu.sanctifying-work", "strength": "hard", "rationale": "Sanctification is the Spirit's work experienced from the believer's side; the two concepts are one reality from two angles."}]}, {"id": "sot.perseverance", "name": "Perseverance of the Saints", "band": 1, "summary": "All true believers endure to the end. Those God has accepted in Christ and sanctified by his Spirit will never fall away from the state of grace; they are kept by the power of God through faith unto salvation.", "scripture": ["John 10:27-30", "Philippians 1:6", "Romans 8:38-39", "1 Peter 1:3-5"], "anchors": [{"source": "BFM2000", "ref": "Article V (God's Purpose of Grace)"}], "mastery": ["Can state the doctrine from John 10: no one snatches them from his hand", "Can answer 'what about people who fall away?' using 1 John 2:19 (they went out because they were not of us)", "Can distinguish assurance grounded in Christ's keeping from presumption that ignores persistent unrepentance"], "prerequisites": [{"id": "sot.justification", "strength": "hard", "rationale": "Security rests on the finality of the verdict; if justification is full and final, condemnation cannot return."}, {"id": "pneu.indwelling", "strength": "hard", "rationale": "The sealing of the Spirit is the down payment that guarantees the inheritance; perseverance is that seal holding."}, {"id": "theo.god-is-sovereign", "strength": "soft", "rationale": "The keeping power is God's; a God who could be thwarted could not promise to keep."}], "contested": {"positions": ["Perseverance of the saints: true believers are kept by God and will endure (Baptist, Reformed)", "Conditional security: genuine believers can finally fall away through unbelief or apostasy (Arminian, Wesleyan)"], "house_position": "Perseverance of the saints, per BFM2000 Article V: real perseverance in faith and holiness is the evidence of genuine conversion, and God keeps his own.", "note": "Band 3 treatment must handle the warning passages (Hebrews 6, 10) honestly as means God uses to preserve his people."}}, {"id": "sot.union-with-christ", "name": "Union with Christ", "band": 2, "summary": "Every spiritual blessing the believer possesses flows from being joined to Christ himself \u2014 chosen in him, crucified and raised with him, seated with him in the heavenly places. Union with Christ is not one benefit of salvation among others; it is the reality underlying all of them.", "scripture": ["Ephesians 1:3-14", "Romans 6:3-5", "John 15:4-5"], "anchors": [{"source": "BFM2000", "ref": "Article IV, Salvation"}, {"source": "2LBC1689", "ref": "Chapter 26, Paragraph 1"}], "mastery": ["Explain from Scripture how union with Christ underlies every other saving benefit rather than standing alongside them.", "Connect union with Christ to its concrete expressions in baptism and abiding in the vine.", "Apply pastorally: root a believer's assurance in their objective standing 'in Christ' rather than in fluctuating feelings."], "prerequisites": [{"id": "sot.faith", "strength": "hard", "rationale": "A person comes to be in Christ through faith, so union presupposes the faith by which someone is joined to him in the first place."}, {"id": "sot.justification", "strength": "soft", "rationale": "Justification is one of the chief blessings that flows out of being united to Christ, illustrating how union grounds the benefits that follow it."}]}, {"id": "sot.election", "name": "Election", "band": 2, "summary": "Before the foundation of the world, God graciously chose in Christ those who would be saved, an election rooted in his own free grace rather than anything foreseen or achieved in the ones he chose. Election humbles every boast and secures the certainty of God's saving purpose.", "scripture": ["Ephesians 1:4-6", "Ephesians 1:11", "Romans 9:11-16", "Acts 13:48", "2 Thessalonians 2:13"], "anchors": [{"source": "BFM2000", "ref": "Article V, God's Purpose of Grace"}, {"source": "2LBC1689", "ref": "Chapter 3, Paragraph 5"}], "mastery": ["Explain from Scripture that election is rooted in God's own gracious purpose rather than in foreseen human merit or choice.", "Connect election to the doctrine of grace alone as its logical foundation.", "Represent fairly the Arminian position that election is conditioned on foreseen faith, alongside the unconditional-election position, as both held within the SBC."], "prerequisites": [{"id": "sot.grace-alone", "strength": "hard", "rationale": "Election is grace alone applied to God's choosing: if election rested even partly on foreseen merit, salvation would no longer be by grace alone from beginning to end."}, {"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "God's gracious choice of a people before the foundation of the world is a direct expression of his sovereign rule over salvation, not a decision left to chance or to creatures alone."}], "contested": {"positions": ["Unconditional election: God's choice is grounded solely in his own gracious will, not in anything foreseen in the one chosen (the classical Reformed/Calvinist reading of Ephesians 1 and Romans 9).", "Conditional election: God's choice is made in eternity but conditioned on his foreknowledge of who would freely respond in faith (the classical Arminian/Wesleyan reading, also held by many within the SBC)."], "house_position": "Unconditional election \u2014 the Reformed confessional position, taught from band 2 upward; band-1 teaching remains within the breadth of BFM2000 Article V.", "note": "House position confirmed by the pastor, July 2026."}}, {"id": "sot.effectual-calling", "name": "Effectual Calling", "band": 3, "summary": "Alongside the general call of the gospel that goes out to everyone who hears it, God issues an inward call by his Spirit that never fails to bring the one called to faith in Christ. This effectual call is the Spirit's sovereign summons awakening what the general call alone could not accomplish.", "scripture": ["Romans 8:30", "John 6:37", "John 6:44", "1 Corinthians 1:23-24"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 10, Paragraph 1"}, {"source": "BFM2000", "ref": "Article IV.A, Regeneration"}], "mastery": ["Teach the distinction between the general, external call of the gospel and the effectual, internal call of the Spirit.", "Distinguish effectual calling from the error of collapsing it into mere persuasive preaching, since the call itself accomplishes what it summons.", "Represent fairly how traditions that reject effectual calling as distinct from the general call still affirm the Spirit's necessary work in regeneration."], "prerequisites": [{"id": "sot.election", "strength": "hard", "rationale": "Effectual calling is election's application in time \u2014 the moment God's eternal choice reaches into a person's life \u2014 so the doctrine cannot be taught without election already established as its ground."}, {"id": "pneu.regeneration", "strength": "hard", "rationale": "The call that never fails to produce faith is effectual precisely because it is accompanied by the Spirit's regenerating work, not because human persuasion has finally succeeded."}, {"id": "sot.gospel", "strength": "soft", "rationale": "The effectual call works through, not apart from, the content of the gospel message that is generally proclaimed to all."}]}, {"id": "sot.redemption", "name": "Redemption", "band": 2, "summary": "Christ purchased sinners out of their bondage to sin and its penalty at the cost of his own blood, as a slave is bought out of slavery into freedom. Redemption is not a metaphor without a price; it names the actual transaction of the cross.", "scripture": ["Mark 10:45", "1 Corinthians 6:20", "Galatians 3:13", "1 Peter 1:18-19"], "anchors": [{"source": "BFM2000", "ref": "Article IV, Salvation"}, {"source": "2LBC1689", "ref": "Chapter 8, Paragraph 5"}], "mastery": ["Explain from Scripture the picture of redemption as a purchase out of slavery at the cost of Christ's own blood.", "Connect redemption to Christ's substitutionary death as the price actually paid.", "Apply pastorally: remind a believer who feels owned by old sin that they have been bought at a price and now belong to another Master."], "prerequisites": [{"id": "chr.substitutionary-death", "strength": "hard", "rationale": "Redemption names what Christ's substitutionary death accomplished \u2014 an actual purchase \u2014 so the atonement's substitutionary character is the basis for calling it a redemption at all."}, {"id": "anth.wages-of-sin", "strength": "soft", "rationale": "Redemption answers the specific bondage described by sin's wage, freeing sinners from the debt and penalty that sin incurs."}]}, {"id": "sot.propitiation", "name": "Propitiation", "band": 2, "summary": "At the cross, Christ absorbed the just wrath of God against sin, so that God's holy anger toward sinners was fully satisfied rather than merely set aside. Propitiation faces God's wrath directly; its companion truth, expiation, faces sin's removal \u2014 together the cross both satisfies and cleanses.", "scripture": ["Romans 3:25", "Hebrews 2:17", "1 John 2:2", "1 John 4:10"], "anchors": [{"source": "BFM2000", "ref": "Article IV, Salvation"}, {"source": "2LBC1689", "ref": "Chapter 8, Paragraph 5"}], "mastery": ["Explain from Scripture how Christ's death satisfies God's just wrath against sin rather than merely displaying his love.", "Connect propitiation to expiation as two sides of what the cross accomplishes toward wrath and toward sin.", "Apply pastorally: help a believer who fears God's anger see that Christ has already absorbed it in full."], "prerequisites": [{"id": "chr.substitutionary-death", "strength": "hard", "rationale": "Propitiation is a specific claim about what Christ's substitutionary death accomplished toward God's wrath, and so presupposes that his death was a substitution in the sinner's place."}, {"id": "theo.god-is-holy", "strength": "soft", "rationale": "Propitiation is only necessary, and only meaningful, because God's holiness necessarily issues in just wrath against sin."}]}, {"id": "sot.reconciliation", "name": "Reconciliation", "band": 2, "summary": "Sinners were once God's enemies, alienated from him by sin, but through Christ's death they are brought into peace and friendship with God. Reconciliation reaches in both directions \u2014 God's wrath is satisfied and the sinner's hostility is overcome \u2014 leaving no more estrangement between them.", "scripture": ["Romans 5:10", "2 Corinthians 5:18-20", "Colossians 1:21-22"], "anchors": [{"source": "BFM2000", "ref": "Article IV, Salvation"}], "mastery": ["Explain from Scripture how reconciliation moves sinners from enmity with God to peace with him.", "Connect reconciliation to propitiation as the relational fruit of the wrath-satisfying work of the cross.", "Apply pastorally: assure a believer who still feels distant from God that in Christ the estrangement has already been ended."], "prerequisites": [{"id": "sot.propitiation", "strength": "hard", "rationale": "God's wrath must first be propitiated before friendship with him is possible; reconciliation is the relational result of the wrath-satisfying transaction propitiation describes."}, {"id": "anth.the-fall", "strength": "soft", "rationale": "The estrangement reconciliation overcomes traces back to the hostility toward God introduced at the fall."}]}, {"id": "sot.glorification", "name": "Glorification", "band": 2, "summary": "The golden chain of salvation ends not in death but in resurrection glory: those God foreknew, predestined, called, and justified he will certainly conform to the image of his Son in a body like Christ's own risen body. Glorification is the believer's guaranteed future, not a possibility to be earned.", "scripture": ["Romans 8:29-30", "Philippians 3:20-21", "1 John 3:2"], "anchors": [{"source": "BFM2000", "ref": "Article IV.D, Glorification"}, {"source": "2LBC1689", "ref": "Chapter 31, Paragraph 1"}], "mastery": ["Explain from Scripture how glorification completes the golden chain that begins in God's foreknowledge and predestination.", "Connect glorification to Christ's own bodily resurrection as its pattern and guarantee.", "Apply pastorally: comfort a believer facing bodily decay or death with the certainty of a coming resurrection body like Christ's."], "prerequisites": [{"id": "sot.justification", "strength": "hard", "rationale": "Romans 8:30 runs its chain directly from justification to glorification \u2014 'those whom he justified he also glorified' \u2014 the past-tense certainty of the verdict is what makes the future glory already spoken of as done."}, {"id": "chr.resurrection", "strength": "hard", "rationale": "The nature of the believer's future glorified body is defined by, and guaranteed through union with, Christ's own bodily resurrection as the pattern it will follow."}, {"id": "sot.perseverance", "strength": "soft", "rationale": "Perseverance is the guarded road between the verdict and the glory; it enriches the individual believer's assurance of arriving, though the doctrine's certainty rests on Romans 8:30 itself."}]}, {"id": "theo.one-god", "name": "There Is One God", "band": 1, "summary": "There is one and only one living and true God. He is the source, sustainer, and end of all things, and he alone is to be worshiped.", "scripture": ["Deuteronomy 6:4-5", "Isaiah 45:5-6", "1 Corinthians 8:4-6"], "anchors": [{"source": "BFM2000", "ref": "Article II (God)"}, {"source": "NiceneCreed", "ref": "'We believe in one God'"}], "mastery": ["Can quote or closely paraphrase the Shema (Deuteronomy 6:4)", "Can state that monotheism excludes all rival gods, idols, and ultimate powers"], "prerequisites": [], "errors": ["Polytheism", "Idolatry", "Practical atheism"]}, {"id": "theo.creator", "name": "God the Creator", "band": 1, "summary": "God created all things from nothing by the word of his power, freely and for his glory. Creation is distinct from God, dependent on him, and originally declared very good.", "scripture": ["Genesis 1:1", "Genesis 1:31", "Hebrews 11:3", "Revelation 4:11"], "anchors": [{"source": "BFM2000", "ref": "Article II"}, {"source": "ApostlesCreed", "ref": "'Maker of heaven and earth'"}], "mastery": ["Can state that God created from nothing (ex nihilo) and that creation is not divine", "Can explain why creatureliness means dependence and accountability"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "Creation ex nihilo by one God is what distinguishes biblical creation from pagan cosmologies where gods shape pre-existing stuff or emanate the world."}], "errors": ["Pantheism (world = God)", "Eternal matter", "Creation as emanation of the divine"]}, {"id": "theo.god-is-holy", "name": "God Is Holy", "band": 1, "summary": "God is perfect in holiness: utterly set apart from creation and utterly pure, without sin or shadow. His holiness is the attribute heaven never stops announcing.", "scripture": ["Isaiah 6:1-5", "1 Peter 1:15-16", "Habakkuk 1:13", "Revelation 4:8"], "anchors": [{"source": "BFM2000", "ref": "Article II"}], "mastery": ["Can define holiness in both senses: transcendent otherness and moral purity", "Can describe Isaiah's response to God's holiness and why it is the fitting human response"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "Holiness as set-apartness assumes the Creator-creature distinction that monotheism establishes."}]}, {"id": "theo.god-is-sovereign", "name": "God Is Sovereign", "band": 1, "summary": "God reigns over all things. Nothing happens outside his providence; he works all things according to the counsel of his will, and no purpose of his can be thwarted.", "scripture": ["Psalm 115:3", "Daniel 4:34-35", "Ephesians 1:11", "Romans 8:28"], "anchors": [{"source": "BFM2000", "ref": "Article II"}], "mastery": ["Can state that God's rule extends over nature, nations, and individual lives", "Can apply Romans 8:28 to a concrete circumstance without flattening real grief"], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "God's right and power to govern all things rests on his having made all things."}], "errors": ["Deism", "Open theism (a God who does not know or govern the future)"]}, {"id": "theo.god-is-love-and-just", "name": "God Is Loving and Just", "band": 1, "summary": "God is love: he gives himself for the good of his creatures, supremely in sending his Son. He is also perfectly just: he cannot ignore sin or acquit the guilty by pretending. The cross is where both meet without compromise.", "scripture": ["1 John 4:8-10", "Exodus 34:6-7", "Psalm 89:14", "Romans 3:25-26"], "anchors": [{"source": "BFM2000", "ref": "Article II"}], "mastery": ["Can state both attributes without sacrificing either (not love without justice, nor justice without love)", "Can cite Exodus 34:6-7 as God's own self-description holding both together"], "prerequisites": [{"id": "theo.god-is-holy", "strength": "hard", "rationale": "God's justice is his holiness engaging sin; his love is holy love. Without holiness both attributes collapse into sentiment or severity."}]}, {"id": "theo.trinity", "name": "The Trinity", "band": 1, "summary": "The one God eternally exists as three persons: Father, Son, and Holy Spirit. Each person is fully God, the persons are distinct, and yet there is one God, without division of nature, essence, or being.", "scripture": ["Matthew 28:19", "2 Corinthians 13:14", "Matthew 3:16-17", "John 1:1-3"], "anchors": [{"source": "BFM2000", "ref": "Article II"}, {"source": "NiceneCreed", "ref": "Full structure"}, {"source": "AthanasianCreed", "ref": "Lines 3-28"}], "mastery": ["Can state the three claims: one God; three distinct persons; each person fully God", "Can recognize why 'three gods' and 'one God wearing three masks' are both wrong", "Can point to Jesus' baptism as a scene where all three persons act distinctly"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "Without monotheism firmly in place, teaching threeness produces tritheism. The doctrine is only startling, and only true, against the Shema."}, {"id": "chr.deity", "strength": "hard", "rationale": "The Trinity is confessed because Scripture presents the Son as fully God; remove the deity of Christ and the doctrine dissolves."}, {"id": "pneu.spirit-is-god", "strength": "hard", "rationale": "Likewise the personhood and deity of the Spirit is a load-bearing premise of the doctrine."}], "errors": ["Modalism (one person, three modes)", "Arianism (the Son as highest creature)", "Tritheism"]}, {"id": "theo.father", "name": "God the Father", "band": 1, "summary": "The first person of the Trinity is Father: eternally Father to the Son, providential Father over creation, and by adoption the Father of all who believe, who may approach him with the confidence of children.", "scripture": ["Matthew 6:9", "John 20:17", "Romans 8:15", "Ephesians 1:3-5"], "anchors": [{"source": "BFM2000", "ref": "Article II.A (God the Father)"}, {"source": "ApostlesCreed", "ref": "'I believe in God the Father Almighty'"}], "mastery": ["Can distinguish the senses of God's fatherhood: of the Son eternally, of creation providentially, of believers by adoption", "Can explain why the Lord's Prayer begins 'Our Father' and what confidence that grants"], "prerequisites": [{"id": "theo.trinity", "strength": "hard", "rationale": "'Father' is a Trinitarian name before it is a relational comfort; he is Father first with respect to the Son."}]}, {"id": "theo.aseity", "name": "Aseity (Self-Existence)", "band": 2, "summary": "God exists in and of himself, depending on nothing and no one outside himself for his being. He is the uncaused source of all that exists, giving life and breath to everything without himself needing anything.", "scripture": ["Genesis 1:1", "John 5:26", "Acts 17:24-28", "Isaiah 40:13-14"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 2, Paragraph 1 (\"whose subsistence is in and of Himself\")"}, {"source": "BFM2000", "ref": "Article II, Preamble"}], "mastery": ["Explain from Scripture why God's existence depends on nothing outside himself.", "Connect aseity to God's role as Creator and sustainer of all things.", "Apply pastorally: ground the believer's security in a God who needs nothing yet freely gives everything."], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Aseity is what makes God able to create everything else from nothing; only a self-existent being can be the uncaused first cause behind all creation."}, {"id": "theo.one-god", "strength": "soft", "rationale": "Aseity presupposes there is exactly one self-existent being, not many competing sources of existence."}]}, {"id": "theo.immutability", "name": "Immutability", "band": 2, "summary": "God does not change in his character, purposes, or promises. The unchanging faithfulness of his nature is the ground of every promise he has ever made.", "scripture": ["Malachi 3:6", "James 1:17", "Numbers 23:19"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 2, Paragraph 1 (\"immutable\")"}, {"source": "AthanasianCreed", "ref": "the coequal-and-coeternal clauses"}], "mastery": ["Explain from Scripture why God's unchanging character undergirds his covenant faithfulness.", "Connect immutability to God's sovereignty and his other unchanging attributes.", "Apply pastorally: comfort a doubting believer with the fact that God's promises cannot shift or fail."], "prerequisites": [{"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "A sovereign God's plans can only be certain if his character and purposes never shift; immutability is what makes sovereign rule trustworthy rather than arbitrary."}, {"id": "theo.one-god", "strength": "soft", "rationale": "Immutability describes the one true God as distinct from any changeable, humanlike deity."}]}, {"id": "theo.omniscience", "name": "Omniscience", "band": 2, "summary": "God knows all things perfectly and exhaustively \u2014 everything actual and everything possible, including what free creatures would do under circumstances that never occur. Nothing is hidden from him, and nothing surprises him.", "scripture": ["Psalm 139:16", "Hebrews 4:13", "Matthew 11:21-23", "1 Samuel 23:5-14"], "anchors": [{"source": "BFM2000", "ref": "Article II, Preamble (\"all powerful and all knowing... including the future decisions of His free creatures\")"}, {"source": "2LBC1689", "ref": "Chapter 2, Paragraph 2"}], "mastery": ["Explain from Scripture that God's knowledge includes even the free decisions his creatures would make in circumstances that never happen.", "Connect omniscience to God's sovereignty and providence in ordering history.", "Apply pastorally: assure a believer facing an unknown future that nothing about it is unknown to God."], "prerequisites": [{"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "God's sovereign rule over history requires that he actually know, not merely guess at, every contingency his plan must account for."}, {"id": "theo.one-god", "strength": "soft", "rationale": "Omniscience is a perfection of the one true God, distinguishing him from finite gods who must learn."}]}, {"id": "theo.omnipotence", "name": "Omnipotence", "band": 2, "summary": "God is able to do all that is consistent with his own perfect character; nothing he purposes to accomplish can be thwarted. His power is not raw force but the free exercise of his holy will.", "scripture": ["Genesis 17:1", "Job 42:2", "Jeremiah 32:17", "Revelation 1:8"], "anchors": [{"source": "ApostlesCreed", "ref": "Article 1 (\"God the Father Almighty\")"}, {"source": "NiceneCreed", "ref": "Article 1 (\"one God, the Father Almighty\")"
