<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>An Old Gospel, Mapped — Antioch Theology Curriculum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241d16; --ink-soft:#5c5348; --faded:#A89A83;
    --parchment:#F6F1E7; --canvas:#FCF9F2; --panel:#FFFDF9; --line:#D8CFBF; --tint:#EFE7D6;
    --oxblood:#6B121E; --gold:#B08A2E; --gold-soft:#DCC98F;
    --r:3px; --ghost:.14;
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%}
  body{
    background:var(--parchment); color:var(--ink);
    font:16px/1.55 "EB Garamond", Georgia, serif;
    display:flex; flex-direction:column;
  }
  header{
    padding:28px 32px 20px; border-bottom:2px solid var(--oxblood);
    display:flex; align-items:baseline; gap:26px; flex-wrap:wrap;
  }
  .brandrow{display:flex; align-items:center; gap:10px; margin-bottom:8px}
  .eyebrow{
    font-family:Inter,system-ui,sans-serif; font-size:11px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--ink-soft);
  }
  h1{font-size:42px; font-weight:500; letter-spacing:.01em; line-height:1.05}
  h1 em{color:var(--oxblood); font-style:italic}
  .stats{font-size:15px; color:var(--ink-soft); font-style:italic}
  .controls{margin-left:auto; display:flex; gap:16px; align-items:center;
    font-family:Inter,system-ui,sans-serif; font-size:12.5px; color:var(--ink-soft)}
  .controls label{display:flex; gap:6px; align-items:center; cursor:pointer; user-select:none}
  .controls button{
    font:inherit; background:none; border:1px solid var(--line); border-radius:var(--r);
    padding:5px 12px; cursor:pointer; color:var(--ink-soft);
  }
  .controls button:hover{border-color:var(--oxblood); color:var(--oxblood)}
  main{flex:1; display:flex; min-height:0}
  #graphwrap{flex:1; overflow:auto; position:relative; background:var(--canvas)}
  svg{display:block}
  .unitlabel{font-family:"EB Garamond",serif; font-size:14px; fill:var(--faded); font-style:italic}
  .unitline{stroke:var(--line); stroke-width:1; opacity:.55}
  .edge{fill:none; stroke:var(--line); stroke-width:1.1; opacity:.8}
  .edge.soft{stroke-dasharray:4 4; opacity:.55}
  .edge.lit{stroke:var(--gold); stroke-width:2; opacity:.95}
  .edge.lit.soft{stroke-dasharray:4 4; stroke-width:1.6}
  .dim{opacity:var(--ghost)}
  .node{cursor:pointer}
  .node rect.body{rx:var(--r); stroke:var(--line); stroke-width:1}
  .node text{
    font-family:"EB Garamond",Georgia,serif; font-size:13px; font-weight:500;
    fill:var(--ink); pointer-events:none;
  }
  .node .flag{fill:var(--oxblood); font-size:10px}
  .node.selected rect.body{stroke:var(--gold); stroke-width:2.5}
  .node.rev-ok rect.body{stroke:#2E6E5B; stroke-width:2.5}
  .node.rev-flag rect.body{stroke:#9c2b2b; stroke-width:3}
  /* detail panel */
  #panel{
    width:380px; max-width:46vw; border-left:1px solid var(--line); background:var(--panel);
    overflow-y:auto; padding:24px 26px 44px; display:none;
  }
  #panel.open{display:block}
  .pclose{float:right; font:24px/1 Inter,system-ui,sans-serif; background:none; border:none;
    color:var(--ink-soft); cursor:pointer; padding:2px 8px; margin:-4px -10px 0 10px}
  .pclose:hover{color:var(--oxblood)}
  #panel .pdomain{font-family:Inter,system-ui,sans-serif; font-size:10.5px; letter-spacing:.2em;
    text-transform:uppercase; margin-bottom:6px}
  #panel h2{font-size:26px; font-weight:500; line-height:1.12; margin-bottom:2px}
  #panel .pid{font-family:ui-monospace,monospace; font-size:11px; color:var(--faded); margin-bottom:14px}
  #panel .summary{font-size:16px; line-height:1.55; margin-bottom:16px}
  #panel h3{font-family:Inter,system-ui,sans-serif; font-size:10.5px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--ink-soft); margin:18px 0 7px;
    border-bottom:1px solid var(--line); padding-bottom:4px}
  .chips{display:flex; flex-wrap:wrap; gap:5px}
  .chip{font-family:Inter,system-ui,sans-serif; font-size:12px; background:var(--tint);
    border:1px solid var(--line); border-radius:var(--r); padding:2px 9px}
  ul.mastery{padding-left:18px}
  ul.mastery li{margin-bottom:6px; font-size:15px}
  .prereq{margin-bottom:10px; padding-left:10px; border-left:3px solid var(--line)}
  .prereq.hard{border-left-color:var(--oxblood)}
  .prereq a{color:var(--oxblood); text-decoration:none; font-weight:600; cursor:pointer}
  .badge{font-family:Inter,system-ui,sans-serif; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase;
    padding:1px 6px; border-radius:var(--r); margin-left:6px; vertical-align:1px}
  .badge.hard{background:var(--oxblood); color:#fff}
  .badge.soft{background:var(--line); color:var(--ink-soft)}
  .rationale{font-size:14px; color:var(--ink-soft); font-style:italic; margin-top:2px}
  .contested{background:var(--tint); border:1px solid var(--gold-soft); border-radius:var(--r); padding:12px 14px; margin-top:8px}
  .contested .house{margin-top:8px; font-weight:600}
  .errors li{font-size:14px; color:var(--oxblood)}
  #legend{
    position:sticky; bottom:0; left:0; background:linear-gradient(transparent, var(--canvas) 30%);
    padding:16px 32px 12px; display:flex; flex-wrap:wrap; gap:10px 16px;
    font-family:Inter,system-ui,sans-serif; font-size:12px; color:var(--ink-soft);
  }
  .lg{display:flex; align-items:center; gap:6px}
  .sw{width:12px; height:12px; border-radius:2px}
  #hint{position:absolute; top:16px; left:28px; font-style:italic; color:var(--faded); font-size:15px; pointer-events:none}
  #revbox{margin-top:16px; border-top:2px solid var(--line); padding-top:10px}
  #revbox button{font:600 12.5px Inter,system-ui,sans-serif; border:1px solid var(--line); background:none;
    border-radius:var(--r); padding:6px 12px; cursor:pointer; margin-right:8px}
  #revbox button.on-ok{background:#2E6E5B; border-color:#2E6E5B; color:#fff}
  #revbox button.on-flag{background:#9c2b2b; border-color:#9c2b2b; color:#fff}
  #revbox textarea{width:100%; height:64px; margin-top:8px; font:13.5px/1.4 Inter,system-ui,sans-serif;
    border:1px solid var(--line); border-radius:var(--r); padding:8px; background:#fff}
  @media (max-width:760px){
    #panel{position:fixed; right:0; top:0; bottom:0; max-width:86vw; box-shadow:-8px 0 24px rgba(0,0,0,.15); z-index:5}
    .controls{width:100%}
    h1{font-size:32px}
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="brandrow">
      <svg width="20" height="24" viewBox="0 0 20 24" aria-hidden="true">
        <path d="M3,21 V11 A7,7 0 0 1 17,11 V21" fill="none" stroke="#6B121E" stroke-width="2"/>
        <line x1="1" y1="22.5" x2="19" y2="22.5" stroke="#B08A2E" stroke-width="2.5"/>
      </svg>
      <div class="eyebrow">Antioch Southern Baptist Church · Est. 1979</div>
    </div>
    <h1>An Old Gospel, <em>Mapped</em></h1>
  </div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <label><input type="checkbox" id="softToggle" checked> soft prerequisites</label>
    <button id="clearBtn">Clear selection</button>
    <label><input type="checkbox" id="reviewToggle"> review mode</label>
    <span id="revCount" style="display:none"></span>
    <button id="revExport" style="display:none">Export review</button>
    <button id="revImport" style="display:none">Import</button>
    <input type="file" id="revFile" accept=".json" style="display:none">
  </div>
</header>
<main>
  <div id="graphwrap">
    <div id="hint">Click any doctrine to trace its lineage — everything it stands on lights in gold.</div>
    <svg id="svg"></svg>
    <div id="legend"></div>
  </div>
  <aside id="panel"></aside>
</main>
<script>
const DATA = {"concepts": [{"id": "ang.creation-nature", "name": "Creation and Nature of Angels", "band": 2, "summary": "Angels are created beings, personal and powerful yet entirely creaturely, brought into being by God rather than existing alongside him from eternity. They do not marry or reproduce, and Scripture presents their number as fixed by their Creator, not growing over time.", "scripture": ["Psalm 148:2-5", "Colossians 1:16", "Matthew 22:30", "Hebrews 12:22"], "anchors": [{"source": "NiceneCreed", "ref": "\"maker of heaven and earth, and of all things visible and invisible\""}], "mastery": ["Explain from Scripture that angels are created, personal beings rather than eternal or human-derived beings.", "Connect angelic creatureliness to the Creator/creature distinction that governs all theology.", "Apply pastorally: correct popular misconceptions such as 'people become angels when they die.'"], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Angels belong on the creature side of the Creator/creature line; the doctrine of God as Creator is what establishes that angels, however powerful, are made things and not another category of deity."}, {"id": "theo.one-god", "strength": "soft", "rationale": "Angels' creatureliness reinforces that there is only one God, with no other spiritual beings sharing his eternal, uncreated nature."}]}, {"id": "ang.holy-angels", "name": "The Holy Angels", "band": 2, "summary": "The angels who remained loyal to God serve as his messengers and ministers, sent to serve those who will inherit salvation. However exalted their power, they are fellow servants who point away from themselves and must never be worshiped.", "scripture": ["Psalm 103:20-21", "Hebrews 1:14", "Colossians 2:18", "Revelation 22:8-9", "1 Timothy 5:21"], "anchors": [{"source": "NiceneCreed", "ref": "\"of all things visible and invisible\""}], "mastery": ["Explain from Scripture the twin roles of holy angels as messengers of God's word and ministers to God's people.", "Connect the prohibition on angel worship to the Creator/creature distinction underlying angelic nature.", "Apply pastorally: address curiosity or fascination with angels by redirecting worship and attention to God alone."], "prerequisites": [{"id": "ang.creation-nature", "strength": "hard", "rationale": "Holy angels are described here as a subset of the created spirits already established in the doctrine of angelic creation and nature, so their ministry presupposes that prior category."}, {"id": "theo.god-is-holy", "strength": "soft", "rationale": "Angels are called 'holy' because their loyalty and service reflect and derive from the holiness of the God they serve."}]}, {"id": "ang.satan", "name": "Satan", "band": 2, "summary": "Satan was the highest of the created angels until pride led him to rebel against his Maker, and he became the tempter who drew humanity into sin in Eden. He now functions as accuser and adversary of God's people, though never outside the bounds of God's sovereign control.", "scripture": ["Ezekiel 28:12-17", "Isaiah 14:13-14", "1 Timothy 3:6", "Genesis 3:1-5", "Job 1:6-12", "1 Peter 5:8", "Revelation 12:9"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 6, Paragraph 1"}], "mastery": ["Explain from Scripture Satan's origin as a fallen created angel rather than an eternal evil counterpart to God.", "Connect Satan's role as tempter in Eden to his ongoing work as accuser and adversary.", "Apply pastorally: equip a believer to resist the accuser's lies about their standing before God without either dismissing or fearing him wrongly."], "prerequisites": [{"id": "ang.creation-nature", "strength": "hard", "rationale": "Satan is, first and foremost, a created angel; his fall and his rebellion only make sense once his creatureliness and original angelic nature are established."}, {"id": "anth.the-fall", "strength": "soft", "rationale": "Satan's role as the tempter in Eden connects his rebellion to the historical fall of humanity that his temptation set in motion."}]}, {"id": "ang.demons", "name": "Fallen Angels", "band": 2, "summary": "The fallen angels are those who joined Satan's rebellion against God; some now roam free to oppose God's purposes and blind unbelievers, while others are already confined awaiting judgment. Like Satan, they remain creatures under God's ultimate authority, however real their malice.", "scripture": ["Revelation 12:4", "Jude 1:6", "2 Peter 2:4", "2 Corinthians 4:4"], "anchors": [{"source": "NiceneCreed", "ref": "'maker of heaven and earth, and of all things visible and invisible'"}], "mastery": ["Explain from Scripture the origin of the fallen angels as those who fell together with Satan.", "Connect demonic activity, including spiritual blinding, to the broader pattern of opposition to God's saving purposes.", "Apply pastorally: help a believer distinguish real demonic influence from psychological or physical struggles that deserve other kinds of care."], "prerequisites": [{"id": "ang.satan", "strength": "hard", "rationale": "Demons are defined here specifically as the angels who fell together with Satan, so the doctrine of demons presupposes Satan's own fall as its origin point."}, {"id": "ang.creation-nature", "strength": "soft", "rationale": "Like Satan, demons remain within the broader category of created angelic spirits even in their fallen rebellion."}]}, {"id": "ang.opposition-and-limits", "name": "Satanic and Demonic Opposition, and Its Limits", "band": 2, "summary": "Satan and his demons exert real influence and can afflict believers, yet every attack operates strictly within the boundaries God permits, as Job's testing and Peter's sifting both show. Believers cannot be possessed by demons, but they can be resisted and opposed, and must stand firm against real spiritual attack.", "scripture": ["Job 1:12", "Luke 22:31-32", "1 John 4:4", "James 4:7"], "anchors": [{"source": "2LBC1689", "ref": "Chapter 5, Paragraphs 1 and 4 (providence over evil acts)"}], "mastery": ["Explain from Scripture how Satan's opposition, though real, always operates within limits God himself sets.", "Connect the believer's security in Christ to their ability to resist rather than fear demonic attack.", "Apply pastorally: help a fearful believer resist spiritual attack through prayer and Scripture rather than superstition or panic."], "prerequisites": [{"id": "ang.satan", "strength": "hard", "rationale": "This concept qualifies the nature of Satan's opposition already established in the doctrine of Satan, so it presupposes his identity and hostility as its starting point."}, {"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "That demonic opposition is leashed rather than unlimited is a direct application of God's sovereignty over every created power, including hostile spiritual ones."}]}, {"id": "ang.no-redemption-judgment", "name": "No Redemption for Angels, and Their Certain Judgment", "band": 2, "summary": "Christ came to help the offspring of Abraham, not to assume angelic nature or provide a Savior for fallen angels; no redemption is offered them. Their judgment is certain and will be carried out at the appointed time, with believers even sharing in the judging of angels.", "scripture": ["Hebrews 2:16", "Matthew 25:41", "1 Corinthians 6:3", "Revelation 20:10"], "anchors": [{"source": "BFM2000", "ref": "Article X, Last Things"}], "mastery": ["Explain from Scripture why Christ's incarnation and atonement were for humanity and not for fallen angels.", "Connect the certainty of angelic judgment to the broader biblical hope of final justice.", "Apply pastorally: contrast the fallen angels' fixed, hopeless judgment with the open, gracious offer of redemption still extended to every human being."], "prerequisites": [{"id": "chr.humanity", "strength": "hard", "rationale": "That Christ took on human nature rather than angelic nature is precisely why redemption reaches humanity but not fallen angels; this doctrine presupposes what kind of nature the Son assumed."}, {"id": "ang.demons", "strength": "hard", "rationale": "The certainty of judgment described here is specifically the judgment awaiting the fallen angels already identified as demons, so it presupposes their prior fall and present rebellion."}]}, {"id": "anth.image-of-god", "name": "Made in God's Image", "band": 1, "summary": "God created mankind in his own image: the crowning work of creation, made to know God, represent his rule, and reflect his character. Every human being possesses full dignity and worth from conception to death.", "scripture": ["Genesis 1:26-28", "Psalm 8:3-8", "Genesis 9:6", "James 3:9"], "anchors": [{"source": "BFM2000", "ref": "Article III (Man)"}], "mastery": ["Can state what the image grounds: universal human dignity and the sanctity of life", "Can connect Genesis 9:6 and James 3:9 to how we treat other people"], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Image-bearing is a created status; it presupposes the Creator whose image is borne."}], "errors": ["Human worth grounded in ability or usefulness"]}, {"id": "anth.male-female", "name": "Male and Female He Created Them", "band": 1, "summary": "God created humanity male and female, both fully in his image, distinct and complementary. The gift of gender is part of the goodness of creation, and marriage between one man and one woman is God's design from the beginning.", "scripture": ["Genesis 1:27", "Genesis 2:18-24", "Matthew 19:4-6"], "anchors": [{"source": "BFM2000", "ref": "Article III; Article XVIII (The Family)"}], "mastery": ["Can state the equal dignity and designed distinction of male and female", "Can cite Jesus' appeal to Genesis in Matthew 19 as the pattern for marriage"], "prerequisites": [{"id": "anth.image-of-god", "strength": "hard", "rationale": "The male-female design is the concrete form image-bearing takes; equality of image grounds equality of worth across the distinction."}]}, {"id": "anth.the-fall", "name": "The Fall", "band": 1, "summary": "Adam and Eve, created good and free, disobeyed God at the serpent's temptation. Through this historical act sin and death entered the world, fellowship with God was broken, and creation itself fell under the curse.", "scripture": ["Genesis 3:1-19", "Romans 5:12", "Romans 8:20-22"], "anchors": [{"source": "BFM2000", "ref": "Article III"}], "mastery": ["Can narrate Genesis 3 accurately: the temptation, the act, the consequences", "Can state that the fall was a real event with universal consequences, not a myth about everyone's private failings"], "prerequisites": [{"id": "anth.image-of-god", "strength": "hard", "rationale": "The fall's tragedy is measured by the height of what fell; ruined image-bearers, not evolved animals behaving naturally."}, {"id": "theo.god-is-holy", "strength": "soft", "rationale": "Sin as offense against holiness, not mere rule-breaking, gives the fall its true weight."}]}, {"id": "anth.sin-universal", "name": "All Have Sinned", "band": 1, "summary": "Since the fall, all people inherit not just the guilt of Adam, but also the fallen nature of Adam, inclined toward sin. As soon as they are capable of moral action they become transgressors in their own right. There is no one righteous; sin is universal in scope and personal in guilt.", "scripture": ["Romans 3:10-12", "Romans 3:23", "Psalm 51:5", "Ephesians 2:1-3"], "anchors": [{"source": "BFM2000", "ref": "Article III"}], "mastery": ["Can state both truths: an inherited sinful nature and personal responsible transgression", "Can answer 'aren't people basically good?' from Romans 3"], "prerequisites": [{"id": "anth.the-fall", "strength": "hard", "rationale": "Universal sinfulness is the downstream effect of the fall; without Genesis 3, Romans 3 has no origin story."}], "errors": ["Pelagianism (sin as mere bad example; humans born neutral)"]}, {"id": "anth.wages-of-sin", "name": "The Wages of Sin", "band": 1, "summary": "Sin earns death: spiritual separation from God now, physical death, and, apart from Christ, condemnation under God's righteous judgment. Sin is not a weakness God grades on a curve but a debt his justice must answer.", "scripture": ["Romans 6:23", "Isaiah 59:2", "Ephesians 2:1-3", "Hebrews 9:27"], "anchors": [{"source": "BFM2000", "ref": "Article III ('under condemnation')"}], "mastery": ["Can state the three dimensions of death sin brings: spiritual, physical, eternal", "Can explain why judgment is just rather than harsh, given who God is"], "prerequisites": [{"id": "anth.sin-universal", "strength": "hard", "rationale": "The penalty presupposes the crime and its universal reach; wages are owed because all have earned them."}, {"id": "theo.god-is-love-and-just", "strength": "hard", "rationale": "Judgment is God's justice in act; without his justice the wages of sin looks arbitrary."}]}, {"id": "anth.imputed-sin", "name": "Imputed Sin", "band": 2, "summary": "Adam stood as the federal head of the human race, so that when he sinned, his guilt was credited to every one of his descendants, not merely his corrupted nature passed down by imitation. This same principle of imputation is the ground of the gospel's good news: our sin credited to Christ, and his righteousness credited to us.", "scripture": ["Romans 5:12-21", "1 Corinthians 15:21-22", "Romans 5:19"], "anchors": [{"source": "BFM2000", "ref": "Article III, Man"}, {"source": "2LBC1689", "ref": "Chapter 6, Paragraph 3"}], "mastery": ["Explain from Scripture how Adam's sin is credited to the whole human race as its federal head.", "Connect imputed sin to the saving symmetry in which our sin is imputed to Christ and his righteousness to us.", "Apply pastorally: help a person struggling with 'it's not fair that I'm guilty for Adam's sin' see the same structure that makes salvation by another's righteousness good news."], "prerequisites": [{"id": "anth.the-fall", "strength": "hard", "rationale": "There is no sin to impute to the race until Adam's actual, historical fall is in view; imputation is the mechanism by which that one event reaches everyone after him."}, {"id": "anth.sin-universal", "strength": "soft", "rationale": "The universality of human sin is the observable effect for which imputed guilt from Adam is the theological explanation."}]}, {"id": "anth.depravity-extent", "name": "The Extent of Depravity", "band": 2, "summary": "Sin has corrupted every part of the human person \u2014 mind, affections, and will \u2014 so that no faculty is left untouched by the fall. This is total in extent, reaching the whole person, not total in degree, as though every person were as evil as possible.", "scripture": ["2 Corinthians 4:4", "Romans 1:21-26", "Romans 6:20", "John 6:44"], "anchors": [{"source": "BFM2000", "ref": "Article III, Man"}, {"source": "2LBC1689", "ref": "Chapter 6, Paragraphs 2-4"}], "mastery": ["Explain from Scripture how sin affects the mind, affections, and will, not just outward behavior.", "Distinguish the extent of depravity ('every faculty affected') from the error of total depravity meaning 'utter badness.'", "Apply pastorally: help a moral, likeable unbeliever see their need for grace even though they are not, by human comparison, a monster."], "prerequisites": [{"id": "anth.the-fall", "strength": "hard", "rationale": "Depravity is fallen humanity's condition after Eden; the doctrine describes the fall's effect on every human faculty and so presupposes the fall itself."}, {"id": "anth.wages-of-sin", "strength": "soft", "rationale": "That sin's wage is death coheres with sin having corrupted every part of the person under judgment, not merely isolated acts."}]}, {"id": "anth.composition", "name": "Human Composition", "band": 2, "summary": "God made each person a unified whole of material body and immaterial soul or spirit, not a soul trapped inside a disposable body. Death is the unnatural tearing apart of what God joined together, which is why the Christian hope is bodily resurrection, not escape from the body.", "scripture": ["Genesis 2:7", "James 2:26", "1 Thessalonians 5:23", "Ecclesiastes 12:7"], "anchors": [{"source": "BFM2000", "ref": "Article III, Man"}, {"source": "ApostlesCreed", "ref": "\"the resurrection of the body\""}], "mastery": ["Explain from Scripture that the body is part of God's good design for humanity, not a prison for the soul.", "Connect the material/immaterial unity of human nature to death as separation rather than annihilation.", "Apply pastorally: correct a believer's assumption that the body doesn't matter spiritually, given that God made it and will raise it."], "prerequisites": [{"id": "anth.image-of-god", "strength": "hard", "rationale": "Humanity bears God's image as embodied creatures, not as souls that merely happen to occupy bodies, so the doctrine of composition unpacks what kind of creature the image-bearer is."}, {"id": "chr.resurrection", "strength": "soft", "rationale": "Christ's bodily resurrection is the pattern and guarantee of the believer's own future bodily resurrection, confirming that the body is integral to, not incidental to, human identity."}]}, {"id": "anth.origins", "name": "The Special Creation of Man", "band": 2, "summary": "God directly and specially created the universe and, as its capstone, mankind: Adam formed from the dust and Eve from his side, historical persons made on the sixth day of the creation week. Humanity is not the product of evolutionary processes, guided or unguided, but the immediate work of God's hands.", "scripture": ["Genesis 1:26-31", "Genesis 2:7", "Exodus 20:11", "Mark 10:6", "Hebrews 11:3"], "anchors": [{"source": "BFM2000", "ref": "Article III ('Man is the special creation of God, made in His own image')"}], "mastery": ["Explain from Scripture the direct, special creation of Adam and Eve as historical persons.", "Connect Exodus 20:11 and Mark 10:6 to the creation week: the Sabbath command and Jesus himself treat the account as history at the beginning.", "Apply pastorally: show why a historical Adam is load-bearing for Romans 5 \u2014 no first Adam, no logic for the last."], "prerequisites": [{"id": "theo.creator", "strength": "hard", "rationale": "Special creation specifies the mode of the creation doctrine already confessed; the who must be in place before the how and how-fast can be weighed."}, {"id": "bib.reading-in-context", "strength": "hard", "rationale": "The position stands or falls with the hermeneutic: reading Genesis 1-2 in its plain, historical-narrative sense is what rules out evolutionary accommodations, so the interpretive method must already be owned."}], "errors": ["Atheistic evolution", "Deistic and theistic evolution as accounts of human origins", "Day-age and progressive-creation accommodations"], "contested": {"positions": ["Recent six-day special creation: the days of Genesis 1 are ordinary days and humanity was directly created (young-earth creationism).", "Old-earth special creation: long ages or a day-age reading of Genesis 1, with Adam and Eve still directly and historically created.", "Evolutionary creationism: God worked through evolutionary means \u2014 a view some professing evangelicals hold but which this church judges incompatible with the hermeneutic above."], "house_position": "Recent six-day special creation with a historical Adam and Eve and no evolutionary means, per the pastor's confirmed position (2026). The BFM2000 itself does not specify the earth's age.", "note": "Band-3 treatment should engage old-earth exegesis (e.g., the seventh day's non-ending) fairly while showing why the house reads the text as it does."}}, {"id": "apo.ready-with-gentleness", "name": "Ready to Give an Answer", "band": 1, "summary": "Every believer is called to be prepared to give a reason for the hope within them, with gentleness and respect. Apologetics is not winning arguments but honoring Christ as Lord while answering honest questions honestly.", "scripture": ["1 Peter 3:15-16", "Colossians 4:5-6", "2 Timothy 2:24-25"], "anchors": [{"source": "BFM2000", "ref": "Article XI (Evangelism and Missions)"}], "mastery": ["Can quote 1 Peter 3:15 including its posture clauses (in your hearts honor Christ; gentleness and respect)", "Can state their own reason for hope in two or three sentences"], "prerequisites": [{"id": "sot.gospel", "strength": "hard", "rationale": "The hope being defended is the gospel; apologetics is the gospel's escort, not its substitute."}, {"id": "ecc.great-commission", "strength": "soft", "rationale": "Answer-giving serves disciple-making; the commission gives apologetics its purpose."}]}, {"id": "apo.why-trust-bible", "name": "Why the Bible Can Be Trusted", "band": 1, "summary": "The Bible's trustworthiness is supported by publicly checkable evidence: an unmatched manuscript tradition, historical and archaeological corroboration, internal coherence across centuries of authors, and fulfilled prophecy, with Jesus' own view of Scripture as the believer's decisive warrant.", "scripture": ["Matthew 5:17-18", "John 10:35", "Luke 1:1-4", "2 Peter 1:16"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can give a two-minute answer to 'hasn't the Bible been changed over time?' (manuscript abundance, early copies)", "Can state that Jesus' own confidence in Scripture is the Christian's deepest reason to share it"], "prerequisites": [{"id": "bib.inerrancy", "strength": "hard", "rationale": "This concept defends a claim already defined; the doctrine of Scripture's truthfulness must be in hand before its defense is mounted."}, {"id": "bib.canon", "strength": "soft", "rationale": "Questions about 'lost gospels' and which books belong require the canon concept to answer."}]}, {"id": "apo.resurrection-case", "name": "The Case for the Resurrection", "band": 1, "summary": "The resurrection is a historical claim with historical evidence: Jesus' death by crucifixion, the empty tomb, the appearances to individuals and groups including skeptics, and the sudden transformation of the disciples into witnesses willing to die. The alternatives fail to explain all the facts.", "scripture": ["1 Corinthians 15:3-8", "1 Corinthians 15:14-19", "Acts 26:26"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}], "mastery": ["Can present the basic facts case (death, burial, empty tomb, appearances, transformed witnesses)", "Can respond to the two most common alternatives (theft, hallucination) in a sentence each", "Can state from 1 Corinthians 15:14 why everything hangs on this"], "prerequisites": [{"id": "chr.resurrection", "strength": "hard", "rationale": "The case defends the doctrine; the claim's content precedes its evidence."}, {"id": "apo.ready-with-gentleness", "strength": "soft", "rationale": "The manner of 1 Peter 3:15 should govern the material; posture before polemics."}]}, {"id": "apo.problem-of-evil", "name": "The Problem of Evil", "band": 2, "summary": "The problem of evil poses both a logical challenge (can a good, all-powerful God coexist with evil?) and an evidential challenge (does the sheer scale of suffering count against his existence?), and Scripture does not dodge either one. The fall explains evil's origin in creaturely rebellion rather than in God, while greater-good and soul-making responses may be surveyed honestly as partial, non-overclaiming defenses. Christianity's distinctive answer is that God himself bore evil's weight at the cross and has promised its final end.", "scripture": ["Gen 50:20", "Job 42:1-6", "Rom 8:18-28", "Rev 21:4"], "anchors": [{"source": "BFM2000", "ref": "III. Man"}, {"source": "2LBC1689", "ref": "Chapter 6, Of the Fall of Man, of Sin, and of the Punishment thereof"}], "mastery": ["Explain from Scripture how Genesis 50:20 and Romans 8:18-28 hold together real evil, God's sovereignty, and a promised future good without minimizing suffering.", "Connect concepts by relating evil's origin in the fall to God's sovereignty and to the cross as his own self-involving answer to it.", "Apply pastorally by following Job 42's pattern: sound philosophical defenses are for defending the truth to skeptics, not for speaking to the suffering \u2014 Job's friends were right in content until they opened their mouths to Job himself."], "prerequisites": [{"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "The logical problem of evil directly questions whether a sovereign, all-powerful God is compatible with evil's existence, so the learner needs the doctrine of God's sovereignty before engaging the problem honestly."}, {"id": "anth.the-fall", "strength": "hard", "rationale": "Scripture locates evil's origin in humanity's fall rather than in God's creative intent, so this doctrine supplies the reason a good creation now contains evil."}, {"id": "chr.substitutionary-death", "strength": "soft", "rationale": "Christianity's distinctive answer to evil is that God bore it himself at the cross, so this doctrine supplies the gospel's own resolution, though the philosophical problem can be stated without it."}]}, {"id": "apo.gospels-reliability", "name": "The Reliability of the Gospels", "band": 2, "summary": "The Gospels repeatedly claim eyewitness origin \u2014 Luke's careful investigation, John's 'we know that his testimony is true,' Peter's 'we did not follow cleverly devised myths' \u2014 and this claim is reinforced by early dating, an unmatched manuscript tradition, archaeological and historical corroboration, and the kind of undesigned coincidences that mark honest, independent testimony. Read as the ancient biographies they are, the Gospels bear the marks of careful historical reporting rather than later legend.", "scripture": ["Luke 1:1-4", "John 21:24", "2 Pet 1:16", "Acts 26:26"], "anchors": [{"source": "BFM2000", "ref": "I. The Scriptures"}, {"source": "2LBC1689", "ref": "Chapter 1, Of the Holy Scriptures"}], "mastery": ["Explain from Scripture how Luke 1:1-4, John 21:24, and 2 Peter 1:16 each stake the Gospels' truth-claim on eyewitness testimony rather than invented myth.", "Connect concepts by showing how early dating, manuscript wealth, and undesigned coincidences corroborate the eyewitness claims the Gospels themselves make.", "Apply pastorally by equipping believers to answer 'how do we know the Gospels are true' with concrete historical evidence rather than bare assertion."], "prerequisites": [{"id": "apo.why-trust-bible", "strength": "hard", "rationale": "The reliability of the Gospels is a specific case study within the larger question of why Scripture as a whole can be trusted, so the general apologetic for trusting the Bible is presupposed here."}, {"id": "bib.canon", "strength": "soft", "rationale": "Knowing why these four Gospels, and not others, were received as authoritative Scripture supports the historical case that they are also reliable eyewitness documents, though the reliability argument can proceed without settling canon questions first."}]}, {"id": "apo.worldviews", "name": "Christianity Among the Worldviews", "band": 2, "summary": "Every worldview must answer four questions \u2014 origins, meaning, morality, and destiny \u2014 and Christianity answers all four coherently where naturalism, pantheism, and relativism each break down on at least one. Unbelief still borrows Christian capital: human dignity and moral outrage make sense only on the image-of-God account many reject in principle. The aim is to commend the faith's coherence and beauty, not merely to defeat rivals.", "scripture": ["Acts 17:22-31", "Rom 1:18-23", "Eccl 3:11"], "anchors": [{"source": "BFM2000", "ref": "II. God (A. God the Father)"}, {"source": "BFM2000", "ref": "III. Man"}], "mastery": ["Explain from Scripture how Acts 17:22-31 models answering a pagan worldview on its own ground while pointing to the Creator it unknowingly worships.", "Connect concepts by tracing how theo.creator and anth.image-of-god answer the origins and morality questions that naturalism, pantheism, and relativism cannot coherently answer.", "Apply pastorally by helping believers name the 'borrowed capital' in a skeptic's moral outrage as evidence pointing toward, not away from, the God they resist."], "prerequisites": [{"id": "apo.ready-with-gentleness", "strength": "hard", "rationale": "Comparing worldviews is itself an act of apologetic engagement with people, so the disposition and method of giving a reasoned answer with gentleness and respect governs how this content is used, not just what it contains."}, {"id": "theo.creator", "strength": "hard", "rationale": "The origins question, one of the four every worldview must answer, is answered specifically by God as Creator, so this doctrine supplies Christianity's own answer against which rival worldviews are measured."}, {"id": "anth.image-of-god", "strength": "soft", "rationale": "Naturalism's and relativism's inability to ground human dignity and moral outrage is best diagnosed by contrast with the image-of-God doctrine, so this doctrine sharpens the worldview comparison without being strictly required to state it."}]}, {"id": "bt.one-story", "name": "The Bible Tells One Story", "band": 1, "summary": "The sixty-six books form a single unfolding drama: creation, fall, redemption, and restoration, with Jesus Christ at its center. Every part is to be read as contributing to this one story, and all Scripture is a testimony to Christ.", "scripture": ["Luke 24:25-27", "Luke 24:44-47", "John 5:39", "Genesis 3:15"], "anchors": [{"source": "BFM2000", "ref": "Article I ('All Scripture is a testimony to Christ, who is Himself the focus of divine revelation')"}], "mastery": ["Can name the four movements (creation, fall, redemption, restoration) and place a given book roughly within them", "Can state from Luke 24 that Jesus read the whole Old Testament as about himself"], "prerequisites": [{"id": "bib.canon", "strength": "hard", "rationale": "One story presupposes one book; the unity of the canon is the premise of the unified plot."}, {"id": "bib.reading-in-context", "strength": "soft", "rationale": "The whole-Bible context is the widest circle of contextual reading; the skill and the storyline reinforce each other."}]}, {"id": "bt.covenants", "name": "God Works Through Covenants", "band": 1, "summary": "God advances his one plan through covenants: solemn, binding commitments with Noah, Abraham, Israel at Sinai, and David, all reaching their fulfillment in the new covenant sealed by Christ's blood. The covenants are the backbone of the story.", "scripture": ["Genesis 12:1-3", "Exodus 19:4-6", "2 Samuel 7:12-16", "Jeremiah 31:31-34", "Luke 22:20"], "anchors": [{"source": "BFM2000", "ref": "Article I (implicit in the testimony-to-Christ hermeneutic)"}], "mastery": ["Can name the major covenants in order and one sentence of content for each", "Can state that the Lord's Supper cup is 'the new covenant in my blood,' linking the table to Jeremiah 31"], "prerequisites": [{"id": "bt.one-story", "strength": "hard", "rationale": "Covenants are the structure of the story; without the single plot they read as disconnected contracts."}, {"id": "theo.god-is-sovereign", "strength": "soft", "rationale": "Covenant promises are only as good as the God who keeps them; sovereignty underwrites the backbone."}]}, {"id": "bt.promise-fulfillment", "name": "Promise and Fulfillment in Christ", "band": 1, "summary": "All the promises of God find their Yes in Christ. Old Testament promises, patterns, offices, and institutions (prophet, priest, king, temple, sacrifice, exodus) anticipate and arrive at Jesus, so that the New Testament reads as fulfillment, not replacement of the story.", "scripture": ["2 Corinthians 1:20", "Matthew 5:17", "Hebrews 1:1-2", "1 Corinthians 10:1-4"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can give two examples of an OT pattern arriving at Christ (e.g., Passover lamb, temple, Davidic king)", "Can state 2 Corinthians 1:20 as the summary rule of fulfillment"], "prerequisites": [{"id": "bt.covenants", "strength": "hard", "rationale": "The promises being fulfilled are covenant promises; fulfillment presupposes the covenant structure it completes."}, {"id": "chr.one-person", "strength": "soft", "rationale": "The fulfiller must be who the promises require: the divine-human Son who can be prophet, priest, and king at once."}]}, {"id": "bt.noahic-covenant", "name": "The Noahic Covenant", "band": 2, "summary": "After the flood, God swore an everlasting covenant with Noah, his descendants, and every living creature to preserve the created order and never again destroy the earth by flood. This covenant undergirds a sanction on human life rooted in the image of God and provides the stable stage on which every subsequent redemptive covenant unfolds.", "scripture": ["Gen 8:20-9:17", "Jer 33:20-25", "Isa 54:9-10", "Gen 9:6"], "anchors": [{"source": "BFM2000", "ref": "II. God (A. God the Father)"}, {"source": "2LBC1689", "ref": "Chapter 5, Of Divine Providence"}], "mastery": ["Explain from Scripture how Genesis 9's flood sanction and 'never again' oath together constitute a real, sworn covenant distinct from the covenants that follow.", "Connect concepts by showing how the Noahic covenant's preservation of the created order is the necessary precondition for the Abrahamic promise and every covenant after it.", "Apply pastorally by grounding the sanctity of human life and confidence in a stable created order in God's sworn commitment rather than in nature's bare regularity."], "prerequisites": [{"id": "bt.covenants", "strength": "hard", "rationale": "The Noahic covenant is a specific instance of the biblical covenant pattern, so the learner must already grasp what a covenant is \u2014 a sworn, binding relationship with stipulations and signs \u2014 before this particular covenant makes sense."}, {"id": "theo.creator", "strength": "hard", "rationale": "Because this covenant is God's sworn commitment to creation itself, it presupposes that God is the sovereign Creator with the standing and authority to bind himself to the created order he made."}, {"id": "anth.image-of-god", "strength": "soft", "rationale": "Genesis 9:6 grounds the covenant's prohibition of murder in humanity's creation in God's image, so understanding that doctrine deepens the covenant's ethical sanction."}]}, {"id": "bt.abrahamic-covenant", "name": "The Abrahamic Covenant", "band": 2, "summary": "God unilaterally bound himself to Abraham, swearing land, seed, and blessing to all the families of the earth, walking alone between the pieces as the sole covenant-maker. Paul calls this 'the gospel preached beforehand,' making it the engine that drives redemptive history toward Christ.", "scripture": ["Gen 12:1-3", "Gen 15:7-21", "Gen 17:1-8", "Gen 22:16-18", "Gal 3:8"], "anchors": [{"source": "BFM2000", "ref": "V. God's Purpose of Grace"}], "mastery": ["Explain from Scripture why Genesis 15's smoking-pot ceremony marks this as a unilateral divine oath rather than a mutual pact Abraham could break.", "Connect concepts by tracing how the land, seed, and blessing promises given here are narrowed at Sinai, focused in David's line, and fulfilled in Christ without losing their original referents.", "Apply pastorally by showing believers, Jew and Gentile alike, that their share in Abraham's blessing rests on God's oath and Christ's faithfulness, not on their own performance."], "prerequisites": [{"id": "bt.covenants", "strength": "hard", "rationale": "As with every covenant node, the learner needs the general grammar of covenant \u2014 promise, oath, sign \u2014 before the specific content of God's oath to Abraham will hold together."}, {"id": "bt.noahic-covenant", "strength": "soft", "rationale": "The Abrahamic promise assumes a preserved, stable world in which land can be granted and nations can multiply, so the prior covenant that secures that stage enriches this one."}, {"id": "bt.promise-fulfillment", "strength": "soft", "rationale": "Grasping how biblical promises reach fulfillment across time helps the learner see the Abrahamic covenant as the start of a trajectory rather than an isolated ancient transaction."}]}, {"id": "bt.mosaic-covenant", "name": "The Mosaic Covenant", "band": 2, "summary": "At Sinai God gave Israel his law only after he had already redeemed them from Egypt \u2014 'I bore you on eagles' wings and brought you to myself' precedes 'if you will obey.' The law is therefore a covenant-relational gift ordering an already-redeemed people's life and priestly vocation among the nations, never a ladder by which they earned their salvation.", "scripture": ["Exod 19:4-6", "Deut 6:20-25", "Ps 19:7-11", "Exod 2:24"], "anchors": [{"source": "BFM2000", "ref": "IV. Salvation (B. Justification)"}], "mastery": ["Explain from Scripture the redemption-before-law order of Exodus 19:4-6 and why it rules out reading Sinai as a means of earning God's favor.", "Connect concepts by relating the Mosaic covenant's priestly-vocation aim ('a kingdom of priests') to Israel's calling to mediate the blessing promised to Abraham to the nations.", "Apply pastorally by helping believers see obedience as grateful response within an existing relationship with God rather than a transaction that secures it."], "prerequisites": [{"id": "bt.abrahamic-covenant", "strength": "hard", "rationale": "Exodus 2:24 explicitly ties Sinai to God 'remembering his covenant' with Abraham, Isaac, and Jacob, so Sinai must be understood as administering a people already claimed by that earlier promise."}, {"id": "sot.grace-alone", "strength": "soft", "rationale": "Recognizing that salvation has always been by grace alone helps the learner see the grace-before-law pattern at Sinai as consistent with, not an exception to, how God has always dealt with his people."}]}, {"id": "bt.davidic-covenant", "name": "The Davidic Covenant", "band": 2, "summary": "God swore to David an eternal throne and a son-of-God kingship for his line, promising that David would never lack a man to sit on it. This covenant narrows the Abrahamic seed promise to a royal line through whom God's kingdom purposes will be realized.", "scripture": ["2 Sam 7:12-16", "Ps 89:19-37", "Ps 132:11-12"], "anchors": [{"source": "NiceneCreed", "ref": "'and his kingdom shall have no end'"}], "mastery": ["Explain from Scripture how 2 Samuel 7's dynastic oath establishes an unconditional, everlasting throne rather than a conditional political arrangement.", "Connect concepts by showing how this covenant narrows Abraham's seed promise to a single royal line and sets up the kingdom-of-God trajectory Jesus announces.", "Apply pastorally by anchoring hope for a righteous, permanent king in God's sworn oath to David rather than in the failures of Israel's actual kings."], "prerequisites": [{"id": "bt.abrahamic-covenant", "strength": "hard", "rationale": "The Davidic covenant is the seed promise given to Abraham narrowing to a specific royal line, so the learner needs the earlier covenant's content to see what is being narrowed and why."}, {"id": "chr.messiah", "strength": "soft", "rationale": "Seeing how the Davidic promise lands on Jesus as the messianic king helps the learner grasp the covenant's ultimate referent, though the Old Testament oath itself can be stated without it."}]}, {"id": "bt.new-covenant", "name": "The New Covenant", "band": 2, "summary": "Promised to Israel and Judah through Jeremiah and Ezekiel, the new covenant is sealed in Christ's blood: God's law written on hearts, sins fully and finally forgiven, the Spirit given, and all who are in it knowing the LORD. Believers today genuinely participate in this covenant, and its promises to Israel are supplemented rather than reinterpreted away.", "scripture": ["Jer 31:31-34", "Ezek 36:25-27", "Luke 22:20", "Heb 8:6-13"], "anchors": [{"source": "BFM2000", "ref": "VII. Baptism and the Lord's Supper"}], "mastery": ["Explain from Scripture how Jeremiah 31 explicitly contrasts the new covenant with 'the covenant I made with their fathers' at Sinai, marking it as a distinct covenant rather than a renewal of the old.", "Connect concepts by tying the new covenant's forgiveness and Spirit-given new heart to Christ's substitutionary death and to the Spirit's regenerating work.", "Apply pastorally by grounding assurance of forgiveness and the meaning of the Lord's Supper in the covenant Christ inaugurated 'in my blood.'"], "prerequisites": [{"id": "bt.mosaic-covenant", "strength": "hard", "rationale": "Jeremiah 31:32 defines the new covenant explicitly against the Sinai covenant ('not like the covenant I made with their fathers'), so the learner must know the Mosaic covenant to see what the new covenant is distinct from and improves upon."}, {"id": "chr.substitutionary-death", "strength": "hard", "rationale": "Luke 22:20 grounds the new covenant in Christ's blood poured out, so the covenant cannot be understood apart from the atoning death that seals it."}, {"id": "pneu.regeneration", "strength": "soft", "rationale": "Ezekiel's promise of a new heart and Spirit describes the subjective, applied side of the new covenant, so this doctrine enriches understanding of how the covenant reaches individual believers."}]}, {"id": "bt.kingdom-of-god", "name": "The Kingdom of God", "band": 2, "summary": "God has always reigned as king over all creation, but he promised to exercise that kingship concretely through David's line. Jesus proclaimed this kingdom as breaking in, now exercises it from the Father's right hand, and will consummate it in Davidic form at his return.", "scripture": ["Ps 103:19", "Mark 1:14-15", "Eph 1:20-22", "Luke 1:32-33"], "anchors": [{"source": "BFM2000", "ref": "IX. The Kingdom"}, {"source": "NiceneCreed", "ref": "'and his kingdom shall have no end'"}], "mastery": ["Explain from Scripture the difference between God's universal, ever-present kingship (Ps 103:19) and the Davidic kingdom specifically promised, announced, and still awaiting consummation.", "Connect concepts by tracing the line from the Davidic covenant's throne promise through Christ's ascension-session to his still-future Davidic return.", "Apply pastorally by teaching believers to live under Christ's present reign in hope while awaiting its visible, earthly consummation."], "prerequisites": [{"id": "bt.davidic-covenant", "strength": "hard", "rationale": "The kingdom of God's specifically Davidic shape comes directly from God's oath to David, so that covenant's content is presupposed by any claim about how God's kingship is exercised through a king."}, {"id": "chr.ascension-session", "strength": "soft", "rationale": "Ephesians 1 locates the kingdom's present exercise in Christ's session at the Father's right hand, so this doctrine explains the 'already' half of the kingdom's already/not-yet shape."}, {"id": "esc.christ-returns", "strength": "soft", "rationale": "The kingdom's Davidic consummation is tied to Christ's future return, so this doctrine supplies the 'not-yet' half without which the kingdom's descriptive arc would be incomplete."}]}, {"id": "bib.god-has-spoken", "name": "God Has Spoken", "band": 1, "summary": "God is not silent. He has made himself known to every person through what he has made, and he has spoken savingly through his Son and the Scriptures, so that knowing God truly is possible because God has revealed himself.", "scripture": ["Hebrews 1:1-2", "Psalm 19:1-4", "Deuteronomy 29:29"], "anchors": [{"source": "BFM2000", "ref": "Article I (The Scriptures)"}], "mastery": ["Can state that our knowledge of God rests on God's own self-revelation, not human discovery", "Can cite Hebrews 1:1-2 as the summary of how God has spoken"], "prerequisites": [], "errors": ["Deism (a silent, uninvolved creator)", "Agnosticism (God, if real, is unknowable)"]}, {"id": "bib.general-special-revelation", "name": "General and Special Revelation", "band": 1, "summary": "God reveals himself in two ways: generally to all people through creation and conscience, and specially through his saving words and acts recorded in Scripture. General revelation leaves everyone without excuse; special revelation is necessary to know the gospel.", "scripture": ["Psalm 19:1-11", "Romans 1:18-20", "Romans 10:14-17"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can distinguish what creation reveals (God's power and nature) from what only Scripture reveals (the gospel)", "Can explain from Romans 1 why no one is excused by ignorance"], "prerequisites": [{"id": "bib.god-has-spoken", "strength": "hard", "rationale": "The two modes of revelation are subdivisions of the prior claim that God reveals himself at all."}]}, {"id": "bib.inspiration", "name": "Inspiration of Scripture", "band": 1, "summary": "All Scripture is breathed out by God. Human authors wrote with their own styles and circumstances, yet what they wrote is God's own word, carried along by the Holy Spirit.", "scripture": ["2 Timothy 3:16-17", "2 Peter 1:20-21"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can state that Scripture has dual authorship: fully human writing, fully God's word", "Can quote or closely paraphrase 2 Timothy 3:16"], "prerequisites": [{"id": "bib.general-special-revelation", "strength": "hard", "rationale": "Inspiration is the mechanism of special revelation in written form; without the category of special revelation, inspiration has no place to live."}], "errors": ["Dictation theory (authors as passive stenographers)", "Merely human religious genius"]}, {"id": "bib.inerrancy", "name": "Truthfulness of Scripture", "band": 1, "summary": "Because Scripture is God's word and God cannot lie, the Bible is totally true and trustworthy in all it affirms \u2014 in the confession's words, 'truth, without any mixture of error, for its matter.'", "scripture": ["Psalm 119:160", "John 17:17", "Titus 1:2", "Numbers 23:19"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can trace the logic: God cannot lie, Scripture is God's word, therefore Scripture is true", "Can state the BFM phrase that Scripture has 'truth, without any mixture of error, for its matter'"], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "Inerrancy is an entailment of inspiration by a truthful God; asserted without inspiration it is groundless."}, {"id": "theo.god-is-holy", "strength": "soft", "rationale": "The character of God (who cannot lie) is the premise that makes the entailment work; a basic grasp of God's perfection strengthens the argument."}]}, {"id": "bib.authority", "name": "Authority of Scripture", "band": 1, "summary": "Scripture is the supreme standard by which all human conduct, creeds, and religious opinions are tried. To disbelieve or disobey Scripture is to disbelieve or disobey God.", "scripture": ["Isaiah 66:2", "Matthew 4:4", "John 10:35", "2 Timothy 3:16-17"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can state that Scripture, not experience, tradition, or preference, is the final authority for faith and practice", "Can give one concrete example of submitting a personal opinion to the text"], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "Scripture's authority is God's authority; it binds the conscience only because it is God's word."}, {"id": "bib.inerrancy", "strength": "soft", "rationale": "A word that could err in what it affirms would be a diminished standard; trustworthiness undergirds functional authority."}]}, {"id": "bib.canon", "name": "The Canon: Sixty-Six Books", "band": 1, "summary": "The Bible consists of thirty-nine Old Testament and twenty-seven New Testament books. The church did not create the canon but recognized the books God had inspired.", "scripture": ["Luke 24:44", "2 Peter 3:15-16", "John 10:27"], "anchors": [{"source": "BFM2000", "ref": "Article I"}], "mastery": ["Can state the structure of the Bible (39 OT, 27 NT) and name the major divisions", "Can articulate that the church recognized, rather than conferred, canonicity"], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "Canon is the boundary question of inspiration: which books are God-breathed. Without inspiration there is nothing to bound."}], "errors": ["Canon as a fourth-century political invention"]}, {"id": "bib.clarity", "name": "Clarity of Scripture", "band": 1, "summary": "Scripture is clear: ordinary believers, reading it faithfully with the Spirit's help, can understand what is necessary for salvation and godliness without an expert intermediary standing between them and the text.", "scripture": ["Psalm 119:105", "Psalm 119:130", "Deuteronomy 6:6-7"], "anchors": [{"source": "BFM2000", "ref": "Article I"}, {"source": "2LBC1689", "ref": "1.7"}], "mastery": ["Can state that an ordinary Christian can understand the Bible's central message without an expert intermediary", "Can distinguish clarity's claim (the saving message is accessible) from the claim that every passage is equally easy"], "prerequisites": [{"id": "bib.authority", "strength": "hard", "rationale": "Scripture can only function as every believer's final authority if its saving message is accessible to every believer; clarity is what gives authority its reach."}]}, {"id": "bib.sufficiency", "name": "Sufficiency of Scripture", "band": 1, "summary": "Scripture is sufficient: it contains everything needed for faith and life, and the church neither needs nor should expect new revelation added to it.", "scripture": ["2 Timothy 3:15-17", "Proverbs 30:5-6", "Deuteronomy 29:29"], "anchors": [{"source": "BFM2000", "ref": "Article I"}, {"source": "2LBC1689", "ref": "1.6"}], "mastery": ["Can explain why the church does not need, and should not expect, new revelation added to Scripture", "Can state sufficiency's scope: everything necessary for salvation and godliness, not everything about everything"], "prerequisites": [{"id": "bib.authority", "strength": "hard", "rationale": "Sufficiency is authority applied to scope: Scripture is the final standard because nothing else is needed alongside it."}, {"id": "bib.canon", "strength": "soft", "rationale": "Sufficiency presupposes a closed, identifiable canon to be sufficient."}]}, {"id": "bib.reading-in-context", "name": "Reading Scripture in Context", "band": 1, "summary": "Scripture is read according to its plain sense in context. Each passage means what its author, carried by the Spirit, meant to convey to his original readers. Each book is to be understood in its literary and historical setting, and in light of the whole Bible, which centers on Christ.", "scripture": ["Nehemiah 8:8", "Luke 24:27", "2 Timothy 2:15", "Acts 17:11"], "anchors": [{"source": "BFM2000", "ref": "Article I ('All Scripture is a testimony to Christ')"}], "mastery": ["Can state the basic questions of context: who wrote it, to whom, why, and what surrounds the verse", "Can identify one example of a verse commonly misused out of context and give its contextual sense"], "prerequisites": [{"id": "bib.clarity", "strength": "soft", "rationale": "Clarity motivates the ordinary reader to read for themselves; contextual reading is the discipline that honors it."}, {"id": "bib.authority", "strength": "hard", "rationale": "Submitting to Scripture's authority requires seeking the text's actual meaning rather than imposing one."}]}, {"id": "bib.autographs", "name": "The Autographs", "band": 2, "summary": "Inspiration and inerrancy belong properly to the original manuscripts of Scripture as God gave them through the biblical authors. Copies and translations carry that authority faithfully to the degree they accurately reflect the autographs, so today's believer can trust the Bible in hand without needing to hold the original parchment.", "scripture": ["2 Timothy 3:16", "2 Peter 1:20-21", "Psalm 12:6-7"], "anchors": [{"source": "BFM2000", "ref": "Article I, The Scriptures"}], "mastery": ["Explain from Scripture why inspiration is predicated most precisely of the original manuscripts rather than of any single copy or translation.", "Connect the doctrine of the autographs to functional trust in modern translations, given the reliability of the manuscript tradition.", "Apply pastorally: answer the objection 'we don't have the originals, so how can we trust the Bible' without overclaiming or underclaiming."], "prerequisites": [{"id": "bib.inspiration", "strength": "hard", "rationale": "You cannot locate where inspiration properly applies until you already understand what inspiration claims God did in giving the text through human authors."}, {"id": "bib.inerrancy", "strength": "hard", "rationale": "Inerrancy is classically qualified as pertaining to the autographs; the qualification only makes sense once inerrancy itself is understood as a claim about the text God breathed out."}]}, {"id": "bib.progressive-revelation", "name": "Progressive Revelation", "band": 2, "summary": "God revealed himself and his purposes gradually across redemptive history, with earlier revelation genuinely true but incomplete, and later revelation fulfilling and clarifying rather than contradicting it. Christ stands as the climax toward which every earlier word was moving.", "scripture": ["Hebrews 1:1-2", "2 Timothy 3:16-17", "Genesis 3:15"], "anchors": [{"source": "BFM2000", "ref": "Article I, The Scriptures"}], "mastery": ["Explain from Scripture how God spoke 'at many times and in many ways' before speaking finally in his Son.", "Connect progressive revelation to the single unfolding storyline of Scripture.", "Apply pastorally: help a reader make sense of texts that seem to say less, or differently, than later Scripture will say."], "prerequisites": [{"id": "bt.one-story", "strength": "hard", "rationale": "Progressive revelation only makes sense within a single unfolding storyline moving toward Christ; without one story, 'earlier' and 'later' revelation would just be disconnected fragments rather than stages of one plan."}, {"id": "bib.god-has-spoken", "strength": "soft", "rationale": "That God has spoken at all is the presupposition beneath the claim that he has spoken progressively, in stages, over time."}]}, {"id": "bib.self-authentication", "name": "Self-Authentication of Scripture", "band": 2, "summary": "Scripture's authority is inherent to itself as God's word, not conferred upon it by church councils or human decree. The church recognized and received the canon it did not create, because God's sheep hear their Shepherd's voice in its words.", "scripture": ["John 10:27", "1 Corinthians 2:9-13", "1 Thessalonians 2:13"], "anchors": [{"source": "BFM2000", "ref": "Article I, The Scriptures"}, {"source": "2LBC1689", "ref": "Chapter 1, Paragraphs 4-5"}], "mastery": ["Explain from Scripture the difference between the church recognizing the canon and the church conferring authority upon it.", "Connect self-authentication to the doctrine of canon as its theological foundation.", "Apply pastorally: reassure a believer troubled by claims that 'councils decided what's in the Bible' that the councils were recognizing, not creating, God's word."], "prerequisites": [{"id": "bib.canon", "strength": "hard", "rationale": "Self-authentication explains the mechanism by which the canon was recognized rather than invented, so it presupposes and deepens the prior claim that a canon exists."}, {"id": "bib.authority", "strength": "soft", "rationale": "Claiming Scripture authenticates itself is a specific account of where its authority comes from, which depends on already affirming that Scripture is authoritative."}]}, {"id": "soc.civil-government", "name": "Civil Government", "band": 2, "summary": "God instituted civil government after the flood as a gracious remedy for the violence of the fallen world, delegating the sword to human authority to restrain evildoers and commend the good. Rulers, even pagan ones, are installed by God's ordinary providence, so submission to civil authority binds the Christian conscience because God appointed the office, not because the ruler is virtuous.", "scripture": ["Gen 9:5-6", "Rom 13:1-7", "Exod 9:16", "Jer 27:5-7", "Dan 4:17"], "anchors": [{"source": "BFM2000", "ref": "Article XVII"}], "mastery": ["Explain from Genesis 9 and Romans 13 why civil government is a post-fall provision rather than a creation ordinance.", "Connect Daniel 4:17 and Jeremiah 27:5-7 to the doctrine of providence, showing how God installs even pagan rulers.", "Apply Romans 13's concept of hupotasso pastorally, distinguishing conscience-binding submission from uncritical obedience to a ruler's character."], "prerequisites": [{"id": "anth.the-fall", "strength": "hard", "rationale": "Civil government answers the violence unleashed by the fall (Gen 4:23-24; 6:11-13); without the fall there would be no sword to bear."}, {"id": "theo.god-is-sovereign", "strength": "hard", "rationale": "Daniel 4:17's claim that the Most High gives rule to whom he will is God's sovereignty applied to the installation of civil authority."}, {"id": "bt.noahic-covenant", "strength": "soft", "rationale": "The mandate of Genesis 9:5-6 sits inside the covenant that stabilizes and preserves the post-flood world."}]}, {"id": "soc.three-spheres", "name": "Three Spheres of Authority", "band": 2, "summary": "God has established three distinct institutions in human society \u2014 family, state, and church \u2014 each instituted at its own moment, bearing its own emblem and purpose, and answerable directly to God rather than to one another: the family at creation for the propagation of the race, the state after the flood for the preservation of life, and the church \u2014 its keys promised at Caesarea Philippi, its institution at Pentecost \u2014 for the propagation of the gospel. The spheres genuinely overlap at the edges, so the operative principle is jurisdiction, not isolation: Uzziah was struck for seizing the priests' censer, and the church that calls the state to protect life is asking the state to be the state, not to become the church.", "scripture": ["Gen 1:27-28", "Gen 9:5-6", "Matt 16:18-19", "Acts 2:41-47", "2 Chr 26:16-21", "Heb 13:17"], "anchors": [{"source": "BFM2000", "ref": "Articles XVII-XVIII"}], "mastery": ["Explain from Scripture the distinct origin, emblem, and purpose of each sphere: family at creation (propagation of the race), state after the flood (preservation of life), church at Pentecost with the keys promised at Matthew 16 (propagation of the gospel).", "Connect the framework to its two directional test cases: Uzziah's leprosy for the state seizing the church's function (2 Chr 26), and Sproul's point that the church pressing the state on protecting life asks the state to do its own job, not the church's.", "Apply the doctrine pastorally to resist collapsing one sphere's authority into another, whether the state over the church or the church over the family.", "Distinguish the church as institution \u2014 constituted at Pentecost by Spirit-baptism into one body (Acts 1:5; 1 Cor 12:13) \u2014 from the one people of God across all ages (Heb 12:23; BFM VI's 'all of the redeemed of all the ages'): institutional newness without a second people, just as the state's institution at Genesis 9 gave existing humanity a new authority structure rather than a new humanity."], "prerequisites": [{"id": "soc.civil-government", "strength": "hard", "rationale": "The state sphere's content and emblem, the sword granted after the flood, were established in the doctrine of civil government."}, {"id": "ecc.what-is-church", "strength": "hard", "rationale": "Naming the church as a sphere requires first knowing what the church is: a people gathered under Christ's keys, not a building licensed by Caesar."}, {"id": "anth.male-female", "strength": "soft", "rationale": "The family sphere's creation charter in Genesis 1:27-28 presupposes the created male-female design."}]}, {"id": "soc.limits-of-authority", "name": "Limits of Civil Authority", "band": 2, "summary": "Civil authority is real but not unlimited: Jesus' distinction between what belongs to Caesar and what belongs to God marks off separate, non-overlapping claims rather than a single divided territory. When a civil command requires disobedience to God, the apostles' example, 'we must obey God rather than men,' shows that resistance, not compliance, is the faithful response.", "scripture": ["Matt 22:15-22", "Acts 4:18-20", "Acts 5:29", "Rom 13:1-2"], "anchors": [{"source": "BFM2000", "ref": "Article XVII \u2014 'God alone is Lord of the conscience'"}], "mastery": ["Explain from Matthew 22 and Acts 5:29 why civil authority, though real, is not absolute.", "Connect the Lutheran, Presbyterian/Puritan, and Baptist views to their differing accounts of where obedience stops binding the conscience.", "Apply the house's Baptist view to live test cases (a mask mandate, a gathering restriction), showing why the first triggers only individual-submission reasoning while the second triggers the church-jurisdiction distinctive \u2014 and represent how the Lutheran and Presbyterian/Puritan views reason to their answers."], "prerequisites": [{"id": "soc.civil-government", "strength": "hard", "rationale": "Limits only qualify an authority already established; without Romans 13's force behind civil government, Acts 5:29 would be trivial rather than a genuine tension."}, {"id": "ecc.what-is-church", "strength": "soft", "rationale": "The Baptist view's distinctive trigger is jurisdiction over the church's own affairs, which presupposes knowing what the church is."}], "contested": {"positions": ["Lutheran view: obey in all things except when commanded to sin, conscience is bound by every lawful order regardless of its wisdom.", "Presbyterian/Puritan view: obedience is owed when government serves its two God-given purposes, restraining evil and approving good; laws beyond that scope do not bind the conscience as obedience to God, though prudence and conscience may still counsel compliance.", "Baptist view: the Presbyterian/Puritan view, plus civil government holds no jurisdiction over the affairs of the church, Romans 13 binds individual Christians but does not reach the church's own worship, membership, and ministry."], "house_position": "The Baptist view: civil government holds no jurisdiction over the affairs of the church. Declared in the pastor's teaching of the series \u2014 the presentation builds to and lands on this position, closing with Johnson's 'For us, when it comes to church affairs, the question is what do our elders think is the wisest course, and not what does the government say' \u2014 and confirmed by the pastor, July 2026.", "note": "The other two views remain taught fairly as positions within orthodoxy; the vault note's earlier 'deliberately undeclared' account understated what the slides declared. DECIDE #7 retired."}}, {"id": "soc.religious-liberty", "name": "Religious Liberty", "band": 2, "summary": "God alone is Lord of the conscience, so faith that is coerced by the sword is not faith at all; a free church in a free state is therefore the Christian ideal, not a concession to pluralism. Baptists hold this conviction as heritage purchased through suffering, because Caesar was never given the church's keys.", "scripture": ["Matt 22:21", "John 18:36", "Acts 5:29", "Gal 5:1", "1 Tim 2:1-4"], "anchors": [{"source": "BFM2000", "ref": "Article XVII \u2014 'a free church in a free state'"}], "mastery": ["Explain from Scripture why compelled belief is not genuine belief, and how this grounds religious liberty theologically rather than merely pragmatically.", "Connect religious liberty to the three-spheres and limits-of-authority doctrines as their settled, institutional expression.", "Apply the Baptist heritage of suffering for this conviction pastorally, helping the congregation value liberty of conscience for others, not only themselves."], "prerequisites": [{"id": "soc.limits-of-authority", "strength": "hard", "rationale": "Religious liberty is the settled, institutional form of the jurisdictional limit already established; the state's sword has a boundary it cannot cross."}, {"id": "soc.three-spheres", "strength": "hard", "rationale": "Liberty follows from the spheres framework: the state wields a sword that by design cannot reach the conscience, which belongs to God alone."}, {"id": "ht.baptist-identity", "strength": "soft", "rationale": "Religious liberty's place as a defining Baptist distinctive is best understood against the movement's own identity and history."}]}, {"id": "soc.family-sphere", "name": "The Family Sphere", "band": 2, "summary": "The family is God's first institution: one man and one woman in covenant marriage, charged with fruitfulness and dominion, raising children in the discipline and instruction of the Lord. The household has real, God-given internal order and answers to God directly, it is neither a department of the state nor a ministry of the church, though both rightly serve it.", "scripture": ["Gen 1:27-28", "Gen 2:24", "Eph 5:22-6:4", "Col 3:18-21", "Deut 6:4-9"], "anchors": [{"source": "BFM2000", "ref": "Article XVIII \u2014 The Family"}], "mastery": ["Explain from Genesis 1-2 and Ephesians 5-6 the family's creation charter and internal order.", "Connect the family's standing as a sphere to the three-spheres framework: its authority is direct from God, not delegated by state or church.", "Apply the doctrine pastorally to households navigating pressure from state or cultural institutions to redefine family authority."], "prerequisites": [{"id": "anth.male-female", "strength": "hard", "rationale": "The family's design is built on the created male-female order established at creation."}, {"id": "soc.three-spheres", "strength": "hard", "rationale": "The family's standing as a sphere, authority direct from God rather than delegated by state or church, is the spheres framework applied to the household."}]}, {"id": "soc.dual-citizenship", "name": "Dual Citizenship", "band": 2, "summary": "Christians genuinely hold two citizenships: fellow citizens with the saints, and real subjects of earthly authority, yet the heavenly citizenship is primary, for believers are sojourners and exiles seeking the city that is to come. This exile citizenship is practiced concretely: honoring rulers, praying for those in authority, holding the present world loosely, and gathering with the saints all the more as the Day draws near.", "scripture": ["Eph 2:19", "1 Pet 1:17", "1 Pet 2:11-17", "Heb 13:14", "1 Tim 2:1-4"], "anchors": [{"source": "BFM2000", "ref": "Article XVII"}], "mastery": ["Explain from 1 Peter and Hebrews 13 why the believer's heavenly citizenship is primary without dissolving genuine earthly citizenship.", "Connect the practice of exile citizenship, honor, prayer, a loose grip on the world, and gathering, to the eschatological hope that motivates it.", "Apply dual citizenship pastorally to believers tempted either toward disengagement from society or toward over-identification with an earthly nation."], "prerequisites": [{"id": "soc.civil-government", "strength": "hard", "rationale": "Exile citizenship does not dissolve Romans 13; the earthly citizenship it relativizes must first be established as real."}, {"id": "esc.christ-returns", "strength": "soft", "rationale": "The hope of the city that is to come anchors the primacy of the heavenly citizenship."}, {"id": "ecc.membership", "strength": "soft", "rationale": "The gathered body is where exile citizenship is concretely practiced, per Hebrews 10:24-25."}]}, {"id": "chr.deity", "name": "Jesus Is Fully God", "band": 1, "summary": "Jesus Christ is the eternal Son of God: fully divine, worshiped, sovereign over creation, forgiving sins, and identified with the God of Israel. He did not become God; he is God from all eternity.", "scripture": ["John 1:1-3", "John 8:58", "John 20:28", "Colossians 1:15-17", "Hebrews 1:3"], "anchors": [{"source": "BFM2000", "ref": "Article II.B (God the Son)"}, {"source": "NiceneCreed", "ref": "'Very God of very God... of one substance with the Father'"}], "mastery": ["Can cite at least two texts where Jesus receives worship or divine titles", "Can state that the Son is eternal, not created or promoted"], "prerequisites": [{"id": "theo.one-god", "strength": "hard", "rationale": "The claim 'Jesus is God' has its true weight only within monotheism; otherwise it is merely adding a god."}], "errors": ["Arianism", "Jesus as merely a great teacher or prophet"]}, {"id": "chr.humanity", "name": "Jesus Is Fully Man", "band": 1, "summary": "The eternal Son took on true and complete human nature: body, mind, and soul. He was born, grew, hungered, wept, suffered, and died. His humanity is not a costume but the condition of his saving work.", "scripture": ["John 1:14", "Luke 2:52", "Hebrews 2:14-17", "Hebrews 4:15"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}, {"source": "ChalcedonianDefinition", "ref": "'truly man... consubstantial with us according to the manhood'"}], "mastery": ["Can name concrete gospel evidence of Jesus' real humanity (hunger, sleep, grief, death)", "Can state from Hebrews 2 why the Savior had to share our nature"], "prerequisites": [{"id": "anth.image-of-god", "strength": "soft", "rationale": "Grasping what human nature is clarifies what the Son assumed; the true man is also the true image."}], "errors": ["Docetism (Jesus only seemed human)"]}, {"id": "chr.one-person", "name": "One Person, Truly God and Truly Man", "band": 1, "summary": "Jesus Christ is one person with two natures: fully God and fully man, without confusion, change, division, or separation. He is not half of each, nor two persons sharing a body, but one Lord who is both.", "scripture": ["John 1:14", "Philippians 2:5-11", "Colossians 2:9", "1 Timothy 2:5"], "anchors": [{"source": "ChalcedonianDefinition", "ref": "Full definition"}, {"source": "BFM2000", "ref": "Article II.B"}], "mastery": ["Can state the formula: one person, two natures, fully God and fully man", "Can recognize the two basic mistakes: dividing him into two persons, or blending the natures into a hybrid"], "prerequisites": [{"id": "chr.deity", "strength": "hard", "rationale": "The union presupposes the full deity being united."}, {"id": "chr.humanity", "strength": "hard", "rationale": "The union presupposes the full humanity being united."}], "errors": ["Nestorianism (two persons)", "Eutychianism (natures blended)", "Apollinarianism (divine mind in a human body)"]}, {"id": "chr.virgin-birth", "name": "The Virgin Birth", "band": 1, "summary": "Jesus was conceived by the Holy Spirit and born of the virgin Mary. The virgin conception marks the entrance of the eternal Son into human history: truly born of a woman, yet not merely the product of human generation.", "scripture": ["Isaiah 7:14", "Matthew 1:18-25", "Luke 1:34-35"], "anchors": [{"source": "BFM2000", "ref": "Article II.B"}, {"source": "ApostlesCreed", "ref": "'conceived by the Holy Spirit, born of the virgin Mary'"}], "mastery": ["Can narrate the annunciation accounts and state what they claim", "Can connect the virgin birth to the incarnation: how the Son entered humanity"], "prerequisites": [{"id": "chr.one-person", "strength": "soft", "rationale": "The virgin conception is the historical doorway of the incarnation; it is best understood as the 'how' of the person already confessed."}]}, {"id": "chr.sinless-life", "name": "The Sinless Life", "band": 1, "summary": "Jesus was tempted in every respect as we are, yet without sin. He perfectly obeyed the Father in our nature, qualifying him to be both the spotless sacrifice and the righteousness given to his people.", "scripture": ["Hebrews 4:15", "2 Corinthians 5:21", "1 Peter 2:22", "Matthew 3:15"], "anchors": [{"source": "BFM2000", "ref": "Article II.B ('perfect obedience')"}], "mastery": ["Can state that Jesus' temptations were real and his obedience complete", "Can explain why a sinful savior could not sa
