<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
<title>An Old Gospel, Mapped — Antioch Theology Curriculum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241d16; --ink-soft:#5c5348; --parchment:#F6F1E7; --panel:#FCF9F2;
    --line:#d8cfbf; --oxblood:#6B121E; --gold:#B08A2E; --ghost:.14;
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%; margin:0}
  body{
    background:var(--parchment); color:var(--ink);
    font:14px/1.5 "EB Garamond", Georgia, serif;
    display:flex; flex-direction:column;
  }
  header{
    padding:18px 20px 12px; border-bottom:2px solid var(--oxblood);
    display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;
  }
  .eyebrow{font-family:system-ui,sans-serif; font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft);}
  h1{font-size:28px; font-weight:500; letter-spacing:.01em}
  h1 em{color:var(--oxblood); font-style:italic}
  .stats{font-size:13px; color:var(--ink-soft); font-style:italic}
  .controls{margin-left:auto; display:flex; gap:12px; align-items:center; flex-wrap:wrap; font-family:system-ui,sans-serif; font-size:11px; color:var(--ink-soft)}
  .controls label{display:flex; gap:6px; align-items:center; cursor:pointer; user-select:none}
  .controls button{font:inherit; background:none; border:1px solid var(--line); border-radius:3px; padding:4px 10px; cursor:pointer; color:var(--ink-soft)}
  .controls button:hover{border-color:var(--oxblood); color:var(--oxblood)}

  main{flex:1; display:flex; min-height:0; flex-direction:column}
  #graphwrap{flex:1; overflow:auto; position:relative; padding:8px; background:var(--parchment)}
  svg{display:block; width:100%; height:auto; max-width:100%; touch-action: none}

  .unitlabel{font-family:"EB Garamond",serif; font-size:13px; fill:#a89a83; font-style:italic}
  .unitline{stroke:#e7dfd0; stroke-width:1}
  .edge{fill:none; stroke:#c9bcA6; stroke-width:1.1; opacity:.55}
  .edge.soft{stroke-dasharray:4 4; opacity:.4}
  .edge.lit{stroke:var(--gold); stroke-width:2; opacity:.95}
  .edge.lit.soft{stroke-dasharray:4 4; stroke-width:1.6}
  .dim{opacity:var(--ghost)}
  .node{cursor:pointer}
  .node rect{rx:4; stroke:rgba(0,0,0,.18); stroke-width:.75; filter:drop-shadow(0 1px 1px rgba(60,40,20,.18))}
  .node text{font-family:system-ui,sans-serif; font-size:10.5px; font-weight:600; fill:#fff; pointer-events:none}
  .node.selected rect{stroke:var(--gold); stroke-width:2.5}
  .node .flag{fill:#fff; opacity:.9; font-size:9px}

  #panel{
    width:100%; border-top:1px solid var(--line); background:var(--panel);
    overflow-y:auto; padding:20px 18px 40px; display:none; flex-shrink:0; max-height:65vh;
  }
  #panel.open{display:block}

  #panel .pdomain{font-family:system-ui,sans-serif; font-size:10px; letter-spacing:.2em; text-transform:uppercase; margin-bottom:6px}
  #panel h2{font-size:22px; font-weight:500; line-height:1.15; margin-bottom:2px}
  #panel .pid{font-family:ui-monospace,monospace; font-size:10.5px; color:#a2947d; margin-bottom:14px}
  #panel .summary{font-size:15px; line-height:1.55; margin-bottom:16px}
  #panel h3{font-family:system-ui,sans-serif; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-soft); margin:18px 0 7px; border-bottom:1px solid var(--line); padding-bottom:4px}

  .chips{display:flex; flex-wrap:wrap; gap:5px}
  .chip{font-family:system-ui,sans-serif; font-size:11px; background:#efe7d6; border:1px solid var(--line); border-radius:10px; padding:2px 9px}
  ul.mastery{padding-left:18px}
  ul.mastery li{margin-bottom:5px; font-size:13.5px}
  .prereq{margin-bottom:10px; padding-left:10px; border-left:3px solid var(--line)}
  .prereq.hard{border-left-color:var(--oxblood)}
  .prereq a{color:var(--oxblood); text-decoration:none; font-weight:600; cursor:pointer}
  .badge{font-family:system-ui,sans-serif; font-size:9px; letter-spacing:.1em; text-transform:uppercase; padding:1px 6px; border-radius:8px; margin-left:6px}
  .rationale{font-size:12.5px; color:var(--ink-soft); font-style:italic; margin-top:2px}
  .contested{background:#f4ead8; border:1px solid #dcc98f; border-radius:5px; padding:12px 14px; margin-top:8px}

  #legend{position:sticky; bottom:0; left:0; background:linear-gradient(transparent, var(--parchment) 30%); padding:12px 16px; display:flex; flex-wrap:wrap; gap:8px 12px; font-family:system-ui,sans-serif; font-size:11px; color:var(--ink-soft)}
  .lg{display:flex; align-items:center; gap:5px}
  .sw{width:11px; height:11px; border-radius:2px}
  #hint{position:absolute; top:12px; left:16px; font-style:italic; color:#a89a83; font-size:13px; pointer-events:none; z-index:10}

  /* Desktop improvements */
  @media (min-width: 761px) {
    h1 { font-size:30px; }
    header { padding:22px 28px 16px; }
    main { flex-direction: row; }
    #panel { 
      width:360px; max-width:44vw; border-left:1px solid var(--line); border-top:none; max-height:none;
    }
    #graphwrap { padding:0; }
    svg { width:100%; height:100%; }
    .node text { font-size:10.8px; }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="eyebrow">Antioch Southern Baptist Church · Est. 1979</div>
    <h1>An Old Gospel, <em>Mapped</em></h1>
  </div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <label><input type="checkbox" id="softToggle" checked> soft prerequisites</label>
    <button id="clearBtn">Clear selection</button>
  </div>
</header>
<main>
  <div id="graphwrap">
    <div id="hint">Tap any doctrine to trace its lineage — everything it stands on lights in gold.</div>
    <svg id="svg"></svg>
    <div id="legend"></div>
  </div>
  <aside id="panel"></aside>
</main>
